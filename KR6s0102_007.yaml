body:
  text: 元清源居士王古撰鴦崛摩經鴦崛髻經若右鴦崛髻殺人以指為鬘佛化令入道二經同本異譯出增一阿含經第三十一卷力品力士移山經右佛將涅槃為五百力士移山因説此經校量種種諸力不及佛神足智慧十種之力四未曾有法經右説轉輪王阿難各有四未曾有法二經出增一阿含經第二十六卷八難品異譯舍利弗摩訶目犍連遊四衢經右説二大弟子遊行諸國還有衆比丘共語大聲佛為調伏説法出增一阿含經第四十一卷馬王品異譯七佛父母姓字經右説七佛父母國土姓字弟子名氏説法出增一阿含經第四十五卷不善品異譯放牛經右説比丘修行如人牧牛出增一阿含經第四十六卷放牛品異譯緣起經右説十二緣差別名義略法出增一阿含經第四十六卷放牛品異譯十一想思念如來經右説修行念佛十一法及修慈心十一果報出增一阿含經第四十八卷禮三寶品初異譯四泥犂經右説調達等墮大地獄種種苦報事出增一阿含經第四十八卷禮三寶品異譯阿那邠邸化七子經右説長者化七子受三歸五戒福德勝大出增一阿含經第四十九卷非常品異譯大愛道般泥洹經佛母般泥洹經右説佛乳母證果入泥洹二經同本異譯出增一阿含經第五十卷大愛道般涅槃品國王不犂先尼十夢經舍衛國王夢見十事經右二經國王夢十事王大憂怖問佛為説此經二經同本異譯出增一阿含經第五十一卷大愛道般涅槃品阿難同學經右阿難同學比丘不樂修梵行佛為説法教戒證阿羅漢從戒德香經下二十四經並增一阿含經中別經異譯五蘊皆空經右説佛為五苾芻説五蘊無我我所悟空證果出雜阿含經第二卷異譯七處三觀經右二經雜集世尊所説種種經法出雜阿含經異譯聖法印經右説空無我法出雜阿含經第三卷異譯雜阿含經右出雜阿含經中異譯五陰譬喻經水沫所漂經右説五陰空色如聚沫受如泡想如野馬行如芭蕉識如幻二經本同譯別出雜阿含經第十卷不自守意經右説六根自守不自守出雜阿含經第十一卷異譯滿願子經右説賢者聞法證道出雜阿含經第十三卷異譯轉法輪經三轉法輪經右説三轉四諦合十二事等法二經本同譯別出阿含經第十五卷八正道經右説八正道法出雜阿含經第二十卷異譯難提釋經右説比丘五行六念等法出雜阿含經第三十卷馬有三相經馬有八態譬人經右説馬有善惡相如人有善惡行二經並出雜阿含經第三十三卷異譯相應相可經右説善惡人以類相從出前單卷雜阿含經中異譯治禪病祕要經右一經初首題云尊者舍利弗所問事佛説種種禪觀病惱障礙出説一切有部毗奈耶雜事第三十九卷同本從五蘊皆空經下一十六經並出雜阿含中別經異譯摩登女經思摩登女解形中六事經摩登伽經三卷舍頭諫經右四經本同譯別前二經但是後經一品説摩登女慕阿難欲以為夫佛為説法受度及説其本因地有二十八宿等占候災禍種種法鬼問目連經雜藏經餓鬼報應經右三經説餓鬼罪苦本因種種因果事阿難問事佛吉凶經慢法經阿難分別經右三經本同譯別阿難問佛事佛有富貴諧和有衰耗不偶者報護不同佛為説此經五母子經沙彌羅經右説羅漢見宿命為五母作子五母思子皆涕泣悲惱欲自殺羅漢見已故笑説此經玉耶女經玉耶經阿遬達經右三經同本異譯説玉耶女嫁給孤獨長者子而憍慢無復婦禮長者請佛為説法教戒為婦之道修行本起經二卷太子瑞應本起經二卷言過去現在因果經四卷右並説佛本修因地降生王宮出家成道種種所示現事三經同本異譯法海經海有八德經右二經同本異譯説大海深廣喻佛法難量四十二章經右漢明帝夢金人身長丈六項佩日輪光明赫奕飛在殿前乃詔郎中蔡愔等十八人往天竺尋訪佛法永平十年遂與摩騰同來帝甚賞接所將像馱以白馬因建寺曰白馬譯出此經是漢地經法之祖也自此釋教相繼雲興以大化初傳人未深信蘊其妙解不即多翻且撮經要以導時俗奈女耆域因緣經右奈女者迦葉佛時供佛一奈故九十一劫生奈華中後生耆域號醫王能愈病起死此經説二人本起因地罪業應報教化地獄經右信相菩薩問衆生受苦之因佛説此經龍王兄弟經右説目連降伏二大龍王長者音恱經右説長者先富後貧之本因事禪祕要經三卷辭右佛説不淨觀數息法四大觀亦名白骨觀亦名九次第想亦名雜想觀法所説次第境界甚詳七女經右佛説過去世波羅奈國王有七女遊冢間觀死尸各説無常法偈帝釋來讚喜問所求願七女答欲得無根無枝無葉樹無形無陰陽地於深山大呼耳不聞響天不能答往見迦葉佛聞法受記後皆作佛即踴身空中變為男子八師經右説不殺不盜不淫不妄言綺語兩舌惡口不飲酒覩老病死苦修道離苦是為八師越難經右長者名越難家大豪富以慳貪故死為乞婦作子生盲無目復至其家乞而不獲打撲幾死佛力使其自知宿命佛言富貴不布施與無財者等所欲致患經右呵色欲過患勸修道脫苦阿闍世王問五逆經右佛説阿闍世王以作逆罪命終墮地獄如拍鞠從彼命終生天中二十一劫不趣三惡道最後成辟支佛以得無根信故在黑繩地獄如人中七日重罪即盡出薩婆多毗尼明印婆沙第一五苦章句經右佛言三界五道生死不絶有五苦八難五苦者一諸天苦壽盡劫衰相現雖壽大劫要當皆死二人道苦雖轉輪聖王不免生老病死衆生未脫三界苦惱災變死有萬端三曰畜生苦四曰餓鬼苦五曰地獄苦廣如經説八難地者三塗三四邊地五長壽天六盲聾瘖啞手足殘跛七世智辨聰學世經典信邪倒見屠殺畋獵不信三尊死入地獄從冥入冥無有脫時肆心放意誹謗聖道八生在佛前佛後佛言三惡道是一切衆生家暫得為人為天如作客日少歸家日多沙門已得出家如何不能放捨重擔謂著吾我人貪瞋癡慢專求利養自大輕人外似如法不制六情毀戒犯欲如此種種皆汝重擔如栴檀香貴於閻浮金又療人病服之即愈一切衆生莫不願得有人賣之而無買者佛説經法留在世間無人視者如束旃檀賣之而無買者父母夫婦兄弟知識奴婢有五因緣一曰怨家二曰債主三曰償債四曰本願五曰真友給孤獨長者家有五福德因緣一曰時節不失禮敬二曰身教長者起時內外小大無不隨者三曰口言所作福事皆從其教四曰一味衣食平等奴婢亦然五曰和順上下不相違戾以是五福家中奴婢牛馬六畜蜎飛蠕動死皆生天門內經聲不絶不與諸惡共作因緣亦是長者本願所致佛言三界五道罪垢苦惱非天授非人與亦非鬼神沙門梵志所與所作罪福如影隨形如響應聲不失毛髮此經教戒切至明備學者宜數誦讀堅意經右説善惡獲報如種榖得榖等淨飯王般涅槃經右説王臨終見佛生淨居天及説葬送王事進學經右説諸比丘所當進學事得道梯隥錫杖經右説比丘持錫法門貧窮老翁經右老翁年二百歲而貧窮飢虛佛為説其宿因三摩竭經右三摩竭給孤獨長者女也女嫁難國王子國人不聞佛法三摩竭毀詈外道請佛説法佛勑弟子得神通者方得赴請於是諸大弟子等各現大神變往赴此國見佛聞法受度者八萬人經中説賔頭盧以神力赴集大山隨後孕婦見驚墮胎佛勑不得入滅待彌勒下生彼國無大器熟食乾緒雖是佛會中衆僧使人五通已備佛令乾緒背負萬斛大釜手提百斛大杓飛空先往熟食美備故今千僧大會處主事人往往畫像供養以祈冥祐萍沙王五願經右説國王棄位出家見佛聞法得阿羅漢果琉璃王經右説王殺釋種生陷地獄生經五卷右類集五十五經如阿含總曰生經別説人天諸趣善生善報惡生惡報業生三塗修羅道證聖果等種種因緣事相義足經二卷右類集一十六經總曰義足所説種種緣起善惡因果事理法義具足故正法念經七十卷定字至終字右正法念處法門經七十卷皆佛説初十善業道品一至二説十業善惡因果苦樂等次生死品三至五卷半説一切世界衆生無始已來生死輪轉諸修行人當隨順正法思惟觀察三界諸趣次第捨漏捨不善法修行善法正住正觀地獄品五卷半至十五説一百三十六種地獄種種苦報事相及元造惡業因緣餓鬼品十六至十七説三十六種餓鬼種種苦報壽命長短增減業行種類差別畜生品十八至二十一説五道中畜生最多有三十四億種類差別及阿修羅衆與天鬥戰甚詳觀天品二十二卷至六十三卷説諸天光明身量壽命飲食服器宮殿園林勝妙欲樂放逸福盡墮滅隨業流轉天界因緣事相種種甚詳天宮有壁鏡樹鏡現諸業果夜摩天上有六佛塔有無量勝妙功德利益天人無量又説比丘十三障礙法教戒切至六十四至七十若人供養説法師即為供養現在世尊以聞法故憍慢者心得調伏貪著者信布施粗者心調柔愚癡者得智慧迷因果者得正信邪見者入正見殺盜淫得遠離終得涅槃故説法恩甚為難報一者母二者父生身故恩不可報若令父母住於法中名少報恩三者如來度脫生死無上大師此恩難報若於佛法深心得不壞信名報佛恩四者説法師供養此四種人得無量福於未來世能得菩提六十一卷又聞法有三十二種功德六十二卷身念處品六十四至七十説內外循身觀等種種法及四部洲衆生生死苦樂因果種種事相此經説三塗諸天事最詳最廣天品中説夜摩天王鵝王菩薩孔雀王菩薩説諸佛教戒天人種種法門文義富妙佛本行集經六十卷宜字至基字右説佛昔於往昔修因受記出家苦行成道度生及諸大比丘得度因緣等事興起行經二卷籍右佛與五百羅漢在阿耨大池説自宿命因緣受報頭痛背痛擲石受謗木槍馬麥苦行六年等十事非父作母作非王作天作亦非沙門婆羅門作自造自受如來猶不免償報宿緣況復愚冥未得道者偈云因緣終不滅亦不著虛空當護三因緣莫犯身口意欲示人宿緣不可逃避本事經七卷右弟子集記佛説種種法門一法品二法品三法品大略如增一阿含經業報差別經右佛説一切衆生繫屬依止於業業有上中下差別不同壽夭妍醜疾病多少威勢大小族姓資生邪智正智六道苦樂貧富不等因果報復及禮塔施蓋幡鈴服器飲食香華靴履燈明等各各十種功德詞簡事備理趣詳妙大安般守意經二卷甚右説調息守意入禪法陰持入經二卷右説十八界三十七品等法處處經右説善惡因果等種種法義罵意經右説人當制意學道種種善惡因果事分別善惡所起經右説五道善惡因果報應後偈説因果詳博及酒有三十六失出家因緣經右説優婆塞持犯佛戒善惡果報阿含正行經右説善惡生死人當正行修道十八泥犂經右説地獄種種苦事法受塵經右説耽著塵染不得無上吉祥之道禪行法想經右説彈指間修諸禪法不為愚人虛食人施長者懊惱三處經右説忉利天人壽終來生舍衛城為長者子墮樹死死已生龍中為金翅鳥吞噉三處父母一時啼哭一切生死因緣如幻如客犍陀國王經右説事婆羅門不能免生死唯事佛可以得道須摩提長者經右説長者喪子苦惱佛為説無常法人得受度阿難四事經右佛説教戒令阿難傳持未生怨經右説瓶沙王子阿闍世王受調達惡友教作惡逆四願經右説四願不可常保一謂空愛身命死則委去二謂財産官祿三謂親屬知識四謂不能守意正行淫於五樂黑氏梵志經右説梵志當墮地獄見佛得道猘狗經右説誹謗道師當墮惡道分別經右説六根塵造十惡業墮十八地獄末法比丘多作業等八關齋經右説受八戒法其福不可稱量阿鳩留經右説小施獲大果報孝子經右説生育恩重唯化親聞法得道為孝五百弟子自説本起經右諸阿羅漢各各自説得果本起種種因行佛亦自説果報大迦葉本經右説大迦葉見佛聞法得道四自侵經右四謂夙夜不學老不止淫得財不施不受佛言四者出心還自苦身羅云忍辱經右説舍衛國有輕薄者以沙土著鶖鷺子鉢中及擊羅云首流血夜半命終入大地獄受大劇苦佛説其種種苦報并説忍辱最為大力説忍功德甚詳佛為年少比丘説正事經右為比丘略説法要沙曷比丘功德經右沙曷比丘得羅漢果降伏毒龍時非時經右説十二月時非時法自愛經右説行善得果是為自愛忠心經右大目連以神足移石國中八歸仰佛為説法見正經一名生死變識右見正者弟子名也問佛人死已識神無還今人皆不知宿命識神所從來佛為種種喻説深談生死輪轉流浪變易之理大魚事經右喻人貪欲故墮生死如魚𮊔漁捕阿難七夢經右阿難七夢憂怖問佛佛為解脫呵雕阿那含經右説佛子善行功德不欲令人知燈指因緣經右説燈指生而指出光明始終富貧種種因緣事婦人遇辜經右婦人夫子父母舅姑皆橫死種種大苦惱因發狂見佛受度事四天王經右佛説六齋日天王太子使者諸天日月五星二十八宿下人間伺察善惡人修五戒六齋等獲福得度迦葉度貧母經右説大迦葉欲度貧老母從乞臭米汁飲之為現神足母大敬喜以此福生忉利天説布施獲福無量事十二品生死經右説四果人下至三塗善惡生死有十二品輪轉五道罪福報應經右説五道罪福因果報應如影隨形事五無返復經右舍衛國五人皆得道證父子耕地蛇嚙殺其子父母姊妻奴皆説無常苦空法或者以為不孝慈問佛佛説此經佛大僧大經右二人兄弟也其一出家證羅漢果其一以淫殺故墮地獄弟婦守貞生天邪祗經右婆羅門先事外道後從佛受道復悔還戒佛為化度證羅漢果末羅王經右説王國中有大石方數十里佛以足指挑石因為説法九億人受度摩達國王經右説王録國人征討比丘得羅漢亦見録為見神足王悔過見佛聞法旃陀越國王經右説兒在冢中三年不死佛説本緣五恐怖世經右説後世比丘等不修道可恐怖事弟子死復生經右説弟子死七日復生説更地獄受苦歸信佛法佛為説此經懈怠耕者經右説耕者見佛欲禮敬問法復念耕種未竟須後間時佛説此懈怠人已經九十一劫過六佛不得受度辨意長者子經右長者子問佛六道善惡因果等事佛説此經無垢優婆夷問經右説掃塔聖地香華供養禪定歸戒所得果報賢者五福德經竟右説説法人得五福德謂長壽大富端正名譽聰明天請問經右天問佛答種種法義僧護經右僧護舍利弗弟子也所見地獄人五十六種佛説是等比丘往昔罪業之因受是苦報教誡嚴備佛弟子宜皆觀省護淨經右説一比丘墮餓鬼中坐五百歲前以不清淨手觸僧食器以不清淨食著僧食中不持齋者食法會食六十萬世墮餓鬼中不得挾齋餘食歸給妻子設齋會食不得先嘗皆作殘食不如不作木槵子經右説持三寶名二十萬遍生第三天滿百萬當得向初果無上處經右謂三寶為無上處盧至長者因緣經右盧至富而慳以高慢為帝釋所嬈見佛證果五王經右諸國王各耽王樂佛為説八苦即皆得果出家功德經右説出家功德及勸障罪福旃檀樹經右説背恩伐樹為樹神所殺頞多和多耆經右説愚人不知施度普達王經右王禮敬道人群臣諫王王為説法因供佛得果佛滅後棺斂葬送經右説佛葬儀及佛鉢化緣鬼子母經右説鬼子母食人子佛降化受戒梵摩難國王經右説王太子出家證阿羅漢説施當平等父母恩難報經右説肩負父母經千年便利背上不足報生育恩彌多耶致經右説外道聞佛説二十一事得道新歲經右説受歲説戒舉過群牛譬喻經右説驢效牛入牛群為抵殺喻比丘無沙門行微妙比丘擯出界外九橫經右説人有九因緣命未盡而橫死一者食不安食二多食過度三不知時節方宜四食未消而復食不時消吐五大小便不隨時六犯戒犯王法或飢渴捶打驚怖憂死七不隨醫藥教誡八夜行妄衝冒九房室過差或奔車馬牛蛇虺水火逢拔刀人醉人惡人涅槃經第二十六卷與此同三十七品經右略説三十七菩提分法避女惡名欲自殺經右比丘避惡名欲自殺天神為説法使忍辱修道證阿羅漢比丘聽施經右聽施比丘不樂道行樂著睡眠佛為説此經身觀經右説幻身種種過患無常經一名三啓經八無暇有暇經右八無暇謂三塗生長壽天生邊地六根不具信邪倒見不值善導言八難之時無有間暇可修道業長爪梵志請問經右婆羅門問佛因果種種法譬喻經右説怖人墮井為惡象毒龍四毒蛇等迫逼喻生死五欲等略教誡經右説出家人應勤斷無呪療痔瘻經右有所持呪療一十六種悉皆消落摩訶僧祇律四十卷學仕右摩訶僧祇者大衆也此根本調伏藏即大衆部毗奈耶也佛圓寂後尊者迦葉集千應真於王舍城竹林石室之所結也開元釋教録云自摩訶僧祇律已下四十五帙四百四十六卷為聲聞調伏藏者經云勝故祕故佛獨制故如契經中諸弟子或諸天説法律則不爾一切佛説有十事利益故諸佛制戒一攝僧故二令僧一心故三令僧安樂故四折伏高心故五有慙愧人得安穩住故六不信者令得信故七已信者令增長故八遮今世惱漏故九未生諸漏令不生故十佛法得久住為諸天人開甘露施門故出十誦律律戒中犯重曰波羅夷次曰僧伽婆尸沙此云僧殘次曰波逸提次曰波羅提提舍尼次曰突吉羅皆梵語也云何名波羅夷破壞離散名波羅夷為刀矟所傷絶滅命根比丘法中斷滅不復更生如人斫頭更不還活為惡所滅比丘法中更無所成故名波羅夷僧殘者如人為他所斫殘有咽喉少在不斷若得好醫良藥可得除差無者不可差也犯僧殘有少可懺悔之理遇清淨大衆懺悔可得罪滅云何為波逸提如被斫者少傷其皮不至命波逸提傷善處少波羅提提舍尼者非故心作犯即懺悔數犯數悔故偷蘭遮者欲起大事不成也突吉羅者此名惡作此出毗尼母論第七卷十誦律六十一卷攝以右初誦四波羅夷法名異分若犯一事非沙門非釋子失比丘法故名異分次僧殘不定捨墮墮法波羅提提舍尼法衆多學法止諍法名不異分若犯是事故名比丘故名釋子不失比丘法故名不異分初誦一至六戒淫盜殺等法二誦七至十三衣鉢等法三誦十四至二十戒用蟲水九十波逸提説罪滅諍等法四誦二十一至二十八受具布薩自恣安居皮革醫藥衣等法五誦二十九至三十三施衣懺悔驅擯故出精苦切依止羯磨等法三十四臥具三十五諍事法六雜誦三十六至四十一種種制戒七誦四十二至四十六尼戒八誦四十七至五十增一法九誦五十四優波離問事十誦五十五至五十八善誦五十九説結集事六十毗尼雜品波羅夷者名為墮法名為惡法名斷頭法名非沙門法不共住者如先白衣時犯行淫如針鼻缺不可復用如人命盡不可復活如石破不可復合如斷多羅樹心不可復生名非梵行法懈怠法狗法可惡法根本説一切有部毗奈耶五十卷甘益右武后時義淨等譯其序云佛説律為本能生諸善法如樹根為本枝幹由是生律能遮毀禁如堤防暴流三世諸賢聖遠離有為縛皆以律為本能至安隱處若此調伏教安住於世間即是諸如來正法藏不滅離此即便無安隱涅槃路能生衆功德如地載群生不調令善順如象馬鈎䇿律能防破戒如城禦怨敵律是法中王諸佛之導首善道之橋梁苦海大船筏險路之善導直升無畏城佛及聖弟子咸依律教住佛云我滅後戒是汝導師仁等應至心善聽調伏教毗奈耶序述制緣起所應學處凡百餘條末有七佛説戒經偈根本説一切有部苾芻尼毗奈耶二十卷詠樂右佛制尼學處百八十法又第四第五部衆學法七滅諍法七佛説戒經偈與前五十卷毗奈耶事多相涉而詳略有異毗奈耶雜事四十卷殊禮右四十卷中總有八門九十頌有種種制學處緣法佛諸弟子勝光等諸國王及勝鬘行雨夫人琉璃王誅釋子墮地獄難陀出家證果目連舍利子入滅訶利底母愛兒等緣末數卷記佛降生入涅槃結集等事一切有部尼陀那五卷別一切有部目得迦五卷右種種制學處多與前部相涉而詳略有異五分律三十卷尊上右宋景平元年佛陀什等所譯即化地部毗奈耶藏佛圓寂後三百年中從説一切有部之所出也與十誦律根本毗奈耶多相涉此律分作五分分謂部類劑限不同故第一分十卷波羅夷法第二分尼波羅夷法十一至十四第三分十五至二十二受戒法衣法藥法食法等第四分第二十三至二十四滅諍法等第五分二十五至三十初破僧法雜法等四分律六十卷和婦右姚秦佛陀耶舍等譯序偈云衆經億百千戒為最第一如王治正法如醫治衆病若有捨戒者於佛法為死持戒如護命守之無毀失譬如得王印所往無挂礙小毀則不定大毀入三惡音釋沫莫割切耗呼到切減也蜎隳緣切小飛也蠕乳充切蟲動也古猛切麥也猘居例切狂犬也鶖七由切水鳥也抵丁體切觸也痔瘻痔直里切瘻落候切痔瘻後分病也
