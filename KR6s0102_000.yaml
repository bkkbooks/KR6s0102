body:
  text: 大藏聖教法寶標目序偈一元清源居士王古撰歸命正遍知如來妙法藏十方大菩薩三尊真聖衆我今於法寶願作勝妙緣若以一毛端測量太空界如説須彌頂是諸天住處如指海波中大魚龍窟宅廣大殊勝處非一言可盡然其所標顯舉要非妄謬憫彼不遇者望涯而自絶常時對寶所終身空手過西域取經亡軀為法末法有安佚懶惰不肯展卷者暫能一經目即植菩提根未閲經者獲益清信樂法人未暇遍披閲昆山取片玊滄溟採如意隨其所欲見發函即有得未遍經者獲益多聞博覽人已知龍藏者溫故檢忘誤釋然得本明已遍閲經者獲益除彼大闡提有是種種益海墨書一義九旬而演妙云何以片言而欲顯法要舉廣難略如來在定時五百阿羅漢各各説所解而皆非佛意各順正理故可依而無罪我今所撰述率稽古德語非我妄臆説是故應信受答舉廣難智者悟筏喻不著文字相見月而忘指入海譏算沙離相忘筌難方便有多門豈以一廢百種種皆佛事全來彰妙用方便無礙答以此勝功德願常在佛會一音所演法歷耳永不忘如海受大雨亦如水傳器持以利衆生如法界無盡大藏聖教法寶標目序竊以至理遼敻絶名言而叵測法身昭應隨語默以總持露妙有之沖玄通群情之封滯由是鹿苑鶴林之提唱谷響傳音線花貝葉之翩翻雲垂布錦爰有法寶耀彼摩尼經律論藏泛性海之波瀾戒定慧學皎義天之日月遊上林之春則奇葩異卉紛馥鮮妍窺王庫之寶則美玉精金光明洞徹法寶標目者清源居士王古所志也公讀經該貫演義深玄舉教網而目張覽智鏡而神會故茲集要略盡教條溥為來機豁開寶藏流傳既久貝笈未收眼目所存誠為欠事即有前松江府僧録廣福大師管主八續集祕密經文刊圓藏典謂此標目該括詳明謹録藏中隨函披俾已通教理者覩智燈而合照心之解未聖言者掬法流而澡惑業之垢一覽之餘全藏義海暸然於心目之間矣善哉信而解解而行行而證證而極於言語道斷心行處滅了最上之真空傳法王之心印燈燈聮輝展轉分照廓法界之疆域入普賢之願海則效報於皇恩佛恩可知矣若夫棄經廢律歲月耽玩受聖門之利養甘面牆之蒙塞斯文也亦可為懲勸之一端云耳峕大德丙午子月既望江西吉州路報恩寺講經釋克己序大藏聖教法寶標目文前大科分為四𫨻初總標年代括人法之紀綱二別約歲時分記録之殊異三略明乘藏顯古録之梯航四廣列名題彰今目之倫序初總標年代括人法之紀綱自後漢孝明皇帝永平十年戊辰至大元聖世大德十年丙午凡一千二百四十一年中間譯經朝代歷二十二代傳譯之人一百九十四人所出經律論三藏一千四百四十部該五千五百八十六卷經藏大乘經八百九十七部二千九百八十卷小乘經二百九十一部七百一十卷律藏大乘律二十八部五十六卷小乘律六十九部五百單四卷論藏大乘論一百一十七部六百二十八卷小乘論三十八部七百單八卷二別約歲時分記録之殊異自後漢明帝永平十年戊辰至唐玄宗開元十八年庚午凡一十九代六百六十三年中間傳譯緇素總一百七十六人所出大小乘三藏教文凡九百六十八部四千五百單七卷上開元録所紀自唐開元十八年庚午至德宗貞元五年己巳凡六十年中間傳譯三藏八人大乘經論及念誦法一百二十七部二百四十二卷上貞元録所紀自唐貞元五年己巳至宋太宗興國七年壬午凡一百九十三年中間並無譯人其年壬午始建譯場至真宗大中祥符四年辛亥凡二十九年中間傳譯三藏六人所出三藏教文二百單一部三百八十四卷已上祥符録所紀自宋仁宗景祐四年丁丑至今大元聖世至元二十二年乙酉凡二百五十四年中間傳譯三藏四人所出三藏教文二十部一百一十五卷其餘前録未編入者經律論等五十五部一百四十一卷通前七十五部二百五十六卷依拾遺編入三略明乘藏顯古録之梯航開元録所紀經律論一千一十六部四千五百三十七卷大乘經五百六十三部二千一百七十三卷百册三帙律二十六部五十四卷五帙論九十七部五百一十八卷十五帙小乘經二百四十部六百十八卷四十八帙律五十四部四百四十六卷四十五帙論三十六部六百九十八卷七十二帙貞元録所紀經論一百二十七部二百四十二卷大乘經一百二十五部二百四十卷二十三帙論二部二卷祥符録所紀經律論二百部三百八十四卷大乘經一百四十部二百九十卷三十帙律一部一卷論一十一部一十九卷二帙小乘經四十四部六十九卷七帙律五部五卷一帙景祐録所紀經律論十九部一百五十卷大乘經九部一百八卷一十一帙律一部一卷論二部二十八卷三帙小乘經六部一十一卷一帙律一部一卷弘法入藏録及拾遺編入經律論七十五部二百五十六卷大乘經五十七部二百二十一卷七帙論六部六十一卷七帙大乘經一部十二卷一帙律九部五十二卷五帙論一部一十卷一帙弘法入藏聖賢傳記不在其數四廣列名題彰今目之倫序如文
