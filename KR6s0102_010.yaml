body:
  text: 元清源居士王古撰莊嚴寶王經四卷千右佛說觀自在菩薩救阿毗地獄極苦衆生及餓鬼等諸趣罪苦六字神呪不可思議功德聖吉祥持世經右佛為妙月長者貧窮多病說陀羅尼七佛讚右讚七佛并慈氏功德皆梵文大乘聖無量壽王經右佛因妙吉祥菩薩說無量壽決定光明王如來陀羅尼令夭壽人而得長壽聖佛母小字般若經右佛為觀自在菩薩說陀羅尼令衆生速獲菩提無諸魔難最勝佛頂陀羅尼經右陀羅尼前後別無經文無能勝幡王如來莊嚴陀羅尼經右佛因帝釋與阿修羅戰敗說陀羅尼一切怨敵無能勝者佛說守護大千國土經三卷右佛說大明王呪保護大千國土及釋梵天王等說呪保護衆生大方廣總持寶光明經五卷右如華嚴十住品發心功德品同本而此加詳出生一切如來經二卷右佛告金剛手祕密主持大教明王經法大乘日子王所問經兵右佛因日子王淫恚為說女人虛誑及丈夫淫欲四過一遠離佛法僧二不孝父母三恆多邪見四種種虛誑廣求財利大乘善見變化文殊問法經右佛為文殊說四聖諦四念處四正勤五根五力七覺分八正見金耀童子經右佛為童子授記及說夙因大寒林聖難拏陀羅尼經右佛為羅睺羅遊寒林為天魅龍鬼及異類擾惱說陀羅尼分別善惡報應經右佛為輸迦長者父作犬說六道善惡衆業受報差別及飲酒三十六過及種種行施果報樓閣正法甘露鼓經右阿難問佛作曼拏羅窣堵波如來像較量功德較量壽命經右佛說較量六道壽命長短大護明陀羅尼經右佛說陀羅尼遣阿難陀入吠舍離城作成就法退散一切衆生災難疾疫聖虛空藏菩薩陀羅尼經右佛在喜樂山二比丘為部多所執身有疾病虛空藏菩薩請問佛集七佛及虛空藏各說明呪除病去災延壽命法消除一切閃電隨求如意陀羅尼經右佛及觀自在金剛手大梵四天王各說呪除閃電中夭一切毒息除中天陀羅尼經右佛為四天王集十方諸佛說陀羅尼息除中天及老病四天王亦各說呪無能勝大明王陀羅尼經右佛說陀羅尼為人天作諸利樂一切障礙及鬼神暴惡無能破壞讚法界頌右龍樹菩薩讚法界妙理并六根六度等法十地及佛地等法諸行有為經右佛為諸苾芻說一切人天聖人外道等皆歸死滅嗟襪曩法天子受三歸獲免惡道經右帝釋為天子受三歸命終生覩史多天佛頂放無垢光明經二卷右為摩尼藏無垢天子命將終說陀羅尼能救中夭及惡道業蛇螫疾病兵戈怖畏能求子息最上燈明如來陀羅尼經右最上燈明如來遣菩薩來說陀羅尼擁護利益安樂有情佛與文殊等并四天王亦說陀羅尼增長有情佛力息除災難一切如來正法祕密篋印心陀羅尼經右佛受無垢妙光婆羅門請中路有大舊塔如來旋繞供養塔中諸佛全身舍利并陀羅尼能滅惡業除惡鬼毒獸究竟佛果六道伽陀經右佛說偈讚述六道受生因報勝軍化世百喻伽陀經右化人為善戒惡悟世無常妙法聖念處經八卷右佛為說六道苦樂因果與正法念處經略法集要頌經四卷高右尊者法救集諸經法頌凡三十三品皆頌法集名數經右略集佛法世法名數沙彌十戒儀則經右七十二頌說沙彌菩提行經四卷右龍樹菩薩集諸經法為頌凡四卷聖觀自在一百八名經右佛在補陀山觀自在宮宣說百八名文皆真言讚揚聖德多羅菩薩一百八名經右說觀自在一百八名真言持者如意消災增福持世陀羅尼經右佛因持世菩薩問說陀羅尼并壇印法求富貴及耕種等諸願十二因緣祥瑞經二卷右佛為大衆說用十二因緣配十二支位占人命及選日占相以定吉凶迦葉問大寶積正法經五卷右佛為迦葉說菩薩正法諸佛心印陀羅尼經右佛在兜率天說此陀羅尼利益天人世出世財豐足非人不害不生魔界無能勝大明陀羅尼經右無能勝菩薩說能降伏魔及人非人邪法毒藥等及消除災障無能勝大明心陀羅尼右無能勝菩薩說成就吉祥消除重罪除病延壽無中夭及除非人懷惡并邪法呪詛諸難金剛計論右法稱菩薩造破圍陀論妄執稱婆羅門種性行業最高等外道問聖大乘法無我義經右外道疑無我義佛為解說體本空故目連所問經右目連問佛犯戒所入地獄比諸天歲數差別苾芻迦尸迦十法經右佛為比丘說十種法戒為在會及未來而為師範苾芻五法經右佛說苾芻五戒法毗俱𦙆菩薩一百八名經右佛說菩薩一百八名真言成就吉祥增壽端正及得天龍鬼神恭敬一切惡獸枷鎖災難自然解脫多羅菩薩一百八名經右多羅菩薩說大陀羅尼自在天王說一百八名呪作大救護消除過罪煩惱解脫所願成滿大方廣菩薩藏文殊根本儀軌經二十卷冠右佛在淨光天上與文殊共說真言及粉壇畫燈上中下儀軌成就所願及念珠法并星宿災變凶吉及真言幀法等大自在天因地經倍右目連持鉢至崑崙山頂大自在天子所居歸問佛說大自在天因地所願大乘寶月童子問經右童子問十方佛名號佛為宣說聞者滅罪不墮惡道速得不退菩提佛為娑伽羅龍王說大乘法經右佛在龍宮為說大乘經以十善等法而為莊嚴及說十不善果報等事十號經右阿難問佛十號義佛為解說一切如來安像三昧儀軌經右佛說塑畫雕造諸賢聖像慶讚儀軌真言等法廣大蓮華莊嚴曼拏羅滅一切罪陀羅尼經右梵壽王入寺誤戴佛頂華鬘頭疼佛令觀自在說真言及幀法持誦法所有破用常住財物一切過罪悉皆除滅及說無憂皇后嫉妬果報事如意摩尼陀羅尼經右佛及梵王帝釋四王龍王各說真言除雷電怖畏及一切諸毒中夭惡病不祥大金剛香陀羅尼經右佛說此大明呪能降伏諸天宿曜觀想佛母般若波羅蜜多菩薩經右佛說真言并觀想菩薩法寶生陀羅尼經右持頌者得天耳通滅無間罪永斷輪回無諸侵害及無病苦蓮華眼陀羅尼經右持頌者滅罪無眼等五根病獲眼等五種清淨大金剛妙高山樓閣陀羅尼右前後別無經文普賢陀羅尼經右持者能枯竭煩惱值遇諸佛成就一切智寶藏神大明曼拏羅儀軌經二卷右佛說真言印法等持者得財寶及聰明等聖寶藏神儀軌經二卷右佛說真言印等儀軌持者得財寶人所愛重乃至成佛妙臂菩薩所問經四卷右妙臂菩薩問金剛手菩薩有人持誦真言清淨精勤而不成就金剛手為說持誦法及成就不成就之事大摩里支菩薩經七卷輦右佛說摩里支菩薩名號陀羅尼并壇等法持者所求皆遂在處常得擁護一切災難皆不能侵一切如來微妙大曼拏羅經五卷右佛在忉利天金剛手菩薩請問讚儀奉獻各有幾種賢瓶及灌頂法當云何作云何名曼拏羅及觀自在問息災增益愛敬等作護摩法佛為一說之及呪印等并說造塔功德聖莊嚴陀羅尼經二卷右佛因羅睺羅童子夜臥為羅剎驚怖說陀羅尼并為未來而為擁護慈氏菩薩等并釋梵四王諸天龍藥叉等各說擁護真言聖無能勝金剛陀羅尼經右佛在妙高峯法會有天龍夜叉等為大力聖者降伏而來唱言怖畏佛勑金剛手說安慰陀羅尼千轉大明陀羅尼經右帝釋天王對佛自說此陀羅尼能除一切鬼神惱害及病毒軍衆水火惡獸惡夢等畏勝幡瓔珞陀羅尼經右佛為觀音等說此陀羅尼能滅重罪現世獲報智光滅一切業障經右佛為日月天子說佛菩薩名號及陀羅尼滅一切無間重罪普賢菩薩亦說陀羅尼華積樓閣陀羅尼經右師子遊戲菩薩問佛涅槃後供養舍利塔等所得福報佛說此經賢聖集伽陀一百頌右明布施及奉佛像廟等果報事最上意陀羅尼經右佛說妙吉祥往昔作比丘說此陀羅尼消除衆生一切災病等普賢曼拏羅經右佛說金剛界大曼拏羅法陀羅尼及金剛一百八名令相應法速得成就持明藏八大總持王經右佛說陀羅尼息災增益改惡為善及伏冤一切所求成就聖六字大明王陀羅尼經右佛說陀羅尼一切恐怖鬼神刀兵不能為害尊勝大明王經右佛說陀羅尼消除罪業怨家惡鬼不能為害聖大總持王經右佛說陀羅尼懺罪除病一切刀兵不能為害及通宿命如意寶總持王經右妙住菩薩問善男子受持章句云何不得見佛世尊說此人心住有為無善巧智摩訶帝經十三卷右佛因衆問令目揵連說釋種過去所生種姓并述佛出家成道度人事與本行集經所載同月光菩薩經右佛為比丘述舍利弗目揵連不忍見佛圓寂先入滅度夙生因緣金光童子經右佛為釋種金光童子說及敘過去造像植福事布施經右佛為比丘說三十七種布施差別及為舍衛國王說布施事揵椎梵讚右讚皆梵文毗婆尸佛經二卷右說毗婆尸佛為太子出家成佛度人說戒等長者施報經右佛為給孤獨長者說較量布施功德解憂經右佛說生死輪回勸令求斷生死聖曜母陀羅尼經右佛處星曜衆會因金剛手菩薩請問說陀羅尼延壽消除災害及一切毒大三摩若心經右佛於衆會降伏魔等令住聲聞乘七佛經右佛為比丘說七佛壽命父母弟子城邑名佛一百八名讚右釋迦佛一百八名并讚毗沙門天王經右毗沙門天王白佛一切鬼神等有不信佛惱亂曠野林間苾芻優婆塞等說此真言以為救護聖觀自在菩薩梵讚右讚八篇皆梵文文殊師利一百八名梵讚右讚十九篇皆梵文五十頌聖般若波羅蜜右佛因須菩提說般若聚集攝受一切善法聖最勝陀羅尼經右文殊師利為比丘說陀羅尼消除國界衆生疫病旱潦等佛說諸佛經右與將字函大自在天因地經同本異釋聖六字增壽大明陀羅尼經右佛因阿難有大疾病說此陀羅尼消滅一切疾病驚怖增慧陀羅尼經右大慧菩薩為童子相菩薩說陀羅尼誦者增益智慧明記不忘遍照般若波羅蜜經右佛為金剛手說般若祕蜜字義門并二十五種祕密般若字義門持者增益功德達宿命智大乘戒經右佛說戒為最勝不可犯帝釋般若波羅蜜多心經右佛說甚深般若波羅蜜多十八空等義聖多羅菩薩梵讚右讚皆梵文大乘舍黎娑擔摩經右佛因見舍黎娑擔摩說十二因緣法舍利子請問慈氏復廣其說此經與傷字府字函稻芉經本同而此尤詳四無畏經右佛為比丘說佛四無畏一切如來說佛頂輪王一百八名讚右讚一篇說佛一百八名大乘無量壽莊嚴經三卷右佛為阿難說無量壽佛本願及國土莊嚴功德佛母寶德藏般若波羅蜜經三卷右佛為四衆說般若伽陀三十品其品分十波羅蜜等諸法義薩鉢多野經右佛說法無常劫盡七日並出火災燒器界金剛手菩薩降伏一切部多大教王經三卷右佛因金剛手菩薩說降伏一切部多成就法金剛手說一切真言降伏印所求成就等法一切如來烏瑟膩沙最勝總持經右阿彌陀佛為觀自在說陀羅尼及燈像護摩等法持者延壽所求皆遂最上大乘金剛大教寶王經二卷轂右佛為印𭡠囉部帝王說四種乘及說夙因令金剛手菩薩為王說金剛大乘菩提心觀釋右釋發菩提心體功德如虛空無邊際護國尊者所問大乘經四卷右尊者問菩薩行法佛為廣說菩薩四法及說福光太子修行成佛事金剛香菩薩大明成就儀軌經三卷右佛為金剛手菩薩說陀羅尼印曼拏羅法一切息災增益愛敬降伏等無不成就八大菩薩經右佛說八大菩薩名及諸大菩薩五如來名號持者不墮惡道及長壽天等常生佛剎成無上道妙吉祥菩薩所問大乘法螺經右妙吉祥問如來法螺音佛為較量自持十善衆生至輪王帝釋梵天緣覺菩薩佛相好相倍功德分數金剛薩埵說頻那夜迦天成就儀軌經四卷右金剛薩埵說此最上儀軌作種種成就利益息災增益敬愛調伏等造頻那夜迦天像作成就法妙吉祥最勝根本大教王經三卷右妙吉祥說真言持頌曼拏羅儀軌一切成就法幻化網大瑜伽教十大忿怒明王大明觀儀軌經右毗盧遮那佛說十明王觀想法真言所求成就妙吉祥瑜伽大教金剛陪囉嚩輸觀想儀軌經右金剛陪囉嚩輸一切成就曼拏羅等法及一切調伏等所求皆得成就難你計濕嚩囉天說支輪經右彼天說十二宮分生人吉凶及諸宿攝於三趣囉嚩拏說救療小兒疾病經右囉嚩拏說小兒自一歲至十二歲所得疾病各有鬼魅名字及真言救療法較量一切佛剎功德經右佛說較量諸佛剎土晝夜長短即是華嚴如來壽量品大乘八大曼拏羅經右佛為寶藏月光菩薩說作八大曼拏羅持誦八大菩薩根本心大明迦葉仙人說醫女人經右迦葉仙人說女人妊娠逐月安胎所服藥持明藏瑜伽大教尊那菩薩大明成就儀軌經四卷右龍樹於持明藏略出世尊言修習諸成就法應於是教尊那菩薩大明法中修習及欲見菩薩阿羅漢一切所求真言印法曼拏那幀像護摩等法瑜伽大教王經五卷右世尊大遍照金剛如來為金剛手菩薩說真言印法及護摩作息災增益愛敬降伏事大乘觀想曼拏羅淨諸惡趣經二卷右佛說大曼拏羅法觀想字法真言呪法曼拏羅護摩等法淨諸惡趣一切佛攝相應大教王經觀自在菩薩念誦儀軌經右觀自在觀想結界儀軌及幀法息災增益愛敬降伏皆得成就俱抧羅陀羅尼經右佛說此陀羅尼能除部多惡曜及一切瘡病寶髻陀羅尼經右佛說陀羅尼消除一切災障作大利益能滅衆生極重罪業降伏一切天龍鬼神能除饑饉病疫毒藥及求財寶子息妙色陀羅尼經右佛說陀羅尼作大利益獲大福聚晝夜安樂加持出生飲食以祭諸鬼旃檀香身陀羅尼經右佛說能消極重宿業獲殊勝果及得見觀自在菩薩及除惡瘡癬鉢蘭那賖嚩哩大陀羅尼經右佛說辟除惡魔及惡鬼神遠離災害除諸疾疫宿命智陀羅尼經右佛說消滅千劫重罪終身受持能知宿命慈氏菩薩誓願陀羅尼經右佛說解脫惡趣轉身受勝妙樂慈氏受菩提記滅除五逆罪大陀羅尼經右佛說能滅五逆重罪如持千佛無異無量功德陀羅尼經右佛說滅千劫所積惡業得見慈氏觀音無量壽佛十八臂大陀羅尼經右佛說消滅根本罪業積集無量功德洛叉陀羅尼經右說受持如持洛叉佛無異成大福聚滅無量罪辟除諸惡陀羅尼經右佛說能除飛蝗毒蟲蚊䗈虎狼饑饉大愛陀羅尼經右海神大愛對佛說陀羅尼持者解脫海難妙吉祥菩薩陀羅尼無量壽大智陀羅尼宿命智陀羅尼慈氏菩薩陀羅尼虛空藏菩薩陀羅尼右共一卷皆梵文無畏陀羅尼經右佛說受持讀誦陀羅尼者一切災難雷電毒螫饑饉疾疫悉皆解脫尊那經右尊者尊那問佛世尊無盡功德可得不佛為說七種無盡功德寶授菩薩菩提行經右佛入廣嚴城乞食寶積童子與目揵連舍利弗文殊論說妙法阿羅漢具德經右佛說聲聞弟子各具功德及比丘尼烏波薩哥烏波薩吉各具功德八大靈塔經右佛說八大靈塔名號及處供養功德并戒日王作靈塔梵讚又三身梵讚共一卷佛三身讚右并回向讚共四首西域賢聖撰又曼殊室利菩薩吉祥伽陀梵文一首不空三昧經七卷右世尊毗盧遮那令金剛手菩薩說曼拏羅成就法頌呪印幀法一切所求皆得成就大正句王經二卷右尊者童子迦葉破正句王邪見無有來世復無有人亦無化生義戒香經右佛為阿難說戒香遍聞十方延壽妙門陀羅尼經右佛為金剛手菩薩說陀羅尼持者延壽得二十種功德金剛手及梵王四天王各說妙門陀羅尼聖多羅菩薩經右為五髻乾闥婆王說菩薩陀羅尼并一百八名頌持者滅罪破魔增福所求皆遂一切如來名號陀羅尼經右觀自在菩薩對佛說諸佛名號并陀羅尼持者不墮惡道生天成佛息除賊難陀羅尼經右佛為阿難說陀羅尼息除賊難器仗悉不能侵觀自在菩薩母陀羅經右普賢菩薩對佛說此陀羅尼滅罪及見普賢觀自在無量壽佛多聞增長證宿命智得不退轉地祕密八名陀羅尼經右佛說金剛手祕密八名并陀羅尼持者不墮地獄生兜率天大吉祥陀羅尼經右佛為觀自在說大吉祥菩薩陀羅尼持者獲富貴功德不可具說乃至部多普令愛敬寶賢陀羅尼經右寶賢大夜叉王說此陀羅尼持者所作勝利皆得成就金銀珍寶悉皆供給法身經右說法身化身功德差別頻婆娑羅王經右與衆等至佛所諸婆羅門長者等見耆舊優樓頻螺迦葉侍佛有疑佛令迦葉現神變自稱是佛弟子佛因為王等說法令得見諦信解智力經右佛說信解力法能證真實之理謂佛五力十力唯佛能知非聲聞法人仙經右阿難問佛摩伽陀國頻婆娑羅王及諸優婆塞生何處佛為說王作人仙及人仙所說梵法信佛功德經右舍利弗對佛稱說佛種種最勝法及神通力善樂長者經右善樂長者目疾佛為說陀羅尼除愈舊城喻經右佛說觀十二因緣如被昔人所被之甲到昔人涅槃之城借城為喻也最上祕密那拏天經三卷右那拏天對佛衆會說呪法一切所求皆得成就解夏經右佛解夏日為舍利弗五百比丘說解夏法夏中三業互相忍可帝釋所問經右帝釋問佛盡愛斷除疑惑佛為說法證果決定義經右佛為比丘說五蘊五取十八界至七覺支八正道諸法名決定義四品法門經右佛為阿難說界處法緣起處非處法不了為愚人了者為智人護國經右護國長者投佛出家證果為父母及俱盧王說捨親出家法大宋高僧傳三十卷世祿侈右僧贊寧等奉勑撰採貞觀已來高僧五百三十三人附見一百三十人為十科三十卷法苑珠林一百卷右釋道世撰始從劫量終乎雜記部類之前各序別論令覽者就門隨部如提綱領焉景德傳燈録三十卷右僧道原披奕世祖圖採諸方語録次序源𣲖錯綜詞句由七佛而至大法眼之嗣凡五十二世一千七百一人成三十卷上進真宗御覽命翰林學士楊億等刊削裁定周歲成書永布寰海天聖廣燈録三十卷右駙馬都尉李遵勗集傳燈録後禪門宗師語句為三十卷仁宗御製序勑隨大藏流布天下建中靖國續燈録三十卷右法雲佛國禪師惟白集廣燈録後八十年諸善知識一千七百餘人語句偈頌等列正宗對機拈古頌古偈頌五門為三十卷音釋𮧬勿發切螫施隻切蟲行毒也幀猪孟切與㡧同芉古旱切與稈同妊娠妊汝鴆切娠失人切妊娠孕也䗈莫耕切與虻同勗許玉切
