body:
  text: 元清源居士王古撰根本説一切有部戒經隨十誦比丘戒本五分比丘戒本僧祇律比丘戒本僧祇律比丘尼戒本十誦律比丘尼戒本根本説一切有部苾芻尼戒本右七經同帙僧律四波羅夷十三僧殘二不定三十捨墮尼薩耆波夜提九十波夜提四悔過波羅提提舍尼衆學法七滅諍法尼律八波羅夷十九婆尸沙一百四十一波夜提餘尼薩耆波夜提衆學滅諍法數同佛制半月布薩説戒即此本也四分解脫戒本四分戒本四分僧戒本右本同譯別四分比丘尼戒本五分比丘尼戒本右尼律八波羅夷十七僧殘三十捨墮一百七十八墮法五分二百一十八悔過衆學法七滅諍法沙彌十戒經并七十二威儀法沙彌威儀沙彌尼戒文沙彌尼戒經右經題名義自具舍利弗問經外右佛説涅槃後律分為五部因緣舍利弗問佛制律或開或遮疑義及八部鬼神何故生於惡道而見佛聞法等事根本説一切有部百一羯磨十卷受右梵語羯磨此云時到亦云辦事謂集僧出家授戒出白衆罪悔過折伏諫擯等法百一者舉其大數與大律數雖不同無違妨也大沙門百一羯磨傅羯磨上下二卷曇無德律部雜羯磨十誦羯磨比丘要用彌沙塞羯磨本四分比丘尼羯磨優波離問佛經右優波離問戒律種種事四分律刪補隨機羯磨二卷訓右唐宣律師集四分僧羯磨三卷右唐懷素集四分尼羯磨三卷右亦懷素集大愛道比丘尼經二卷入右佛説比丘尼當受八敬法復受十戒行十事等乃受五百具足大戒佛正法當住千歲以阿難大愛道纍請度尼故減五百歲然佛言若女人作沙門精進持戒不犯毛髮現身化成男子復説受請受食行路入室出戶種種戒法當除滅八十四態法佛般泥洹後當有二千比丘尼末世時有八萬比丘尼奉持是法律皆得阿羅漢其餘者却後百三十劫當復奉是法律得阿羅漢根本説毗奈雜事攝頌入一切有部毗奈耶尼陀那頌根本説一切有部毗奈耶頌五卷右以少偈頌收戒律廣文總括宏綱使易記憶西域尊者毗舍佉等造目連問戒律中五百輕重事經右佛説戒律中罪犯輕重事理精詳迦葉禁戒經右説真沙門持戒行道不惜壽命不求供養有不行沙門法者不名沙門如貧人稱名大富如醫師不自愈病如摩尼珠墮不淨中如死人著金銀珍寶佛説戒消災經右説持歸戒人鬼神畏避不敢害犯佛説犯戒罪輕重經右佛説犯衆學戒九百千歲墮地獄犯波羅提提舍尼三億六十千歲犯波逸提二十四億四十千歲犯偷蘭遮五十億六十千歲犯丘尼誹謗如是毗尼者非吾弟子是魔朋侶世世學道不成不出三界優婆塞五戒相經右戒殺盜淫妄語飲酒可悔不可悔有罪無罪僧伽婆尸沙二百三十億四十千歲犯波羅夷九百二十一億六十千歲佛言若比丘比罪等事理精詳根本薩婆多部律攝十四卷奉母右尊者勝友造於佛戒律中以略顯廣明舉持犯輕重種種學處并佛略教非遮非許清淨不清淨等諸所有事皆明其義與諸部毗奈耶等多相參照摩得勒伽經十卷儀右説戒律中持犯輕重種種法參照諸部理事甚詳毗奈耶八卷諸右毗秦言去奈耶言真也去若干非而就真也降伏此心息此心忍不起降伏戒也息定也忍智也三世佛法藏祕要訓三乘聲聞使得道成佛皆從戒律始此律一部姚秦世初所譯律也制戒之因持犯輕重與諸部律多同但詞有詳略爾善見律毗婆沙十八卷姑伯右律毗婆沙名善具足分別戒相不雜他語於律中因緣根本所説義味具足善能分別一切律藏無有障礙故名具足第十八卷舍利弗與優波離問答律義甚詳佛阿毗曇經二卷右出家相品説一千阿僧祇世界衆生所有功德成佛一毛孔如是遍身毛孔功德成一好如是八十種好功德增百倍成如來一相三十相功德增千倍成一毫相千毫相功德增百倍成無見頂相次説十二因緣四諦等法義甚詳次説佛為衆演法受具乃至廣説滅惡法度人出家等事毗尼母論八卷叔右毗尼此名滅滅諸惡法故母論者廣攝律義故律藏外諸義一切經要皆在此中如衆流入海制戒因本皆在此中大比丘三千威儀經二卷右説行住坐臥衣服飲食等種種規繩詞簡事詳委曲精盡薩婆多毗尼毗婆沙九卷猶右此解十誦律論大解律中九十事及悔罪衆學滅諍等法律二十二明了論子右分別解釋律中所立名義阿毗曇八揵度論三十卷兒右迦旃延子造竺佛念等譯阿毗曇者此云無比法揵度者此云聚即法聚也解釋種種法義謂初説世間第一法頂法暖法次十二緣九十八使結繫四果見諦三界所斷煩惱四諦七覺意八智等法此論三十卷分為八揵度八部法類不同故一雜二結使三智四行五四大六二十二根七定八見八揵度中復列四十四品一雜雜明諸事故二結使明諸根隨煩惱三釋智慧差別四辨善惡邪正諸行五明淨根智證見聖諦理六辨利鈍根乘行業差別七明四禪八定差別八明意止欲想時節見解各不同故此論中性相理事法數無邊故名法聚亦是藏之別名故新論作八蘊阿毗達磨發智論二十卷孔懷右奘法師譯與阿毗曇論本同譯別譯文順暢即是説一切有部對法藏之根本佛圓寂後三百年中論師迦多衍尼子之所造也後代傳人本有廣略此發智論文義具足傳習之者號為身論以餘論各辨一支有異於身故阿毗達磨法蘊足論十二卷兄右大目揵連造集衆法寶聚普施群生論首偈曰阿毗達磨如大海大山大地大虛空具攝無邊聖法財今我正勤略顯示其總頌曰覺支淨果行聖種正勝足念諦靜慮無量無色定覺支離根處蘊界緣起法蘊足論者蓋阿毗達磨之權輿一切有部之洪源也大目揵連所製鏡六通之妙慧晣三達之智明桴金鼓於大千聲玉螺於百億摘藏海之奇鳩教山之勝珍使天鏡常懸法幢永樹衆邪息藩籬之望諸子騁遊戲之歡也佛涅槃後百有餘年疊啓五分之殊解開二九之異雖各擅連城之貴俱稱照乘之珍唯一切有部卓乎迥秀若妙高之處宏海猶朗月之冠衆星者豈不以本弘基永者歟至如八種揵度騖微于發智之場五百應真馳譽於廣説之𫟍斯皆揖此涓波分茲片玉遂得駕群部而高蹈接天衢而布武是知登昆閬者必培塿於衆山遊溟渤者亦坳塘於群澍矣出奘法師同譯靖邁序阿毗達磨集異門足論二十卷弟同右佛令舍利弗代吾為衆宣説法要自一法二法以至十法一法者一切有情皆依食住一切有情皆依行住二法品謂名色等總二十七門三法有十謂善不善根各三善不善尋各三惡行妙行各三三界欲恚害三界出離四法有十謂四念住四正斷四神足四靜處四聖諦四想四無量四無色四聖衆四沙門果次五法次六法以至十法佛歎善哉善哉汝能結集如來所説增一法門復告苾芻衆汝等皆應受持讀誦能引大善大義大法清白梵行菩提涅槃集謂聚積異謂差別法門名相各別異故足謂周足舍利子智慧第一於佛所説法十二分教中增一名數勒為一聚廣大周足故阿毗達磨識身足論十六卷氣連右提婆設磨阿羅漢造論初頌曰阿毗達磨正法燈心中淨眼智根本三界照明慧眼道一切法燈佛語海能發勝慧破諸疑是諸聖賢法衢路了此勝法至聰明悟斯聖教真佛子阿毗達磨界身足論三卷右尊者世友造説十大地法十大煩惱地法十小煩惱地法五惱五法數性相事理各各體性差別如地水火風四大欲色無色十八界等各不同故名界多界共聚集故名身攝義周圓滿足故名足總通大小乘三界九地五位修斷行門故基法師序云界身足論者説一切有部發智六足之一足也先是婆沙八蘊闕五蘊之幽趣發智六足無五足之玄文元本頌有六千後譯刪略為九百頌或五百頌奘法師翻八百三十頌文遺廣略義離增減神功妙思繄可殫言阿毗達磨品類足論十八卷枝交右尊者世友造唐奘法師譯一切法衆多流類不同此論各隨品類條貫義理收攝一切法周圓滿足不亂故總有五法一色法二心法三心所法四不相應行法五無為法第一辨五事品第二辨諸智品三辨諸處四辨七事五辨九十八隨眠六辨攝等法七答千問八次擇品如是諸品中收一切法義無不圓足衆事分門毗曇論十二卷友右宋天竺三藏譯二論本同譯別阿毗達磨大毗婆沙論二百卷投逸右梵語阿毗曇此言大法也阿毗達磨此云勝法或言無比法毗婆此云廣解説或云種種説出道安法師序及諸經音義佛涅槃後四百年健馱邏國王以諸部執師資異論召集賢聖大阿羅漢脅尊者世友尊者等五百人皆具三明六通復內窮三藏外達五明集義製論凡三十萬頌九百六十萬言備釋三藏懸諸千古窮其枝葉究其淺深佛法重明微言再顯唐三藏法師於西域具獲本文傳譯流布焉出西域記第三卷及本論後三藏偈俱舍釋論二十三卷心神俱舍論本頌右天親造解釋俱舍論三十卷中義理梵本來有先後故釋論在前本論在後俱舍論三十卷疲真右天親菩薩造俱皆也舍此云藏則庫藏之總名也出諸經音義此論博綜群籍備摧異説天竺大小乘學依此為本本序論有九品一分別界品説四大六入十八界等二分別根品説眼耳鼻舌男女命意等二十二根三分別世品廣説有情世間及器世間各多差別三界種種事相次四分別業品前言世別皆由業生此明種種善惡諸業業由隨眠方得生長次五分別隨眠品次六分別賢聖品説諸賢聖道相次七分別智品次八分別定品次九破執我品謂有我執無容解脫阿毗達磨順正理論八十卷志持右衆賢論師造衆賢博學高才明一切部毗婆沙論時天親先作俱舍論破毗婆沙門所執理奧文華西域學徒莫不讚仰鬼神亦皆稱習衆賢心憤二十年覃思作俱舍雹論欲與天親面定是非未果而終天親後見其論歎有知解言其思力甚順我義宜名順正理論遂依行焉阿毗達磨藏顯宗論四十卷雅爵右衆賢論師造序偈云已説論名順正理樂思擇者所應學文句𣲖演隔難尋非少劬勞所能解為撮廣文令易了故造略論名顯宗飾存彼頌以為歸刪順理中廣決擇對彼謬言申正釋顯此所宗真妙義阿毗曇心論四卷自右尊者法勝造論列十品辨一切法門義理行相令學者生解達法故法勝阿毗曇心論六卷右大德優波扇多造序云昔論師解釋太廣太略使學者迷惑煩勞今離於廣略釋不顛倒法相令人覺悟真實離諸過惡生諸功德得勇猛第一義利故雜阿毗曇心論十一卷縻都右尊者法救造序云諸師釋阿毗曇心義極略難解知法勝所釋最為略極廣令智退優婆扇多八千偈又一師萬二千偈此名廣也我達磨多羅專精思惟義賢衆所應學正要易解了於諸論中為殊勝具足顯示真實義一切境界故阿毗曇甘露味論二卷右一施戒品二三界五道品三住食生品四業品五陰持入六行七十二緣八根九禪智十無漏十一智十二禪定十三雜定十四三十七品十五四諦十六雜品逐品分辨法義得道聖人名瞿沙造欲令學者盡一切漏得一切智甘露味故隨相論二卷右説諸法不能自生藉緣方起如小兒藉扶方起人不能自生藉貪愛及業父母因緣方生如地水生榖芽若無人功置榖子地中芽終不生衆生作善惡業方牽生果各隨其相故尊婆須蜜論十卷邑華右婆須蜜菩薩大士次繼彌勒作佛師子如來也從釋迦文降生為大婆羅門父命觀佛侍佛四月已出家佛涅槃後撰此論一十品十四揵度該羅深度博盡諸法撰論已入三昧如彈指頃升神兜率與次補光焰如來柔仁如來皆集彌勒天宮三法度論三卷右説依三寶修行可度生死修財法無畏施可入聖道修身口意三業除三漏越三塗超三界近三寶除三毒滅三苦生三慧入三聖位等法故總名三法度論入阿毗達磨論二卷右塞建陀羅阿羅漢造説有學人聞對法中名義稠林便生怖畏欲令彼於法相海中深洄澓處欣樂易入故作斯論辨演阿毗達磨中八種法謂色受想行識空擇滅非擇滅總攝一切義成實論十六卷夏東右成謂成就圓滿實謂真實不虛此論辨一切法義皆真實圓成故初佛寶具足品四無畏十號三不護三善品衆法品十二部經品清淨品賢聖品福田品如是等二百二品類集演説詳如本論立世阿毗曇論十卷西右立謂成立世謂大千世界佛於起世經中説器世間有情世間四洲諸天三界諸趣因果善惡受生壽命依正勝劣地動晝夜種種地獄大小日月三災劫住成壞空等種種事相與起世經樓炭經俱舍論等相參照解脫道論十二卷二右阿羅漢優波底沙造以十二品演説分別因緣戒頭陀定求善友分別行行處行門五神通分別慧五方便分別諦後偈云無邊無稱不可思無量善才善語言於此法中誰能知唯坐禪人能受持微妙勝道為善行於教不惑離無明舍利弗阿毗曇論三十卷京邙右與舍利弗集異足門論法義相涉而體製不同初十二入品次十八界品次五陰四聖諦二十二根七覺不善善根四大優婆塞諸界諸業四果三乘二覺等人品智品十二緣念處正勤禪定道品煩惱攝品緒品總演一切法名事理五事毗婆沙論二卷面右尊者法救造釋世友尊者所製五事論為欲開發深隱義如發伏藏令世間歡喜受用如除雲翳日月顯照世友製論為有弟子怖廣聞持欲令依止略文起明了覺於一切法自相共相明了故雖略説五事而攝一切法故毗婆沙論十四卷洛浮右説迦旃延子本誓願於五千佛修阿毗曇章句分揵度品數立章門此論解釋彼諸品法義三彌底部論三卷右説諸有情死此生彼中有陰五道三界捨受身等法四諦論四卷渭右婆藪菩薩造説苦集滅道法分別功德論三卷右説三寶及諸大弟子各有第一勝妙功德辟支佛因緣論二卷右説辟支佛觀老病死四時改變知一切法皆無常苦空無我因緣而覺故亦名獨覺神通變現飛空自在不樂説法以神足化人作勝福田十八部論部執異論異部宗輪論右皆説佛涅槃後諸部各異所從出生佛所行讚經五卷據右馬鳴菩薩讚佛功德自降生出家成道度人以至涅槃分舍利等為二十八品佛本行經七卷右密迹金剛為諸天人有不識見佛者頌説世尊功德自降胎出家成道利生以至涅槃分布舍利等事為三十一品百緣經十卷涇右撰集恭敬供養三寶受大福報生天得道及慳貪作惡墮餓鬼等種種善惡因果等凡一百緣出曜經三十卷宮盤右婆須蜜舅法救菩薩之所撰集比一千章三十三品名曰法句録其本起繫而為釋名曰出曜出曜者舊名譬喻即十二部第六部也本經序出曜者從無常品至梵志品採衆經之要藏演説布現以訓將來故名出曜經第六卷賢愚因緣經十三卷右説聖賢解脫受大福報生天得道及惡業人沉淪苦趣罪報輪轉種種因緣佛往昔捨身命求菩提為月光王施頭尸毗王以身代鴿薩埵太子飼虎佛成道梵天請轉法輪及降伏六師等緣給孤獨長者布金買地造寺及為過去七佛皆造寺二鸚鵡誦四諦法為野狸所殺七反生天成辟支佛等緣修行道地經七卷樓右總衆經之大較示修行之徑路使學者易進無惑次第曉然多所決擇道地經右與前經本同譯別文句簡略耳僧伽羅剎所集佛行經三卷右僧伽羅剎須賴國人佛後七百年著此經賢劫第八佛也載釋迦降生成道行化入滅事迹甚備與普曜本行等經相參照手援樹葉而立化國王以巨象挽絙終不能動搖即就焚化樹葉不燋修行道地經亦其所著也百喻經四卷觀右尊者僧伽斯那撰以一百事喻説道法邪正戒律持犯修行善惡等事菩薩本緣經四卷右説佛昔因地以國城妻子布施種種緣大乘修行菩薩行門諸經要集三卷右終南山智巖集於諸經四十二部中集菩薩行門總六十六條於修行人有大利益法珠之寶聚大乘之龜鑑也付法藏因緣傳六卷飛右元魏西域二三藏同譯略記自世尊付法迦葉展轉付受至師子尊者傳法因緣坐禪三昧經二卷右説修習禪定法什法師譯佛醫經右説四大病苦種種因緣水屬口火屬眼風屬耳等惟日雜難經右説世尊及菩薩二乘人修行功德等種種差別法義因緣迦葉赴佛涅槃經右説世尊入滅迦葉來赴供養偈讚等事呵色欲經右説捨欲復念如出獄思入如病差思病種種呵誡四品學法經右説備戒行多聞能化度人為上品真學承法學為中依福學為下行三事號散侍為外品佛入涅槃密迹金剛力士哀戀經右密迹金剛力士哀戀世尊歎佛種種功德而為無常所壞帝釋勸止謂佛事周訖乃入涅槃汝等不應生大憂惱等佛使迦旃延説法沒盡偈百二十章右記末法中種種事佛説治身經右説戒行制身脫一切苦治意經右説精進守意福未滿自守已滿得禪那先比丘經二卷驚右國王彌蘭悉知異道能答九十六種經人問難無能勝者那先阿羅漢與王問答王大敬伏以所問答為經種種論難譬喻王言沙門言在世作惡臨死念佛得生天殺一生死即入泥犂中我不信是語那先言如人持小石置水上便沒持百枚大石置船上以船力故不沒人作惡以念佛力故生天作惡不知佛經故便入泥犂王言羅漢飛上梵天如人屈伸臂頃不信行數千萬億里如是疾耶那先言王念大秦國事王言我念已那先曰反復八萬里何太疾耶王稱善哉如是等詳如本經雜寶藏經十卷右集諸經古今事一百一十八緣初説佛於往昔孝養父母等種種緣事佛告諸比丘有二種法能使人疾得人天至涅槃樂一供養父母二供養賢聖有二法速墮三惡受大苦惱謂於父母及賢聖所作諸不善次集種種供養布施獻華然燈造舍造塔齋戒修行皆得生天受福報事及羅漢見沙彌後七日當命盡遣歸道中見水漂衆蟻救之得命延長及修塔修寺設齋延壽施食施衣受種種福報羅漢知宿命時作惡五百生作狗緣次説佛降伏曠野鬼神鬼子母羅睺羅住胎六年等緣五門禪經要用法圖右大禪師佛陀蜜多撰五門者一安般二不淨三慈心四觀緣十二緣五念佛若亂心多者教安般若貪欲多者教不淨若瞋恚多者教修慈若著我多者教因緣若心沒者教念佛禪觀法相甚詳略出觀佛三十事修慈四十事達磨多羅禪經二卷右説安般不淨觀四無量心觀五陰六入十二因緣等修行勝道進分住分退分種種功德法開示甚詳禪法要解經二卷右羅什譯説修不淨觀除五蓋得四禪相法修慈念佛修四無量心四無色定修六神通等法禪要訶欲經右説人身種種不淨衆生妄愛著邪淫及載目連為婦説偈法觀經右與內身觀思惟略要等經文意相涉入內身觀章句經右説身三十六物三百六十骨節九孔不淨等是為一切病宅一切苦器思惟略要法經右羅什譯説求初禪先習諸觀謂不淨四無量觀因緣安般念佛等觀無量壽法華三昧等佛説十二遊經右説佛降生成道十二年中於十六大國等處行化度人雜譬喻經二卷雜譬喻經寫右抄集諸經中善惡因果種種譬喻事阿育王譬喻經右初説育王作福以金鑄像與海龍王較福力輕重事後復有種種喻説善惡事阿育王經十卷右説佛行化路中有小兒沙中戲以沙為糗捧內佛鉢以為一繖地王於佛法中廣作供養佛記涅槃後百年鐵輪阿育王廣興供養起八萬四千舍利塔後育王登位造地獄多所殺害有阿羅漢於鑊湯中現十八變王大驚異羅漢説佛所記王能役使龍鬼夜叉於一日中安置八萬四千塔已作廣大供養布施等事第六卷後説優波笈廣度弟子事阿育王傳七卷右與阿育王經本同譯別第三卷後載優波毱多廣行化度等事阿育王太子息壞目因緣經二卷禽右説育王太子業報壞目本緣事四阿含暮抄右本序云阿含暮秦言趣無也阿難既出十二部經又採撮其要徑至道法為四阿含暮與阿毗曇及律並為三苑焉文約義豐經之瓔鬘法句經二卷獸右集佛偈以類分品法句喻經四卷右説佛行化度人種種教化譬喻句偈迦葉結集經右略記諸大阿羅漢結集法藏緣撰集三藏及雜藏經右迦葉阿難等結集法藏魔波旬來嬈法集阿難迦葉化人狗蛇三尸繫魔頸降伏之遂成法藏三慧經右説種種緣法似四十二章阿毗曇五法行經右説四諦及諸結使等義阿含口解十二因緣經右説十二緣等種種法義小道地經右説修行持息等法文殊發願經右大略如普賢行願經六菩薩亦當誦持經右説六菩薩功德宜應持誦一百五十讚佛頌右讚如來種種勝妙功德讚觀世音菩薩頌右讚淨聖種種功德無明羅剎經三卷畫右説十二因緣種種譬喻馬鳴菩薩傳龍樹王菩薩傳提婆菩薩傳龍樹弟子右三菩薩傳略與付法傳事迹相類婆藪盤豆法師傳右梵語也此云天親并説無著菩薩等事迹龍樹菩薩勸誡王頌勸發諸王要偈龍樹説法要偈右三本本同譯別是龍樹菩薩以詩代書寄諸親友國王等種種勸發教誡簡要精切寄歸傳云西域學佛法人首皆誦此金七十論三卷右仙人迦毗羅從空而生自然四德一法二慧三離欲四自在憫世盲暗起大悲心為婆羅弟子問答演説一切微妙法義此七十偈論是大論略抄攝六萬偈義盡勝宗十句義論右尊者慧月造十句義論一者實二者德至十者無説辨種種法義賔頭盧為優陀延王説法緣經右訶勸捨離五欲無常之法二鼠侵藤醉象四蛇等喻苦切精至請賔頭盧經右説請聖僧法分別業報略經右説善惡諸趣因果報應事當來變經右記説末法種種變事大阿羅漢難提蜜多羅所説法住記右唐言慶友説十六大阿羅漢并眷屬等名數住處護法應供等事過刀兵劫至人壽七萬歲時方入涅槃釋迦法滅并記人能於釋迦佛法中於三寶所種諸善根種種因緣得預彌勒三會獲涅槃果音釋晣之列切明也桴縳謀切擊鼓椎也於阮切玉名騖亡遇切亂馳也培塿培薄口切塿郎斗切培塿小阜也烏交切地下不平也絙居登切大索也繖蘇旰切毱渠竹切
