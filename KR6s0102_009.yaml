body:
  text: 元清源居士王古撰釋迦譜五卷綵右梁僧祐撰舊十卷今合之一釋迦始祖二姓瞿曇三六世祖四降生成佛五七佛種姓衆數同異六三千佛緣七內外族姓名八弟子姓緣九四部名聞弟子釋迦氏譜右唐終南釋氏以僧祐譜文繁多述此一所依賢劫二氏族三所託方二四法王化相五聖凡後裔釋迦方志二卷右終南釋氏述一封疆序世界安立二統攝序佛所攝三千大千世界三中邊序天竺居天地中四遺迹序佛故迹謂西域記詳於土風略於遺迹五遊履序今古僧俗遊天竺可紀者六通局序佛化迹差殊不同七時住序正像住劫八教相序歷代興崇佛教經律異相五十卷仙傍右梁天監中勑僧旻等及稟武帝節略經律論事凡六部一天二地三佛四諸釋五菩薩六聲聞比丘尼人鬼神雜畜地獄陀羅尼雜集十卷啓右集諸經佛菩薩仙天真言而未詳集者僧可洪序其文重復真俗雜亂傳寫訛誤諸經要集二十卷甲對右唐西明寺釋道世集三寶等三十部序決教法修行儀軌罪福果報等諸經要義各以類從因述勸誡出三藏記集十五卷楹肆右僧祐撰考校自古譯經先後存亡真偽總別以類分目又集諸家所作經序記等及歷代高僧俗士問答注解律論目録衆經目録七卷右隋僧法經等撰類次衆經律論一譯再譯數譯失譯及重出別生疑偽別生謂抄出別行歷代三寶記筵右隋翻經學士費長房撰首以編年敘自周已來佛生滅譯經獲瑞像等事迹次編類譯歷代經及譯人事迹次類大小乘經目次開皇三寶總録次帝年次代録次入藏經次總目衆經目録五卷設右唐釋靜泰撰凡二千餘部六千餘卷一單本二重翻至六翻及聖賢集傳三入藏及別生四疑偽五闕本凡經各有紙數大唐內典録十卷席鼓右西明寺釋氏道宣撰序歷代所譯經次分大小乘次入藏次數譯從一次別出攝歸本部次闕本次注解次流化次疑偽次録目終次應感大周刊定衆經目録十五卷瑟吹續大唐內典録右釋智升撰序經目續麟德至開元所譯古今譯經圖紀四卷右唐釋靖邁撰序次逐代譯人事迹并所譯經律論目續古今譯經圖紀右釋智升撰慈恩寺翻經院圖畫古人傳譯緇素三藏邁公撰題後有藻繪而無題記今續之并序譯人事迹并所譯經目開元釋教録二十卷笙階右釋智升撰前十卷總序歷代所譯經律論目後十卷分大小乘經論集有譯無譯闕本疑偽別生異名重載亦有增拾遺一切經音義二十五卷納轉右貞觀沙門玄應撰逐經音釋并唐梵字義華嚴經音義二卷右唐沙門慧宛述西域記十二卷疑星右唐奘法師譯沙門辨機撰敘西域諸國風土城邑興廢佛法遺迹集古今佛道論𢖍四卷右西明寺釋氏撰敘歷代僧與道士對辨勝負續古今佛道論𢖍右敘佛法初來道士比較勝負事傳法記右右敘佛法初來道士比較及孫權等試驗事集神州三寶感通録三卷右道宣律師撰一述見諸天問答教迹戒律事二述歷代瑞像三初述聖寺次述聖教末述神僧事集沙門不拜俗事六卷右沙門彥琮纂序晉至唐奉議書詔不拜俗事三藏法師傳十卷通右敘玄奘法師取經事求法高僧傳二卷廣內右唐沙門義淨自西國還在南海室利弗逝國撰寄歸敘中國及交州新羅往天竺求法僧大抵多病難及住不回者及那爛陀寺圖高僧傳十四卷右梁僧慧皎撰一譯經二義解三神異四習禪五明律六亡身七誦經八興福九經師十導師論稱昔高僧本以八科成傳今以經導雖末而悟俗可崇故加二條足成十數法顯傳右法顯自述往來天竺取經等事續高僧傳三十卷左明右唐釋道宣撰十例一譯經二解義三習禪四明律五護法六感通七遺身八讀誦九興福十雜科又曰聲德傳稱凡此十條世罕兼美今就其尤最者隨篇擬論辨正論八卷既右唐釋法琳撰陳子良序并注以道士李沖卿劉進喜等謗法乃作此論三教治道一十代奉佛二佛道先後三釋李師資四十喻五九針六氣為道本七信毀交報八品藻衆書九出道偽繆十歷世相承十一歸心有地十二破邪論二卷右唐釋法琳撰難傳奕所陳毀佛法事上皇太子并秦王各有啓冠篇首十門辨惑論三卷集右唐大慈寺釋復禮答太子文學權無二釋典稽疑十門一通力上感二應形俯化三淨穢二別四迷悟見殊五顯實得記六反經讚道七觀業救捨八隨教抑揚九化佛隱顯十聖王興替甄正論三卷右僧立薿撰辨靈寶化胡等經虛偽弘明集十四卷墳右梁僧祐集并序集古今僧俗衛法諸文及製述於佛有益者以類編次廣弘明集三十卷典群右唐釋道宣集一歸正二辨惑三佛德四法義五僧行六慈濟止殺七戒功八啓福悔罪九統歸賦論詩讚凡九篇南海寄歸內法傳四卷英右唐三藏義淨撰用西域所見僧律儀依根本律集四十章以證東土違失比丘尼傳四卷右梁釋寶唱撰傳自晉升平訖梁天監凡六十五人集諸經禮懺儀二卷右唐釋智升撰集諸經禮佛讚偈懺罪儀法願生淨土上卷末云故信行禪師依經自行此法以世無正文故集此書下卷録比丘善導等所集願生淨土讚偈等説罪要行法右三藏義淨撰半月月盡憶所犯罪説罪自懺受用三水要行法右三藏義淨撰依聖教及西土現所行律為此方之式護命放生軌儀法右三藏義淨撰述濾水得蟲放生器并法大方廣佛華嚴經四十卷杜字至隸字此下貞元譯右南天竺烏茶國王手自書寫華嚴經百千偈中善財童子參五十五聖者入不思議解脫境界普賢行願品并書來進唐德宗貞元中詔三藏般若譯成四十卷即是實義難陀所譯第六十一卷至八十卷入法界品同本而貞元本文廣事詳幾增一倍若普眼長者甘露火王妙德圓滿主林神最寂靜婆羅門等法門奇特多舊所未出又實義本第八十卷未有流通分而貞元本末卷之首爾時普賢稱讚如來勝功德已乃是聯環第八十卷末前偈次説十大願王卷末列衆部信受奉行即本末具備方見前八十卷末品來文未足守護國界陀羅尼經十卷漆右佛於菩提樹下與大菩薩八萬四千及諸天人等説此守護國界陀羅尼有三十二修陀羅尼法十六種如來大悲三十二種如來甚深事業種種莊嚴法門持誦儀軌等第十卷末阿闍世王問人命終墮惡道或生人天云何得知誰人曾見佛説當墮地獄者有十五種相生餓鬼者有八種相生畜生者有五種相當生人天者各有十相詳如本經教誡切至大集大虛空藏菩薩所問經八卷書右貞元中不空譯與大集經中虛空藏菩薩品本同譯別文理互有詳略大乘密嚴經三卷右不空譯與墨字函經同本異譯大乘理趣六波羅蜜多經十卷壁右慈氏菩薩問甚深般若波羅蜜多大乘功德無盡法門不可思議佛説三寶功德六波羅蜜廣大微妙法門説逐品法門時各有無量菩薩得無生忍數十萬衆生發菩提心經末讚説此經廣大殊勝功德十地經九卷右貞元中尸羅達摩譯與華嚴十地品本同經初云薄伽梵成道未久第二七日住他化自在天王宮與異類佛剎來集菩薩衆金剛藏菩薩説十地品餘文或有小異處大寶廣博樓閣善住祕密陀羅尼經三卷府右與悲字函經本同譯別大雲輪請雨經二卷右與大字函經本同譯別大孔雀明王經三卷右與男字函經本同譯別慈氏菩薩緣生稻稈喻經右與傷字函經本同譯別已上並不空譯瑜伽金剛性海曼殊室利千臂千鉢大教王經十卷羅右瑜伽金剛五頂五智尊千手千鉢鉢中千佛文殊祕密菩提三摩地一切如來大教王入佛心三密三十支智鏡性海具足一切法入毗盧遮那灌頂法門五智五頂五如來解脫門一切諸佛菩提根本文殊無盡甚深十大願十六大士十大菩薩行願功德持誦修證法門大乘本生心地觀經八卷將右佛在耆闍崛山與三萬二千阿羅漢八萬四千一生補處菩薩八部眷屬百千萬億圍繞供養佛放大光明照十方界時次補彌勒大菩薩師子吼説偈讚佛願為演説心地觀門大乘妙法引導衆生令入佛智文殊彌勒諸大菩薩與佛問答微妙法義佛説有四恩德不可得報一父母恩若時割自身肉以養父母未能報恩應勤孝養若人供佛福等無異二者衆生以其多生互為父母故於一切時亦有大恩舊恩未報宜互饒益三者國王恩護持衆生使安樂故四者三寶恩利樂衆生不可思議故佛法僧寶功德名真福田復説三者何故名寶詳如本經已上第二卷次説持戒懺悔及三身功德法寶利益第三卷次比較出家在家功德過患第四卷佛言出家比丘常當晝夜如是觀察我得人身諸根具足從何處沒來生此間於三界中當生何處於四大洲六道之中受生何道以何因緣免八難身莊嚴劫千佛已涅槃星宿劫千佛未出現住賢劫幾佛涅槃幾佛未出何時彌勒下生人間今我身中有何善業戒定慧學當有何德過去佛皆已不遇未來佛得見不耶現在凡夫地三毒煩惱何者最重一生已來造何罪業種何善根我此身命能得幾時是日已過命隨減少猶如牽羊詣彼屠所漸漸近死何所逃避身壞命終當生何處三惡道苦如何脫免勿貪世間受五欲樂精勤修習如救頭然懺悔先罪調伏其心名真出家披福田衣不貪知足常行乞食醫藥知足住阿蘭若離喧攝心如是四無垢性甚深法門各各有十種功德受持讀習解説書寫現世獲大福智命終必生知足天宮奉覲彌勒若願生十方佛土隨願見佛第五卷離世間品説住阿蘭若處功德利益猒身品説有漏身三十七種不淨穢惡不堅牢過患第六卷波羅蜜品説十波羅蜜乃至八萬四千波羅蜜法觀心品文殊問佛云何為心地大妙智印佛告文殊勝祕密心地法門名一切凡夫入如來地頓悟法門名一切菩薩趣大菩提真實正路名三世諸佛自受法樂微妙寶宮名一切饒益有情無盡法藏能引諸菩薩衆到自在智處是最勝法幢是大師子吼三界之中以心為王能觀心者究竟解脫不能觀者究竟沉淪衆生之心猶如大地五榖五果從大地生如是心法生世世善惡五趣有學無學獨覺菩薩及於如來三界唯心心名為地一切凡夫親近善友聞心地法如理修行速圓衆行疾得菩提文殊白佛心法本無不染塵穢云何心法染貪瞋癡過去已滅未來未至見在之心不住內外中間都不可得本無形相無有住處一切如來尚不見心何況餘人佛答微妙廣如本經文殊白佛凡夫初心依何等處觀何等相佛言凡夫所觀菩提心相猶如清淨圓滿月輪於胸臆上明朗而住五十由旬無垢明淨內外澄徹最極清淨月即是心心即是月塵翳無染妄想不生能令衆生身心清淨堅固不退有加持真言印法等説逐品法門時新發意菩薩人天婆羅門海衆發菩提心得法眼淨住不退轉乃至十地妙覺者四萬八萬四千以至阿僧祇不可説一切有情等皆當得菩提佛説此經利益安樂一切衆生凡夫身便入佛地信解此經一四句偈其福不可限量勝以恆河沙大千世界滿中七寶供養十方諸佛菩薩精舍寶塔等十六分不及一大方廣入法界品四十二字觀相右譯翻梵字并出觀法護國仁王般若經二卷右與羽字函經同本七俱𦙆佛母準提陀羅尼經右説持誦功德儀範大聖文殊師利菩薩莊嚴經三卷右與鳥字函文殊受記經同本異譯普遍光明大隨求陀羅尼經二卷右説持誦寫戴有種種殊勝功德熾盛光佛頂銷災陀羅尼經右佛説除一切災難法能成就入萬種吉祥事能除滅八萬種不吉祥事金剛頂瑜伽真實大教王經三卷路右説持誦印呪求願降伏等法一字奇特佛頂經三卷右説持誦有種種殊勝功德文殊所説宿曜經二卷右説日月五星二十七宿唐二十八十二宮分年月日時所主吉凶諸法菩提道場所説一字頂輪王經五卷俠呵唎哆羅陀羅尼阿嚕力經大威力烏芻瑟摩明王經二卷右三經皆説持誦祈呪有大應驗種種法門一髻尊陀羅尼經槐右觀世音説陀羅尼利益衆生結界建壇持誦護摩種種祈願降伏息災成就諸法末利支提婆華鬘經右佛説末利支天常在日前行日不見彼彼能見日王難賊難行路曠野晝夜水火鬼難毒難中救護衆生印壇持誦滿種種願鬼蠱蟲蛇種種瘡病解厄求財除睡縛賊等法大方廣曼殊室利經右説持呪畫像印壇祈願等法般若心經普遍智藏般若波羅蜜多心經右即是般若心經與什法師奘法師譯小有增多雨寶陀羅尼經右妙月長者多眷屬少資財又多疾病告佛佛為説此經令滿所願摩利支天經右與才字函經本同譯別文殊問字母經右佛答文殊問一切諸法入於字母及陀羅尼字法瑜伽念珠經右金剛手菩薩説珠表勝果中間滿為斷漏線貫串表觀音母珠表無量壽不可驀越過校量木鐵水晶菩提子等得福之量木槵經右國王問國貧民困不得安臥求佛法要佛説木槵子持誦法莎斗比丘誦三寶名滿十歲得斯陀含果今在普香世界作辟支佛大吉祥天女經右受持名號除一切怖畏逼惱貧窮災橫等有一百八名出生無邊門陀羅尼經右佛召集十方諸大菩薩説此陀羅尼持誦有殊勝功德觀自在説普賢陀羅尼經右説持誦祈願殊勝種種功德八大菩薩曼茶羅經右佛説有八曼茶羅是觀音慈氏虛空藏普賢金剛手文殊除蓋障地藏甚深法要依法建立一遍者十惡五逆謗方等罪皆悉消滅一切所求善利勝願皆得成就除一切疾病陀羅尼經右佛説陀羅尼除宿食不消霍亂風黃痰癊痔瘻淋瀝上氣嗽瘧寒熱頭痛著鬼悉得除差能淨一切眼疾病陀羅尼經右佛説此陀羅尼令眼無垢翳一切疾病毗沙門天王經右毗沙門天王白佛我願利樂諸有情等豐饒財寶護持國界此陀羅尼如摩尼寶能滿衆願説持誦祈願種種勝妙功德法救拔焰口餓鬼陀羅尼經右與羔字函面然經同本異譯仁王般若念誦法經右佛説仁王般若道場儀軌十法瑜伽翳迦一字頂輪王瑜伽經右説建道場持誦儀軌功德回向輪經右佛説持誦此密言一遍得百梵福夢常見佛諸罪消滅十力經右説佛具十種大智力故得名如來金輪正念誦法右諸佛頂經中廣説供養持誦儀軌今但晨暮修行要略之法華嚴長者問佛那羅延力經右較量牛象師子等力各各十倍增勝唯佛一一節中皆具八萬四千六百六十三種那羅延力金剛頂瑜伽深密門右説持誦種種深妙儀軌法十一面觀自在菩薩心蜜言念誦儀軌三卷卿右説持呪壇印畫像供養祈願種種法門菩提場莊嚴陀羅尼經葉衣觀自在菩薩經右皆説持誦祈願種種法一切如來金剛壽命陀羅尼經右佛説此呪為令衆生壽命色力皆得成就無死夭怖穰麌梨童女經右能除世間一切諸毒毒蟲毒蛇毒藥呪毒蠱毒魅毒皆不能害一切如來心祕密全身舍利寶篋印陀羅尼經右與兵字函經同本大方廣如來藏經右與過字函經本同金剛恐怖集會方廣軌儀經右説持誦祈願勝妙功德法門金剛頂瑜伽經十八會指歸右説金剛頂瑜伽十八會修持法要大吉祥天女十二名號經右説持誦天女名號功德穢迹金剛法禁百變經穢迹金剛陀羅尼法術靈要門右説持誦此呪能除一切病苦除遣一切鬼祟邪魅救度衆生滿一切願降伏一切凶惡鬼神除伏連蟲獸等皆不能為害有結印服符等法曼殊師利童子五字法金剛頂瑜伽經觀自在菩薩如意輪瑜伽經右並説持誦祈願等法千手千眼廣大圓滿無礙呪戶右與潔字函伽梵達磨所譯文別千手千眼根本真言右與前呪不全同亦有略注説法義處仁王般若陀羅尼釋右略解本經訶利帝母真言法右説治病滿願保胎求男女等法不動使者陀羅尼祕密法金剛頂經瑜伽修習毗盧遮那三摩地法大樂金剛不空真實三摩耶法大日經略攝念誦修行法金剛頂修行法大毗盧遮那成佛神變行法速疾立驗魔醯首羅尾奢法金剛頂降三世大儀軌金剛瑜伽文殊菩薩法金剛頂瑜伽觀自在修行儀軌仁王般若念誦法右十一儀軌各説持誦殊勝功德壇印供養攝召降伏種種祈願隨意成就法佛為優填王説王法政論經右與壁字函王法正理論本同金剛瑜伽中發菩提心論右大廣智説修瑜伽人身雖人身心同佛心以祕密加持頓同諸佛華嚴經云無一衆生而不具有如來智慧但以妄想顛倒執著而不證得若離妄想一切智自然智無礙智則得現前知一切衆生究竟成佛又云信解清淨心自悟不由他具足同如來則超凡夫位入佛所行處生在如來家令修行者觀照本心湛然清淨猶滿月遍虛空皎潔分明合普賢之心速具一切智金剛童子菩薩成就儀軌經三卷封毗盧遮那佛灌頂真言文殊菩薩根本大教王金翅鳥經觀自在修多羅瑜伽念誦法右四經各説持誦祈願種種法門大藥叉女愛子成就法經右神名歡喜母是婆多大藥叉將之女娉散脂大將生五百子有五千眷屬常在支那國護持世界此經説持誦供養功德種種祈願法門佛付囑令勤守護衆生以至法滅大樂金剛不空理趣釋陀羅尼門諸部要目右略説瑜伽經都十萬偈有十八會經説五部中方佛部毗盧遮那為部主東方金剛部阿閦佛為部主南方寶部寶生佛為部主西方蓮華部阿彌陀佛為部主北方羯磨部不空成就佛為部主五部主各有四菩薩為眷屬四部前右左背而安列外四部四門鈎索鎖鈴四方十六大菩薩六曼茶羅二十五種爐護摩等法事要目般若理趣不空三昧真實菩薩十七聖大曼茶羅義述右略舉十七清淨三摩地成證法門大乘緣生論右詳解十二緣生法門三十五佛名禮懺文右本出烏波離所問經能淨業障重罪現生所求禪定解脫皆得滿足五天竺國修大乘人六時禮懺不闕功德廣大不能盡録阿閦如來念誦供養法金剛壽命陀羅尼念誦法聖閻曼德迦威怒王神驗法觀自在如意輪念誦儀普賢金剛薩埵念誦儀不動尊威怒王使者念誦法大聖天歡喜雙身夜迦法觀自在大悲法門金剛頂瑜伽分別聖位修證法門右九經各各説持誦供養印壇祈願種種祕妙法門五字陀羅尼頌金剛頂超勝三界經金剛頂經文殊菩薩法一品右並説文殊五字呪功德殊勝法門文殊讚佛禮右文殊四十禮讚佛功德金剛頂瑜伽三十七禮右禮五佛諸大菩薩名號出生功德滅罪法百千頌大集經地藏菩薩請問法身讚右説法身法界菩提涅槃二乘十地二覺功德普賢菩薩行願讚右是普賢行願品略偈首尾不具經後有速疾滿普賢行願陀羅尼云日誦普賢行願後誦此真言一遍普賢行願悉皆圓滿速得三昧現前福慧二嚴速疾成就受菩提心戒儀右説最上乘受戒懺悔法大虛空藏菩薩念誦法金剛頂勝初瑜伽念誦法瑜伽蓮華部念誦法成就妙法蓮華觀智儀軌仁王般若儀軌甘露軍茶利念誦儀軌一字頂輪王念誦儀大孔雀明王畫像儀軌大樂金剛薩埵修行儀軌無量壽修行供養儀軌佛頂尊勝陀羅尼念誦儀軌金剛手光明灌頂儀軌金剛頂蓮華部心念儀軌觀自在心真言觀行軌儀金剛頂略出念誦儀金剛頂經一字頂輪王一切時處念誦儀他化自在天理趣會普賢儀軌大威怒烏芻澀磨儀軌右十八念誦儀軌並不空出各各説持誦本經修行儀軌金剛王菩薩祕密念誦儀軌右不空譯初云我今愍念一切求等覺者不知此祕密瑜伽速成佛法於三大阿僧祇忍諸苦行不至菩提故於金剛頂百千頌中略説毗盧遮那如來自性成就法身金剛界大圓鏡智流出他受用異名金剛王菩薩念誦儀軌以三密修行大印等令真言行菩薩速證等覺之位金剛頂瑜伽五祕密修行念誦儀軌右説金剛頂經百千頌十八會瑜伽演頓證如來內功德祕要若不五部五密曼茶羅加持自有漏三業身能度無邊有情無有是處以祕密加持威德力故於須頃當證無量三昧得一大阿僧祇劫所集福慧則為生在佛家從佛口生從法化生受得廣大甚深不思議法超越二乘十地修持法門詳如本經金剛頂瑜伽護摩儀軌右廣説護持多種如大瑜伽經今略説五種謂息災增益降伏勾召敬愛護摩爐形量方圓大小深闊畫五部壇位各有種種法相面向方位加持時分建壇擇地供養印呪法各差別此三世佛祕密法門皆須精曉勤敬修習無不成就修習般若波羅蜜菩薩觀行念誦儀右初頌云運心遍法界一切佛剎海廣多供養具宮殿衆樓閣種種寶莊嚴遍滿虛空界如空剎土爾如剎佛亦然如佛法亦爾如法供養然一切皆無量十方無邊剎敬禮諸如來入般若甚深體性三摩地現大月輪量同法界光明普照寂然清涼悲愍有情三界熾然如一子想未度者度未安者安未涅槃者令得涅槃種種加持法門有大殊勝功德結集正教住持遺法儀六卷給右尊者羅睺羅記沙門道宣譯初序結集儀式二序天人偈頌三序結集付囑相篇大迦葉問阿難答諸經首尾當安何語八部列衆先後次敘分布舍利牙印爪髮衣鉢杖錫坐具金瓶付囑安布置何處住持遺法利樂衆生過去諸佛傳付法衣剃刀經函寶塔等斷著毛羽衣斷用寶鉢斷食肉等二十九緣食施獲五福報經施餓鬼食經金剛壽命陀羅尼經右三經與開元録經本同瑜伽金剛頂注釋字母品右略解一切法不生名義性相等皆不可得音釋緇莊持切黑也繪黃外切畫也薿言紀切稈古旱切木莖也槵胡慣切木名也痰癊痰徒甘切癊於禁切淋𤁋淋力尋切𤁋郎擊切穰麌穰汝陽切麌元俱切
