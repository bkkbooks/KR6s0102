body:
  text: 元清源居士王古撰妙法蓮華經七卷鳴右佛為一大事因緣故出現於世為欲令衆生開示悟入佛之知見故說此一乘法授諸聲聞記如是妙法諸佛時一說之如優曇華時一現耳先示化城之權終與髻珠之祕雖三車異駕而一雨同滋皆令自知決定作佛說是經時多寶佛塔從地湧出十方諸佛集會證明六萬恆河沙等菩薩及其眷屬護持流布持經隨喜有六根清淨等無量功德若夫入旋陀羅尼諸三昧見靈山法會儼然佛常住不滅證悟者自知非思議境界天親菩薩論二卷天台智者證旋陀羅尼三昧九旬談妙妙玄文句止觀三大部三十卷盛行東南慈恩法師章疏廣化西北誦持靈感具有傳記流通震旦無盛此經法華三昧經右是法華支派無量義經右是法華前說薩曇分陀利經右是略出寶塔提婆品中少分正法華經十卷鳳右西晉竺法護譯品義大同翻文有異添品法華經八卷在右隋天竺三藏崛多笈多以秦譯有闕文添藥草喻之半提婆達多品陀羅尼次神力品後囑纍品在卷終餘諸字句亦間有改定維摩詰經三卷右什法師譯維摩詰此云淨名示疾毗耶離城佛遣聲聞諸菩薩問疾皆辭不任文殊與八千菩薩大弟子等來入丈室問答妙法深談實相不二法門等借座燈王請飯香積手按大千室容海衆亦名不思議解脫法門生肇融𠮉四法師注解天台智者略疏十卷維摩詰經二卷右吳支謙譯說無垢稱經六卷樹右奘法師譯已上三經本同譯別大方等頂王經大乘頂王經善思童子經二卷白右三經同本異譯善思童子維摩詰子也乳母抱持在重閣上見佛自湧身空中投下而住空中獻華問答說甚深法佛為授記作佛大悲分陀利經八卷悲華經十卷駒二經同本異譯右說諸佛本願莊嚴清淨佛土釋迦如來以大悲故願出五濁惡世成佛度生說釋迦佛因地布施身命種種大悲行願彌陀阿閦觀音勢至文殊普賢本所發願讀誦書寫此經乃至一偈勝十大劫行六波羅蜜金光明最勝王經十卷食合部金光明經八卷場右前後三譯經同品異初北涼曇無讖譯四卷十八品次隋僧寶貴合諸譯為八卷二十四品然文皆不足唐義淨譯十卷三十一品比前最備佛說是金光明微妙經典諸經中王說佛壽長遠三身差別金鼓懺悔天神護法大辨才天大功德天天王地神皆同佑衛此妙經法及供養天神天女誦呪祈願種種法門後說救魚生天捨身飼虎皆成佛因緣伅真陀羅所問如來三昧經三卷右伅真此言樹謂天伎樂神即乾達婆王名也大緊那羅王經與此本同譯別伅徒門反大樹緊那羅王所問經四卷化右二經本同譯別經初天冠菩薩問佛諸菩薩種種法門佛隨問答說菩薩諸四句法時大樹緊那羅王從香山中與諸大衆來禮敬佛奏諸伎樂須彌等山頗峨湧沒四衆八部大迦葉等惟除不退轉菩薩皆悉起舞不能自持樂中說偈八千菩薩得無生忍請佛菩薩於香山供養七夜佛說淨六度方便等諸波羅蜜一一各三十二法門六十萬餘衆生發無上正真道心授王作佛記又為八千王子說助菩提法為八萬四千夫人婇女說轉女身法及說菩薩成就三十二法能為法器及菩薩諸行法又法施有三十二功德此經亦名宣說不思議法品佛升忉利天為母說法經三卷右佛升忉利天度夏安居三月月天子問諸菩薩種種法門佛隨問答略如維摩經佛告目連勿謂佛獨在一閻浮提成道度生於三千大千世界中示現降胎現生成佛示滅略說四方四維等諸佛名號國土應現種種不同等事佛說道神足無極變化經四卷右與升忉利天為母說法經本同譯別寶雨經十卷被寶雲經七卷草右二經同本異譯除蓋障菩薩問佛云何菩薩得十波羅蜜圓滿云何得等於地水火風空如日月如師子如蓮華調伏寂靜廣大清淨智慧如海善巧辨才令衆生歡喜信受空無相願慈悲喜捨遊戲神通離八難處住不退轉得如來法身金剛身十二頭陀云何得種種善巧生清淨佛土乃至云何速證無上菩提佛各隨問為說問一答十微妙富備大略如華嚴普賢二千酬行法阿惟越致遮經四卷不退轉法輪經四卷木廣博嚴淨不退轉法輪經六卷右三經本同譯別廣略文異說佛出五濁方便說三乘化導衆生令入一佛乘他方淨土二十那由他劫植衆德本不如忍界從明至食說法化愚令受三歸五戒況勸人出家廣為說法令出三界佛說信行法行八輩四果辟支佛皆是不退轉菩薩微妙法門次諸大阿羅漢說密語我等具足五無間業謂無明能生生死為母不正思惟及喜愛為父壞諸想諸行為破僧不壞凡夫法滅羅漢想名殺阿羅漢滅如來想名出佛身血知一切法如幻如影如響故次說衆生若聞釋迦牟尼佛名者皆於菩提得不退轉況持一華以供養耶如尼拘陀樹種子甚小漸次長大至蔭五百人有東方佛剎來三大菩薩頭面禮佛言我等於此法中無有疑惑我是如來我是世尊我是佛爾時衆會皆作是念無有二佛並出世間何緣彼作是說佛偈云不住一切法求寂滅菩提亦不得菩提是故名如來詳如本國五百童女五千尼五千居士婦聞法不復受胎為女人皆生佛國無量無邊不可思議天龍八部人非人等皆於菩提得不退轉入定不定印經不必定入印經右二經本同譯別佛說五種菩薩行一羊乘行二象乘行初二菩薩於正等覺是不決定於生死海不能救濟一切有情退失無上道三日月神通乘行四聲聞神通乘行五如來神通乘行後三菩薩必定不退無上智道如來行中廣明種種大乘利他行法大心人之龜鑑也末說信敬供養瞋惡侵大乘法人極大罪福等集衆德三昧經二卷賴集一切福德三昧經三卷右二經本同譯別毗舍離城淨威力士自念我成就大力閻浮提中無與等者我當往觀佛何如我也佛欲降伏令目連取佛為童子時與兄弟捔力射箭著鐵圍山佛言是菩薩父母生力非神通力若以神力當過無量諸佛世界佛說人牛象師子力士諸天力諸菩薩力各各增上十乃當一以至十十地菩薩力等一後身菩薩力至成佛時超百千陪過於菩薩魔梵人天等不可喻說次復較量種種福德復說成就莊嚴福德種種法義復次佛諸菩薩問答解說此三昧法義持心梵天所問經四卷右經初說如來種種光明名號功德次持心梵天問何謂菩薩志性堅強言無惱熱德超衆生威儀安詳心不憒亂開化塵勞乃至於諸佛法而不退轉佛隨所問廣為演說次明網菩薩梵天文殊大弟子等問答法要又諸菩薩各隨所樂說菩薩法次梵天大菩薩等受成佛記末說此經大功德力思益梵天所問經四卷姚秦什法師譯勝思惟梵天所問經六卷魏菩提流支譯右二經與持心梵天所問經同本異譯佛放光明照三千大千世界普及十方無量佛土東方過七十二恆河沙佛土國名清潔佛號日月光如來有菩薩梵天名曰思益白佛欲詣娑婆世界佛言應以十法遊於彼土於毀譽心無增減於善惡心無分別於諸愚智等以悲心於上中下衆生之類意常平等於輕毀供養心無有二於他闕失不見其過見種種乘皆是一乘聞三惡道亦勿驚畏於諸菩薩生如來想佛出五濁生希有想於此國中百千萬劫淨修梵行不如彼土從旦至食無瞋礙心其福為勝持人菩薩經四卷萬晉譯持世經四卷秦什法師譯右二經本同譯別什師所譯文備詞順持世菩薩問佛云何菩薩能知諸法實相亦善分別諸法相云何得念力轉身成就不斷念乃至得無上菩提佛為隨問開示初品答所問種種法門次五陰品次十八性品次十二入品次十二因緣品次四念處品次五根品次八聖道品次世間出世間品次有為無為法品逐品法義至詳至妙及說過去諸佛本事此經有種種大功德利益乃至疾得無上菩提濟諸方等學經大乘方廣總持經右二經本同譯別佛說謗佛法僧人必墮地獄多劫不能得出佛說過去劫為法比丘以惡毒心謗淨命比丘揚其惡行八十劫中受地獄苦又多生墮畜生中方得人身常受貧厄瘖啞無舌法比丘者則我身是淨命比丘彌陀佛是由我過去愚癡無智受苦如是當知隨順惡友求法師短譏毀害為自傷大方廣寶篋經二卷方文殊現寶藏經三卷右二經本同譯別說文殊智慧辨才神通威德遊於諸佛國土現種種殊勝等事東方佛土有第一智慧弟子住梵天說法聲遍三千大千世界聞文殊發大音聲驚怖墜落如旋嵐風吹於小鳥復有佛土大火災起世界充滿文殊於彼火中作蓮華網而從中過火所觸和適快樂聲聞神力如小鳥文殊神力如金翅迅疾又七日七夜雨不斷絶諸比丘衆未得禪定者饑羸困苦文殊化一鉢食置講堂上千二百五十比丘萬二千菩薩皆得飽足鉢無減耗魔化四萬比丘來入會中亦皆受供鉢食亦無減耗悉皆降伏又文殊三月竟夏不現佛邊大迦葉問何所在耶答云我在王宮婇女中及諸淫女小兒中迦葉念言何緣此人與清淨僧衆為臘即撾揵椎欲逐出文殊即見十方不可計數佛邊各有文殊各有迦葉撾揵椎欲逐出之佛語迦葉汝欲逐出何者文殊迦葉慚愧欲置揵椎于地盡其神力而不能也佛令禮文殊乃得墮地佛言文殊三月教化城中女人宮中婇女及童男童女各五百人及無量人得不退轉成道得果或生天宮又說三十二德鎧法門三萬二千天人皆發無上道意是經亦名文殊所現變化降伏衆魔化諸異學名曰寶藏證契大乘經二卷大乘同性經二卷右二經本同譯別佛在楞伽山為羅剎王說衆生捨身受身中陰識神隨業輪轉戒律持犯善不善果報種種差別修行三十七品至成無上菩提聲聞辟支佛菩薩如來皆有十地如諸小河流皆入大海一切諸法皆悉流入毗盧遮那智藏大海同一真如清淨法性授羅剎王成佛記及說過去佛菩薩本緣深密解脫經五卷蓋魏菩提流支譯解深密經五卷唐玄奘譯右佛說一切法相略有三種一遍計所執相二依他起相三圓成實相遍計所執謂一切法名假安立自性差別依他謂一切法緣生自性如無明緣行乃至集大苦蘊圓成實相謂一切法平等真如通達修習乃至無上菩提一切諸法皆無自性無生無滅本來寂靜自性涅槃如空華如幻像如虛空無生無滅第三卷彌勒問瑜伽種種義極於微妙第四觀世音問十地十一地微細法門地地殊勝功德及二愚癡與所應學法六波羅蜜因果種種法門第五卷文殊問如來法身化身出現調伏說法威德住持等法門解節經右如理正聞菩薩問能解甚深義節菩薩一切法無二答說此經緣生初勝分法本經二卷右序曰本是一心積為三界理極實相筌窮假名五因七果十有二分緣生之法總備於此佛說十二因緣法義微妙衆經綱目攝在茲焉聖者楞伽作論釋此經先立偈三十後以論釋故亦名三十論分別緣起初勝法門經二卷右與緣生經同本異譯相續解脫地波羅蜜了義經右與解深密經第四第五卷同本異譯解在彼經楞伽阿跋多羅寶經四卷宋天竺三藏求那跋陀羅譯右佛在南海瀕楞伽山頂昔諸如來皆於此城說自所得聖智證法非外道邪見及二乘修行境界我今亦當開示此法時大慧菩薩致一百八問佛隨所問答說諸佛正覺性自性第一義心成就世間出世間上上法心意識生住滅相等一百八法傳燈録僧那禪師曰我初祖兼付楞伽經四卷謂我師二祖曰吾觀震旦唯有此經可以印心仁者依行自得度世又二祖凡說法竟乃曰此經四世之後變成名相深可悲哉我今付汝宜善護持入楞伽經十卷身三藏真諦譯大乘入楞伽經七卷髮實叉難陀譯右三經同本異譯初譯四卷楞伽夜叉王城勸請序致及流通等文不足次流支譯十卷次七卷則天久視年中譯序云此經諸佛心量之玄樞羣經理窟之妙鍵廣喻幽旨洞明深義跋陀之譯未弘流支之義多舛今討三本之要詮成七卷之了教傳燈之句不窮湧泉之義無盡菩薩行方便境界神通變化經三卷右上卷文殊說六波羅蜜等各各十二功德進修行門次二卷尼乾子說佛三十二相三十二大悲行三十七助道四無畏十八不共法等與尼乾子經同而稍略大薩遮尼乾子所說經十卷四右第一第二卷佛說一乘菩薩行方便境界奮迅法門第三尼乾子與八十八千萬尼乾子俱遊行諸國為嚴熾王說十不善業果報華嚴十地品第二同說國王護衆生法說轉輪聖王七寶功德又復有七種次寶七者一劒二海龍王皮三牀四園五屋舍六衣七足所用寶次說諸國王治國善惡法行法行王能救護衆生善行政治用兵愛民等種種事甚詳及說國王布施十五種功德次說外道聰明智慧各有罪過第六至第九說唯佛無諸過失三十二相八十種好三十七品菩提分法六通四無礙智十力四無畏十八不共法等不思議法門佛言尼乾子現行外道法以一切無量種種身化無量衆生發菩提心所供養佛不可量數過無量數劫當得成佛名實慧幢王國土勝妙壽法長遠此經是如來祕密藏純淨妙藏佛法印藏三千大千世界衆生俱時成佛有人滿足一劫供養禮拜爾所諸佛所得功德不如有人受持讀誦書寫流布此法門過彼無量無邊大方等無想經六卷大右大雲藏菩薩問佛云何修行得陀羅尼云何得大海三昧云何能解諸佛密語云何得知具足法義云何得到諸佛大海彼岸云何如來身不名為血肉筋骨之所成立若有如是身云何為空云何為地獄衆生作安樂云何得佛不可思議等問佛答所問說此經佛言此經諸佛菩薩四百不可思議解脫法門諸法寶藏神通王三昧等門此經三名大雲密藏菩薩所問故名大雲如來常住畢竟無有入涅槃者一切衆生皆有佛性故名大般涅槃受持讀誦斷一切想故名無想大雲輪請雨經二卷大雲經請雨品二卷右佛在龍宮諸大龍王與八十四億百千那由他龍王等俱來集會廣興供養佛為說除滅諸龍一切苦惱降澍甘雨誦陀羅尼念五十四如來名結壇祈求等法二經本同譯別佛言若一七二七日遠至三七日必降甘雨除不專念無慈心人及穢濁者海水潮來尚可盈縮此言真實決定不虛諸法無行經二卷五諸法本無經三卷右本同譯別佛與師子遊步菩薩文殊等問答說一切法性畢竟空寂無根本無形相無生滅無依住入是法門疾得無生法忍及說文殊與佛往昔因地謗毀說法性寂滅真空菩薩故人墮大地獄無極寶三昧經寶如來三昧經二卷右二經本同譯別佛入寶如來三昧震動十方無極佛剎海衆菩薩來會寶如來菩薩文殊舍利弗等種種問答慧印三昧經如來智印經右二經本同譯別世尊入佛境界三昧爾時衆皆不見如來身心相佛從三昧起舍利弗文殊彌勒等問答說是經大灌頂經十二卷常右卷別各是一經具列如左第一卷灌頂七萬二千神王護比丘呪經二卷灌頂十二萬神王護比丘尼呪第三卷灌頂三歸五戒帶佩護身呪經第四卷灌頂百結神王護身呪經第五卷灌頂宮宅神王守鎮左右呪經第六卷灌頂冢墓因緣四方神呪經說諸佛輪王四方葬法第七卷灌頂伏魔封印大神呪經第八卷灌頂摩尼羅亶大神呪經第九卷灌頂召五方龍攝疫毒神呪經第十卷灌頂梵天王神䇿經占卜吉凶第十一卷灌頂隨願往生十方淨土經或云普廣所問品即是別行隨願往生經說誦經然燈造幡追福等法追薦功德七分獲一若自發心獲福無量又說那含長者救父母生天因緣第十二卷灌頂拔除過罪生死得度經即是舊藥師經佛遊維耶離者佛說藥師如來本願經恭藥師琉璃光如來本願功德經右二經本同譯別說東方藥師佛本發十二大願攝受衆生國土莊嚴如極樂世界持誦願求種種如意及建立道場放生解結除病續命等法與前灌頂經第十二一卷本同譯別藥師琉璃光七佛本願功德經二卷右佛說東方七佛本因誓願國土莊嚴種種功德教人持誦求願第七即是藥師佛與前經本同譯別前略此廣阿闍世王經二卷右本同下後廣此略文殊師利普超三昧經三卷右文殊與諸菩薩問答法義時諸天子以佛道難成欲退取二乘滅度佛為救此等故放鉢於地下過七十二恆河沙佛土五百聲聞等皆莫能知鉢在何處文殊入普超三昧不起於座伸手下取而於鉢來諸佛土菩薩雲集於是退心者與無量衆皆堅發無上道心阿闍世王為造逆罪故問文殊諸大菩薩聲聞衆乞請決疑王上金色疊文殊等諸菩薩皆忽然不現乃至自不見身遂悟道文殊為說法王斷疑見諦得不起法忍佛為授記於未來世當得作佛號淨界如來放鉢經右即普超三昧經中文殊取鉢化退大心天子等月燈三昧經十卷惟右月光童子問諸佛行何等行能為世作光明得不思議智云何得說法最上智無邊智具戒定慧淨身口意能知宿命不處胞胎得不壞衆無礙辨佛所得諸法相到一切法彼岸願為我說佛為說此月燈正行一切諸法體性平等無戲論三昧解釋三百句法門經中廣說諸佛菩薩往昔因地行願微妙法義不可具載月燈三昧經鞠右說三界一切法生滅滅已寂滅為樂等法皆具六種不可思議如十八界四諦十二因緣等一者諸行道識不可思議二有為道識三無為道識四有住道識五無住道識六者皆空不可思議是為六種無所希望經象腋經右二經本同譯別佛說菩薩地甚深之法口誦心思是菩薩藏解此經者如大象力如大龍力能令菩薩勇猛故信解此經是人現致二十種功德大淨法門品經大莊嚴法門經二卷右二經本同譯別文殊教化勝金色光明德女發菩提心者即汝身是女聞法已宿善根故即得順法忍即能於四衆中如法說法與長者子同見佛受記下卷說非以剃髮染衣戒律等名為出家能除衆生煩惱三毒起四無量心等名為出家問答略如維摩經如來莊嚴智慧光明入一切佛境界經二卷右文殊為諸菩薩衆問如來法身不生不滅義佛為種種喻說度一切諸佛境界智嚴經右十方菩薩雲集文殊為請問無生無滅法義佛說此經後出彌陀偈經右讚往生淨土勝妙觀無量壽佛經右阿闍世王母韋提希夫人幽閉苦惱願往生淨土不樂復生濁惡世中佛為說極樂世界十六觀九品往生法門阿彌陀經什法師譯稱讚淨土佛攝受經奘法師譯右本同譯別並佛說無量壽佛國勝妙莊嚴種種功德勸人念佛往生彼國觀彌勒菩薩上生兜率天經養右佛說兜率天上有微妙寶宮四十九重垣牆宮殿寶華寶林欄楯琉璃為渠皆七寶所成莊嚴光明雨華天樂說妙法音極妙樂事說不可盡彌勒於一時中成就五百億不退轉天子若人能精勤修諸功德威儀不掃塔塗地以衆名香妙華供養行衆三昧深入正受讀誦經典雖不斷結若一念頃受八戒齊繫念發願即得往生彌勒於閻浮提歲數五十六億萬歲爾乃下生彌勒下生成佛經彌勒大成佛經並什法師譯彌勒下生經法護譯彌勒來時經失譯人名右四經本同譯別詳略異耳佛說彌勒下生時閻浮提地平淨如琉璃鏡寶華林樹過於帝釋歡喜之園人有智慧威德五欲快樂無九惱苦壽足八萬四千歲無中天者皆長一十六丈唯有三病飲食便利衰老人常慈心和順調伏無水火刀兵怨賊劫竊饑饉毒害之難不閉戶不殺生不貪衆寶人無遠近皆兩得相見八功德水異香華果充滿百味具足佛身三十二丈胸廣十丈面長五丈一一相有八萬四千好光照千由旬日月等光皆不為用早晨出家是夜成佛初會龍華樹下說法度九十六億人成阿羅漢第二會度九十四億人第三會度九十二億人皆阿羅漢詣耆闍山出迦葉定受釋迦衣迦葉奉衣已踴身空中現十八變說釋迦佛十二部經八十億人得阿羅漢彌勒住世及正法住各六萬歲於四天下各起八萬四千塔像法二萬歲大威燈光仙人問疑經第一義法勝經右二經本同譯別仙人問佛衆生流轉諸趣生滅輪回業相體性義佛說此經順權方便經二卷樂瓔珞莊嚴方便品經右二經本同譯別轉女身菩薩與須菩提舍利弗問答法義說三十種沙門法大乘諸行相貌法有二十無過患利益衆生事故如來乞食菩薩能隨宜機變順衆生樂欲而調伏之化令進道及說菩薩八種瓔珞莊嚴以自嚴飾化度一切衆生得無礙辨佛說轉女身菩薩方便成熟無量衆生受記成佛諸法勇王經一切法高王經右二經本同譯別意義與羊字函諸法最上王經本同解在彼經六度集經七卷豈右施度二卷說佛因地不惜身命國城妻子種種行施因緣戒度一卷忍度一卷精進度一卷禪度一卷明度一卷皆雜集衆經中事類佛昔因地戒忍精進定慧種種因緣菩薩睒子經睒子經右二經本同譯別出六度經第二卷施度中說菩薩因地孝行死而更生事太子須大拏經右與六度經第二卷中須大拏事本同譯別說佛因地為國王子施白香象故被逐入山復施二子及妃等事太子慕魄經太子沐魄經右二經本同譯異出六度經第四卷戒度中說佛因地為國王子不語十二年出家修道事九色鹿經右出六度經第六卷精進度中說佛因地為鹿王捨身濟人事音釋詰苦吉切瘖啞瘖於金切啞烏下切瘖啞疾不能言也撾陟瓜切擊也鍵巨偃切戶鑰也睒失冉切
