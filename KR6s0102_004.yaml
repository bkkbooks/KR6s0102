body:
  text: 元清源居士王古撰無字寶篋經敢離文字普光明藏經遍照光明藏無字法門經右三經本同譯別佛答勝思惟菩薩問菩薩所應斷除三毒我執懈怠睡眠無明等應當守護一法謂己所不欲勿施於人及如來所證知法老女人經老母經老母女六英經右三經本同譯別老母問佛四相五陰六根四大從何所來去至何所佛為說諸法來無所從去無所至如兩木出火如鼓出聲如雲雨雷電如畫隨意從空盡空萬物亦爾月光童子經申日兒本經德護長者經二卷右三經同本異譯說童子父名申日信奉外道以火坑毒食試佛童子諫父佛為降伏受度事文殊師利問菩提經伽耶山頂經大乘伽耶山頂經象頭山頂精舍經右文殊答淨光天子及諸菩薩問菩提心義菩薩行法四經本同譯別長者子制經菩薩逝經逝童子經右三經本同譯別說長者子以食與衣奉施如來佛為授記犢子經乳光佛經右犢子捨乳施佛佛為授記後二十劫作佛二經本同譯有詳略無垢賢女經腹中女聽經右佛說法無垢女在胎藏中跪聽即示現出生現大神變事轉女身經右經初如無垢賢女經所譯文義詳廣佛說轉女身法門無垢女等皆為男子無上依經二卷毀右阿難問造高閣及四事供養施四方僧與起佛塔供養舍利二種福德何者為多佛言供養微塵數世界四果辟支佛不如佛涅槃後取舍利如芥子大造塔如阿摩羅子大露槃如棗葉大此功德甚多於前若不回向菩提所獲福德如世界微塵數作諸天王況轉輪王下卷說如來三十二相八十種好種種勝妙功德因果不可思議未曾有經甚希有經右二經與前無上依經本同譯別前廣後略希有希有校量功德經最無比經右二經本同譯別佛說供養大千世界諸佛上妙樂具起塔高廣所獲福德不如起淨信心受三歸依受三歸依不如一念頃受持十善受十善不如一晝夜持八戒受盡形大戒其福轉勝前所獲福百千萬分不及其一大乘百福相經大乘百福莊嚴相經二經本同譯別右佛說一閻浮提衆生十善福聚數滿百倍成一轉輪聖王王四天下自在福如是百倍成一天王帝釋福聚又增滿百倍成一第六他化自在天王福又百千倍成一梵王福此上漸漸倍增成大千世界主大梵天福又無量億百千倍成一最後身菩薩福又無量億百千倍成如來一毛孔福復百千倍成一隨好福復百千倍成三十二相中一相福三十二相福聚始成如來隨類教化一切衆生音聲福聚如是威光勢力皆不可思議及所修因地行願法門決定總持經謗佛經右二經說十菩薩謗佛業障遇佛懺悔滅除大略同本真言別寶積三昧文殊問法身經入法界體性經右二經佛文殊舍利弗問答本同譯別如來師子吼經大方廣師子吼經右佛命勝積菩薩往北方法上如來所聽大師子吼方廣法門佛問汝從何來勝積默然海衆皆疑三界尊問云何不答佛現微笑曰諸佛境界不可思議當知無說是名真說二經本同譯別前世三轉經銀色女經右二經本同譯別說佛因地以身布施事阿闍世王受決經採華違王上佛受決經右二經本同譯別說然燈獻華供養世尊得授佛記正恭敬經善恭敬經右二經說弟子事師儀範及罪報稱讚大乘功德經妙法決定業障經右二經本同譯別說菩薩不應親近二乘人及說大乘名義大乘四法經菩薩修行四法經右二經四法謂寧失身命不捨菩提心親近善友不捨忍辱依寂靜處二經本同譯別諫王經傷如來示教勝軍王經佛為勝光天子說王法經右三經本同譯別佛為勝光王勝軍王等說世間福樂五欲貴富自在威勢宮殿園林親屬臣佐象馬車乘珍寶服御種種莊嚴悉皆無常不可長保年少會老強健必病含血之類要終歸死老病死時良醫拱手迅速不停隨業流轉墮諸惡趣不可以勢力逃避抗拒唯以正法治國勿行惡法應愍衆生皆如一子薄賦斂省徭役賞善罰惡遠離不忠良者無受言當受忠諫恭敬三寶教民為善能如是龍天歡喜福力延長國無災難壽命增益名聞十方後生天上乃至成佛佛言我終不說獲得世間諸欲樂具名富貴者得佛正法聖慧財寶積聚受用乃名圓滿真富貴者大方等修多羅王經轉有經右二經本同譯別佛為國王說無常空法文殊師利巡行經文殊尸利經右二經本同譯別文殊舍利弗問答文殊說真如法界衆生衆不減不增不染不淨等思惟十二因緣經緣起聖道經右二經說佛思十二因緣法本同譯別稻芉經了本生死經右二經本同譯詳略別稻芉經彌勒為舍利弗詳說十二緣義自誓三昧經如來獨證自誓三昧經右二經本同譯別說佛出家苦行成道淨居天現證及迦葉證果灌佛形像經摩訶剎頭經浴像功德經浴像功德經右四經本小有異譯別說供養舍利及造佛像以香水灌浴佛像諸供養中最為殊勝所獲福德無量無邊造佛像福報經作佛形像經右二經本同譯別優填王問造佛形像得何福報佛說得種種福報無量無窮不墮三惡道不生貧賤家生天得道乃至菩提其福甚多於江河海水出過十倍龍施女經龍施菩薩本起經右長者女名龍施見佛發無上道心樓上捨身即轉為男子佛為授記本起經本同更說龍施宿命為毒蛇聞法捨身生兜率天下生為長者女八吉祥經八吉祥呪經八陽經八佛名號經右四經各說八佛菩薩名號持誦功德本同譯別盂蘭盆經報恩奉盆經右二經佛為目連說救母法并為未來世為見世及七生父母祈福拔苦校量數珠功德經數珠功德經右二經本同譯別文殊說誦掐數珠一遍鐵者得福五倍赤銅千倍真珠珊瑚等寶百倍槵子千倍蓮子萬倍水晶者福萬萬倍用菩提子或但手持其功德無量無數不可稱量不空羂索神變真言經三十卷女慕貞右佛在補陀洛山與九十九億俱胝大菩薩及天龍八部居觀世音菩薩說是神呪是一切諸佛菩薩大寶光聚若造極惡業應墮阿毗地獄經無數劫受無間苦能懺悔持誦罪悉得滅不墮地獄唯五逆罪現世輕受病苦何況淨信輕罪受持無不成就若種種災厄怖畏惡夢不祥悉得消滅有無量殊勝利益壇場手印持誦祈願呪藥治病降伏攝召諸天種種神變及求佛菩薩天神龍女藥精現身等法不空羂索陀羅尼自在王呪經三卷潔寶思惟譯不空羂索陀羅尼經李無諂譯右二經本同譯別十六品觀世音菩薩說除一切業障集一切福慧成就一切佛法滿一切求願役召降伏除止災疫求見觀音種種等法不空羂索呪經隋天竺三藏譯不空羂索神呪心經奘法師譯右二經本同譯別說持誦者獲種種殊勝功德呪藥治病除災滅業種種求願等法本經後序云此經者三際種智之格言十地證真之極趣也裂四魔之遍𮊁折六師之邪幢運諸子之安車詣道場之夷路者也印度諸國咸稱為如意神珠名不空者謂擲羂取獸時或索空茲教動桴罔不玄應故爾千眼千臂觀世音菩薩陀羅尼神呪經二卷右唐貞觀中智通翻譯訖懇祈徵應感現聖證此陀羅尼能滅罪治病降伏魔怨滿足一切祈願請雨止雨種種殊勝功德有二十五種印呪法大身呪九十四句與大悲心呪本別千手千眼觀世音菩薩姥陀羅尼身經右二經本同譯別觀世音說利益一切衆生持誦壇印攝召降伏除災增壽能滿種種求願日月蝕時呪蘇一百八遍結印印蘇食令人日誦萬偈千手千眼觀世音菩薩廣大圓滿無礙大悲心大陀羅尼經右唐西竺三藏伽梵達磨譯觀世音菩薩白佛我欲衆生得安樂除病壽命富饒滅一切惡業因緣成一切功德善根離一切怖畏滿一切所求說此神呪若受持者除滅身中百千萬億劫生死重罪不受十五種惡死得十五種善生及說四十手種種求願及治種種病苦等法觀世音菩薩祕密藏如意輪陀羅尼神呪經唐于闐三藏實叉難陀譯觀世音菩薩如意摩尼陀羅尼經唐天竺三藏寶思惟譯觀自在菩薩如意心陀羅尼經男唐三藏義淨譯如意輪陀羅尼經唐三藏菩提流支譯右四經本同譯別誦者除災集福消罪愈病五無間業皆得清淨百千種願悉得如意降伏鬼神見佛菩薩資具豐足色力安盛種種呪藥護摩等法文殊師利根本一字陀羅尼經曼殊室利菩薩呪藏中一字呪王經右二經同本異譯佛說此呪守護衆生一切如來祕密心大神呪王更無過者有大神力文殊常來擁護此呪尚能攝得文殊況餘賢善能消一切災障惡夢怨敵五逆四重十惡罪業一切不祥能成辦一切善事滿一切願二遍護同伴三遍護一宅四遍護一城五遍護一國及說呪種種藥病等法十二佛名神呪經稱讚如來功德神呪經右二經同本異譯說十方十二佛名及神呪持誦功德五千五百佛名經第一卷十二佛號與此同孔雀王呪經大金色孔雀王呪經佛說大金色孔雀王呪經孔雀王呪經二卷大孔雀呪王經三卷義淨譯右五經同本別譯前略後廣佛時一年少比丘析薪為毒蛇螫悶絶于地吐沫翻目阿難疾走告佛佛說此呪令往救治即得消除此呪於一切恐怖厄難疾病憂惱饑饉囚繫悉得解脫有大神力求者皆驗五天諸國南海十洲無問道俗二乘皆尊敬讀誦求請蒙福交報不虛舊經文闕致此土未甚流布義淨本畫像壇場軓式具備利益無邊陀羅尼集經十二卷效才右唐永徽年中天竺三藏譯此經本出金剛大道場經大明呪藏六萬偈中之少分也撮要而譯第一卷佛部上大神力陀羅尼經釋迦佛頂三昧陀羅尼品種種印壇求願降伏等法第二卷佛部下說諸佛頂印呪等法藥師琉璃光佛阿彌陀佛印呪持誦得往生事及數珠跋折囉功能法相等法第三般若波羅蜜經心呪印壇等法第四第五第六卷觀世音印呪壇場諸法第六卷半後諸大菩薩法會勢至文殊彌勒地藏普賢虛空藏等印呪法第七第八第九金剛部大笑火頭青面金剛等金剛諸印呪法第十第十一諸天部摩利支天功德天及釋梵四王日月星宿諸部神王各各獻佛助成三昧印呪佐護衆生法第十二卷諸佛大陀羅尼都會道場灌頂普集壇法誦真言功德力如日月之光念佛功德如夜燈之光若日日供養誦明兼念佛功德如須彌之高大海之深若唯念佛名不兼誦明如香山之小阿耨達池之淺若日日供佛誦明滅罪如火燒草木功德不可思議第三卷末十一面觀世音神呪經十一面神呪心經右二經與前陀羅尼集經第四卷十一面神呪經同本異譯集經中印法廣備此經觀世音說種種持呪求願殊勝法摩利支天經右佛說有天名摩利支常行日月前有陀羅尼能守護人一切時處怨賊兵刃不能加害種種利益與前集經第十卷初同本異譯前廣此略呪五首經右奘法師譯一千囀陀羅尼二六字呪三七俱胝佛呪四一切如來隨心呪五觀自在隨心呪千囀陀羅尼觀世音菩薩呪經右與前集經第五卷初及雜呪同本異譯六字神呪經右與前集經第六卷中文殊呪及呪五首同雜呪七俱胝佛大心准提陀羅尼七俱胝佛母準泥大明陀羅尼右二經同本異譯呪五首及雜呪中同說是陀羅尼大勝妙功德種種求願等法觀自在菩薩隨心呪經右觀音說是呪有不可思議威力多所饒益怨對惡障巧畏一切皆息能滿種種求願等法佛頂尊勝陀羅尼經杜行顗等譯三十五句良右唐高宗儀鳳元年西域僧佛陀波利來禮五臺願見文殊忽見一老人謂曰漢地衆生多造罪業唯有佛頂尊勝陀羅尼經能滅除惡師可以此經來流傳漢土廣利群生拯濟幽明報諸佛恩語已忽然不見僧遂西還永淳二年取經回至京高宗詔日照三藏與司賔寺典客杜行顗同譯此陀羅尼八十八殑伽沙俱胝百千諸佛同共宣說為救善住天子七返傍生之苦為救三塗六道十惡五逆一切衆生種種生死危急苦難夭者增壽病者脫苦書高幢上或窣堵波中結壇呪土有種種殊勝功德衆生墮惡趣者悉得解脫救拔幽顯最不思議大曆中僧法照入金剛窟文殊聖寺見佛陀波利云佛頂尊勝陀羅尼經佛陀波利譯三十四句右即前經本日照譯進高宗祕藏禁中波利泣請曰捐命取經本期普濟願請梵本帝還之乃訪西明寺僧順貞同翻遂有兩譯其實一也最勝佛頂陀羅尼淨除業障經三藏地婆訶羅譯三十六句右亦同前本而序說善住天子因果等事加詳佛頂最勝陀羅尼經右與前本同譯別僧彥悰序四十八句佛頂尊勝陀羅尼經右義淨譯五十三句舍利弗陀羅尼經出生無量門持經無量門微密持經無量門破魔陀羅尼經四經本同譯別右佛為十方海會菩薩說是決定大乘一切功德甚深法藏能滿一切願有種種勝妙功德阿難陀目佉尼呵離陀鄰尼經阿難陀目佉尼呵離陀經出生無邊門陀羅尼經一向出生菩薩經四經本同譯別右佛說此陀羅尼殊勝祕密微妙法門能滿菩薩一切行大功德藏阿彌陀佛往昔因地為國王太子聞是經已奉持精進七千歲中不睡脅不至席不念愛欲財寶不問他事常獨處止意不傾動復為教化世間人民令八十億萬那行人皆得阿惟越致種種雜呪經右集種種神呪妙臂印幢陀羅尼經勝幢臂印陀羅尼經右二經本同譯別能滅五逆十惡等罪終不更受諸惡趣生得種種樂無崖際總持法門經尊勝菩薩入無量法門陀羅尼經右二經本同譯別說陀羅尼功德利益及廣演法義金剛上味陀羅尼經金剛場陀羅尼經右二經本同譯別說諸趣十二緣等法皆陀羅尼門師子奮迅菩薩所問經華聚陀羅尼經華積陀羅尼經右三經本同譯別說持呪功能保護衆生六字呪王經六字神呪王經右二經本同譯別說滅一切惡毒呪厭延壽解難法虛空藏問七佛陀羅尼呪經如來方便善巧呪經右二經本同譯別諸佛各各說呪保護衆生消災除病滅罪延壽及能令人知宿命事有種種求願法持句神呪經陀鄰尼鉢經東方最勝燈王如來經右三經本同譯別諸佛菩薩各說神呪利樂衆生有種種求願法善法方便陀羅尼經護命法門神呪經金剛祕密善門陀羅尼呪經右三經本同譯別說此呪能保祐衆生有種種持法無垢淨光大陀羅尼經右婆羅門七日當命終墮大地獄禮佛求救佛為說此延壽滅罪陀羅尼令修古佛舍利壞塔安此陀羅尼於輪橕中供養得延壽滅罪有種種儀法橕塔中柱也造塔當檢用請觀世音消伏毒害陀羅尼經右說陀羅尼能救護一切衆生消伏毒害種種障難內藏百寶經右說佛方便智隨順世間諸示現事溫室洗浴衆僧經右說洗浴衆僧有大功德福報須賴經右舍衛國中有極貧者名曰須賴方便度人示現極貧道力堅固天帝屢試而不動須賴得瑞應珠寶常謂波斯匿王為極貧者欲施與王王以為不然求證於佛佛為說法授須賴佛記與寶積經第二十七善順菩薩會同本異譯私阿昧經右長者子名也見佛威光問因地佛為說此經菩薩生地經右佛為長者子差摩竭說菩薩行四不可得經右說四人得五神通隱身空中海中山石中閙市中皆欲逃死而不得梵女首意經右佛為首意女說法授記成具光明定意經右佛為貴姓子善明說廣修六度等法有法名成具光明定意不見十方生死起滅之處乃至如來皆無見止清淨想亦不止清淨想是為空見無所見當是時心不在內不處外不道不俗不有不無不起不滅不於動搖處是心無根無音響為空為滅為都無所有為應成具光明定意之法是法無所有強為其名後為善明等授如來記寶網經右佛為寶網童子說諸佛名號功德菩薩行五十緣身經右說佛身相好因地功德菩薩修行經右五百長者發正真道意問佛當學何法佛為說此經諸德福田經右佛說八福田一者衆僧有五淨德名曰福田為良為美為無旱喪供之得福又有七法廣施行者得福即生梵天一者興立佛圖僧房堂閣二者園果浴池樹木清涼三者常施醫藥療救衆病四者作堅牢船濟度人民五者安設橋梁過度羸弱六者近道作井渴乏得飲七者造作圊廁施便利處是為七事得梵天福佛會中阿羅漢比丘比丘尼天帝釋等各各說往昔因緣道邊作小精舍供給止息僧福報為帝釋輪王施一呵梨勒果供衆僧九十一劫無病瓶酪施豪尊榮貴施沐浴無病身真金色一奈奉佛纍劫端正不生胞胎施珠瓔為天帝釋施圊廁纍劫無病無諸穢垢大方等如來藏經右說衆生煩惱身中有如來藏與佛無異有九譬喻如華開見佛蜂去得蜜槺除成米金出不淨如貧女妊聖王如開模出金像過去常放光明王佛說是經諸菩薩衆聞者除文殊觀音勢至金剛慧四菩薩餘皆已成佛道末說聞持此經功德佛語經右龍威德上王菩薩問佛語非佛語義佛說此經金色王經右說佛因地施辟支佛食獲福報演道俗業經右佛為給孤獨長者等五百居士說治家財有三輩出家修學三乘疾成佛道開化衆生之法百佛名經右說持百佛名功德稱揚諸佛功德經三卷必右佛說四方上方諸佛名號本願功德持誦者獲福無量須真天子所問經四卷右佛答須真天子所問菩薩三十二事又文殊答所問大乘法義能斷一切狐疑普入諸佛方便慧摩訶摩耶經二卷一名佛升忉利天為母說法經右佛於忉利天宮為母說法及摩耶夫人所自說偈佛涅槃已摩耶從天來下世尊從金棺起如師子王奮迅放千光明與千化佛悉皆合掌向摩耶說偈已闔棺如故又名佛臨涅槃母子相見經佛說除災患經右維邪離國災患投佛求救佛來至已國人安樂災病除愈復說才明長者家大富饒㮏女生於華中及恆河邊一切餓鬼種種宿因孛經右外道謀欲毀佛殺女埋祇樹間七日事露佛說宿命為國王師其名曰孛王後以讒間故孛辭去其國遂亂後王悔過復尊用孛故國復治觀世音受記經右說觀世音次補彌陀佛其國土莊嚴超越百千萬倍佛號功德山王如來得大勢菩薩次補觀音成佛號善住功德寶王如來海龍王經四卷改右海龍王供佛問法請佛入宮化作三道寶街從海邊至海底金銀琉璃甚微妙好如佛昔從忉利天下閻浮提佛入龍宮化海衆生無量無邊佛言犯戒律者不捨直見不墮地獄此類多生龍中釋迦佛法中有九百九十億居家出家者皆生龍中佛以一衣遍分龍衆使免金翅鳥怖佛衣雖一而億萬龍衆受用無盡及為龍王諸眷屬等說法授記首楞嚴三昧經三卷右佛說是三昧非九地已下菩薩及二乘人所知唯受職菩薩之所能得不以一事一緣一義可知一切禪定解脫三昧神通無礙智慧無所不攝如海會百川得此三昧故一切三昧皆悉隨之故名首楞嚴會中諸大菩薩證此三昧者各現種種大自在神變觀普賢行法經右阿難迦葉彌勒問佛云何衆生不失無上菩提之心云何不斷煩惱不離五欲得淨諸根父母所生眼得見障外事等佛說是經說觀普賢菩薩身相境界懺悔滅罪淨六根等得諸佛現前三昧觀藥王藥上二大菩薩經右說二大菩薩本因行願為兄弟同發菩提心及記當來相次成佛名號壽量莊嚴等事及觀念二菩薩滅罪獲種種功德內有五十三佛名懺罪法不思議光菩薩所說經右舍衛國有棄嬰兒遇佛即能問答說法踴身空中放大光明證無生忍受菩提記佛說昔因於毗婆尸佛法中以瞋恚詈罵菩薩生生為淫女子被棄空處惡業盡故受善業報遇佛授記十住斷結經十卷得能右說十住菩薩所斷所修所證等種種法義第九卷說中陰生滅甚詳諸佛要集經二卷右說世尊於東方天王佛土與諸佛會集說法文殊師利欲往彼土見佛聞法天王如來神力移立鐵圍山頂令講無極深妙之法為將來諸菩薩衆顯大光明離意女佛前入定以文殊神力不能出定佛言棄陰蓋菩薩乃能出此女定文殊與離意女棄陰蓋菩薩等問答種種要妙法義未曾有因緣經二卷右說佛子羅云出家幼少不樂聽法佛為化度說經上卷說佛往劫為野干以聞法不修行故墮旁生為天帝說十善法八萬諸天發菩提心諸天供養禮敬死生兜率天下卷說五女婢昔世因緣濫受信施纍劫受苦償債等事菩薩瓔珞經十四卷莫忘右此經四十五品佛與諸大菩薩羅漢問答種種法要會衆聞法受度不可勝數超日明三昧經二卷右佛說此三昧大慧光明利益能照無形一切不礙四大不礙雲霧夜暗不礙鐵圍故諸菩薩問答種種法要日天王王后太子眷屬請佛日宮供養問法天人受度無量有長者女名曰慧施與五百女人聞法發願轉為男子受記却後十劫成佛及說佛往昔因地以謗法故歷劫墮大地獄又以解空精進故得速疾成佛賢劫經十三卷罔右佛說了一切法本三昧復詳列二千一百諸度無極合八千四百諸度無極一變為十乃至八萬四千諸三昧門銷除八萬四千衆垢塵勞是諸佛道深入無極致一切智復說賢劫千佛第六卷名號父母弟子光明壽量說法所度遺法年數分布舍利及發意因地大法炬陀羅尼經二十卷談彼右佛說過去無量無邊劫放光如來說此陀羅尼甚深經典此陀羅尼門則能總攝諸餘經典出生一切修多羅一切章句一切分別義一切諸波羅蜜故名為門五十二品說種種法門因緣大威德陀羅尼經二十卷短靡右佛為阿難說陀羅尼法本過去諸佛已說廣利益諸天人等故令衆生受安樂故廣說三界諸趣善惡事相種種法令諸衆生增智增念增慧增辨佛名經十二卷恃己右佛說能受持讀誦此諸佛菩薩名者終不墮惡道生天人中常值佛菩薩善知識離諸煩惱至得菩提過去莊嚴劫千佛名經見在賢劫千佛名經未來星宿劫千佛名經右佛說聞是佛名信樂持誦供養讚禮者勝用十方佛國滿中珍寶純摩尼珠至梵天百千劫中布施經中有種種懺悔法佛所護念經二卷右列十方佛名初中後無長敘說五千五百佛名經八卷長右說受持佛名功德及諸陀羅尼華手經一十卷信右佛與諸大比丘諸菩薩等夏安居已三千大千世界八部雲集及他方諸佛會中一生補處菩薩等各持華奉供佛說是斷衆生疑經知一切衆生深心令入法海說諸菩薩行及淨佛國化衆生業成就諸波羅蜜法門有種種因緣大方等陀羅尼經四卷使右佛言我去世後此方等經在閻浮提如日月照明世間衆生遭恩得見四方能滅一切大罪業報身有白癩一心懺悔若不除差無有是處此是一切衆生之大珍寶能令衆生得究竟樂四重五逆佛海死尸依小乘經如斷多羅樹畢竟不生無懺悔處依大乘經聽許洗浣此經如呪枯生果如死者還生如囚聞赦如病得醫如貧得寶如行到家經云於一劫中教化一切令登補處格其功德不及香華供養此經功德況能依法修行者耶經中詳說修懺行道滅罪增壽善惡夢應種種事相南嶽思禪師七載修行遂淨六根天台智者方等三昧行法一卷說修行此法至詳至妙大方廣圓覺經右佛言此經百千萬億恆河沙諸佛所說三世如來之所守護十方菩薩之所歸依十二部經清淨眼目亦名如來決定境界名為頓教大乘頓機衆生從此開悟亦攝漸修一切群品布施七寶積滿大千世界不如聞此經名及一句義教百恆河沙衆生得羅漢果不如有人宣說此經分別半偈圭峯禪師作大小疏鈔修證儀裴相作序盛行于世僧伽吒經四卷右佛說聞此法門除五無間罪於菩提得不退轉一切善法皆得成就所得功德之聚如佛世尊當得壽八十劫九十五劫自識宿命六萬劫中為轉輪王於現在世人所敬重刀毒不傷妖蠱不中臨終見諸佛安慰之言汝莫怖畏將至佛國聞此法門不墮惡道不墮愚癡不生邊地若人施諸樂具供養六十二億恆河沙諸佛聞此法門其福正等詳如本經力莊嚴三昧經三卷右佛入力莊嚴三昧十萬諸佛剎地大震動諸佛悉皆讚歎釋迦佛勇猛精進能行難行苦行有大願力於五濁惡世救苦衆生十方佛土聞釋迦佛名者皆得受菩提記或得聲聞果力莊嚴者如來十種力有大威德神變令三千大千世界成大莊嚴詳如本經觀佛三昧海經十卷可右說佛身相好光明觀三十二相有無量殊勝功德繫心入定逆觀順觀是為念佛三昧佛示現相好光明時四衆八部了了得見有業障者見佛色身猶如灰人或如聚墨佛說其宿咎教以懺悔已皆得明見得果受記第三卷觀佛心品第五卷說諸地獄一切苦相甚詳觀佛心者是大慈也大慈所緣緣苦衆生苦衆生者謂三惡道也第十說觀七佛十方佛及諸佛菩薩說昔因地因觀佛得道佛言此觀佛三昧是一切衆生犯罪者藥破戒者護失道者導盲𡨋者眼愚癡者慧黑暗者燈煩惱賊中是勇猛將三世諸佛皆說如是念佛三昧十方諸佛皆由此法成三菩提音釋抗拒抗苦浪切拒其吕切抗拒抵禦也掐苦洽切爪刺也螫施隻切蟲行毒也顗魚豈切悰昨宗切㮈乃代切蠱果五切毒也
