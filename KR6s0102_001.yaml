body:
  text: 般若部總二十一部七百三十六卷七十三帙大般若波羅蜜多經六百卷天字至奈字號六十帙函號依印經院有本右佛於天上人間四處十六會説西域本有二十萬偈此方八部咸在其中唐三藏法師玄奘取全本於西域於玉華寺譯成六百卷般若空宗此焉周盡初法師將順衆意如羅什所翻除繁去重於夜夢中有極怖畏事還依廣翻即見殊勝境界遂不敢刪依梵本譯慶成之日般若放光諸天雨華空中音樂異香芬烈法師曰此鎮國之典人天大寶經自記此方當有樂大乘者國王大臣四部徒衆書寫受持讀誦流布皆得生天究竟解脫已上出三藏法師傳開元釋教録云諸經以般若建初者謂諸佛之母也般若六度之一數也五度未與大名唯此般若圓宗獨稱尊大乃是衆妙之淵府群智之玄宗萬法之本原衆聖之圓極所以前五但為佐助與般若作其輔翼唯此獨立大名般若者此云智慧也出經音疏序第一會王舍城鷲峰山説第一卷至第四百卷天字至霜字號右四十帙八十五品新譯此方舊來流傳佛在鷲峰菩薩聲聞衆集佛於一一身分放大光明其光遍照三千大千世界及十方殑伽沙諸佛世界十方諸佛各遣大菩薩衆持金蓮華奉釋迦佛佛知衆集告舍利弗為諸菩薩衆説般若波羅蜜多舍利弗滿慈子與佛問答演説初會四百卷經中説一切法五蘊十二處十八界十二緣生三十七菩提分法四靜慮定四無色定八解脫八勝處九次第定十遍處如來三身四智十力四無畏四無量心六神通十八不共法三十二相八十種好一切功德皆從六波羅蜜生般若波羅蜜多最大最勝最為第一更無過者餘五波羅蜜皆攝入此般若波羅蜜中一切諸法若無般若不得名為到彼岸故佛説內空內六根空故外空外六塵空故內外空根塵皆空故空空一切法空故大空十方皆空故勝義空涅槃亦空故有為空三界皆空故無為空無生住異滅故畢竟空諸法竟不可得故無際空無初中後故散空散謂有放有棄有捨可得此由散空無變異空無放無棄無捨本性空一切法非佛所作本性空故自相空一切法自相皆空如變礙是色自相領納是受自相等共相空謂一切法如苦是有漏法共相無常是有為法共相空無我是一切法共相等一切法空謂五蘊十二處十八界有色無色有見無見有對無對有漏無漏有為無為法皆空故不可得空三際不可得故無性空無少法可得故自性空諸法能和合自性空故無性自性空諸法無能和合性有所和合自性皆空故五十一六波羅蜜三解脫十力十八不共一切智四果二乘十地究竟涅槃皆如夢如幻設更有法勝涅槃者我亦説為如夢如幻何以故幻化夢事與一切法乃至涅槃皆悉無二無二分故八十二一切諸佛一切功德無不皆從此般若波羅蜜多所生故一切三乘賢聖五果福地乃至人天富樂自在福德吉祥亦不離此般若波羅蜜多一切世出世間諸功德善法若無般若為其先導如人無眼則無所往若人受持讀誦恭敬供養繫念在心而不忘失者即知是成佛之前相去佛非遠故如是之人一切魔怨外道不能惱亂一切毒藥毒蛇惡獸不敢傷害諸惡鬼神悉皆遠離水火風災亦所不及若入軍陳刀箭不中戰鬥得勝一切災難無不滅者則法師序云大般若經者希代之絶唱曠劫之遐津光被人天括囊真俗誠入神之奧府有國之靈鎮舊已譯八部才現半珠今具十六會乃握全寶義既天悠辭仍海溢且為諸分之本又是前古未傳此初會經四百卷八十五品矣唐西明寺沙門玄則序則同預奘法師譯會三第二會四百一至四百七十八卷金字至昆字右則法師序云舌覆大千身分巨億普利六趣震動十方是使微塵剎土不動而遊恆沙諸佛不謀而證非般若至孰能致此同幻花之開落不滅不生比夢像之妍媸無染無淨飇谷投響則毀譽共銷月池寖色則物我俱謝文優理詣感通悟永此會凡八十五品七十八卷即舊大品光讚放光本同譯別然大品之於光讚詞倍豐而加美此分之於大品文益具而彌正攢輝校寶豈不盛歟舊譯闕常啼等品餘意大同第三會從四百七十九卷至五百三十七卷岡字至珠字右新譯三十一品五十九卷於舊無涉佛言若諸菩薩欲疾證得一切智智應學般若波羅蜜多欲超聲聞獨覺等地欲住菩薩不退轉地欲得殊勝六種神通欲以一念隨喜之心超過一切聲聞獨覺施戒定慧忍進欲以一食一香一華一燈一衣一蓋一幢一幡供養十方沙界如來欲滿足六波羅蜜欲得一切如來殊勝功德欲得如上無量無邊殊勝功德應學般若波羅蜜多四百七十九此但略出詳如本經第四會從五百三十八卷至五百五十五卷稱夜右第八譯二十九品一十八卷一切凡夫剖名相之符保癡愛之宅所以措懷有著擬議必違至真反此動寂斯會以假名般若授假名菩薩是持幻法與幻人故無作亦無得此晨蜉之語歲夢蝶之議覺乎此會一十九品一十八卷即舊小品道行新道行明度經品之為言分也分有長短故有小品大品焉道行即分中之初品譯者取以別經明度乃智度之異言即就總目為號實由殘闕未具故使名題亦差今大教克圓鴻規允布心術之要可復道哉出則法師序開元釋教録云放光大品新舊譯耳大品為新放光為舊第五會十卷光右二十四品第五百五十六卷至五百六十五卷佛言若諸菩薩但聞般若波羅蜜多尚獲無邊功德勝利況深信解如説修行是諸菩薩近一切智安住真如疾證菩提若有菩薩説聲聞法令三千大千世界一切有情悉皆證得阿羅漢果所獲福聚甚多若菩薩為諸有情宣説般若乃至一彈指頃所獲福聚甚多於前五百六十五流通品則法師序曰夫見生死者三有著涅槃者二乘知生死空斯出三界矣知涅槃空斯過二地矣此會二十四品十卷舊未傳譯是大經略譯覽者固當不以抵羽而輕積珍矣第六會八卷自第一會至第六會並在鷲峯山説果右十七品第五百六十六卷至五百七十三卷最勝天王問佛説即舊勝天王般若本同譯別此第二譯發明弘旨敞拔幽關固已法寶駢映義林交積則法師序第七會室羅筏城給孤獨園説曼殊室利分二卷珍右第五百七十四卷至七十五卷與舊譯文殊般若本同譯別此第三譯則法師序曰即相無覩真如之壯觀即慮無知種智之默識既泯修而造修亦絶學而趣學狀其區別則菩提萬流斷其混茫則涅槃一相一相則不見生死萬流則無非佛法不壞假名而開實相法尚不有何有菩提尚無菩提何有證得此會即舊譯文殊般若矣第八會一卷右一品那伽室利分第五百七十六卷與舊譯濡首菩薩分衛經本同譯別此第三譯則法師序曰縱觀空術澄襟海定蜃樓切景知積氣以忘躋鸞鏡含姿悟惟空而輟覽故能自近鑒遠由真立俗識危生之露集知幻質之泡浮電倐青氣之輝雲空軒蓋之影文約理贍昔祕今傳雖一軸單譯而三復固多重味矣第九會第八第九會並在給孤獨園説能斷金剛分一卷右第四譯第五百七十七卷與舊金剛般若本同譯別凡本具云能斷金剛般若欲明菩薩以分別為煩惱而分別之惑堅類金剛此經所詮無分別慧乃能除斷故知舊譯失上二字又下文三問闕一九喻闕三法師具依梵本翻譯出三藏法師傳則法師序沖照倬存逸韻遐舉承間語要三問傑其標節理情塗兩如肅其致窮非想以布想攝衆度以檀度格虛空而未量泛聲香而不住忘法身於相好豈見如來分剎土於微塵誰為世界河沙數非多之多福山王比非大之大身法性絶言謂有説而便謗菩提離取知無授而乃成皆所以拂靄疑津剪萌心徑廣略二本前後五譯無新無故逾鍊逾明經卷所在則為有佛故受持之迹其驗若神傳之物聽具如別録第十會他化自在天王宮説般若理趣分一卷右一卷第五百七十八卷與後譯實相般若本同譯別般若理趣分者蓋乃核諸會之旨歸綰積篇之宗緒心凝旨敻義皎詞明言理則理邃寰中談趣則趣沖垓表雖一軸單譯而具該諸分若不留連此旨咀味斯文何能指晤遙津搜奇密藏矣則法師序第十一會説施波羅蜜多分五卷李右新出無舊譯從五百七十九卷至五百八十三舍利弗言若菩薩欲證無上菩提一切行中應先行施作如是念我施十方界一切有情令永解脫惡趣生死未發無上菩提心者令速發心已發心者令永不退已不退者令速圓滿一切智智以布施善根勿招餘果唯證無上菩提能盡未來利樂一切如是乃名布施波羅蜜多普令一切波羅蜜多皆得圓滿若無後心緣一切智回向菩提雖行布施而非波羅蜜多亦不能令餘所修習波羅蜜多速得圓滿亦不能得一切智智菩薩知一切法如幻化故行布施時無實可捨證正覺時實無所得如二幻師戲為交易此中二事俱非實有佛神力故令舍利子及大衆等見十方佛剎中諸菩薩廣大布施財施法施身命施等佛言求大菩提當如是施第十二會説戒波羅蜜多分五卷右新譯從五百八十四卷至五百八十八卷夫欲儲淨法先滌身器將越愛流前鳩行楫戒者切身口而流訓則一言一行斯佛事矣因動靜以研幾則舉足下足皆道場矣誠嶮道之夷蹬暗室之凝釭度疫之仙凡出苦之神馭也五卷單譯一如施分則法師序第十三會説忍波羅蜜多分一卷右新譯第五百八十九卷佛言一切法皆如幻化畢竟性空畢竟空中無所諍競令彼聞已鬥諍心息其心平等猶若虛空不相伺求種種瑕隙由斯感得大丈夫相所莊嚴身一切有情見者歡喜乃至證得清涼涅槃畢竟安樂則法師序曰將夷道梗為坦心怨播親親於蠢徒闢蕩蕩於情路雖毀甚矛箭害窮韲粉必當內蠲我想外抵人相目鄰虛之有間投刃曷傷念機關之無主觸舟奚苦如大浸稽空而空無溺懼積汙歸澤而澤無垢忿況已謝之聲毀譽一貫既遷之色益同科不有來則攝受之路無從不有往慈則菩提之行無主翻為善友更領深恩聞詈劇絲竹之娛得捶踰捧戴之恱太子之二目兼喪曾靡一心仙人之七分支解方酬七覺百矛集體百福之相開萬惱縈身萬德之基立語其大力則拔山無以喻談其無畏則賈勇弗之論一軸單譯不其要歟第十四會説勤波羅蜜多分一卷第十一至十四會並在給孤獨園右新譯第五百九十卷惟夫淺溜穿石小滴盈器鑽燧之勤斷幹之漸皆積微不已故在著可觀單卷新譯則法師序經中詳説諸菩薩懈怠精進行相第十五會鷲峯山説靜慮波羅蜜多分二卷奈右新譯第五百九十一卷至九十二卷夫心之用也大矣哉動則舛競聿興靜則衆變幾息大之充法界細之入鄰虛故海嶽寰區心之影也形骸耳目心之候也生死邅回心之迷也菩提昭曠心之悟也三界唯此實曰難調一處制之斯無不辦沈掉雙斥止觀兩明故統之則一如權之則二相敞之則三脫依之則四神行之則五印檢之則六念聚之則七善流之則八解階之則九次肆之則十遍其餘四念四等之儔五根五力之類如泥之在鈞金之在鍛唯所用耳豈有限哉故能力味精通神妙揮忽日月上掩川嶽下搖身遍十方聲覃六趣水火交質金玉易形殫變化之塗出思議之表則法師序第十六會竹林園中白鷺池側説般若波羅蜜多分八卷右新譯五百九十三卷至第六百佛言若於般若波羅蜜多甚深法門受持一句尚獲無量無邊功德況於此大般若經能具受持轉讀書寫供養流布廣為他説彼所獲福不可思議説此法時無量無數菩薩得無生法忍復有無邊諸有情類皆發無上正等覺心爾時如來記彼決定當證無上菩提放光般若波羅蜜經二十卷或三十卷三帙菜重右佛將説法先入三昧於一一身分放大光明遍十方大千世界衆生見光皆得不退佛出廣長舌相放無量億百千光化為千葉金色蓮華上皆有佛坐一一化佛皆説六波羅蜜衆生聞者皆發大菩提心此經二十卷九十品與前大經同摩訶般若波羅蜜經四十卷亦名大品般若經或三十卷四帙芥薑海光讚般若波羅蜜經十卷或十五卷鹹右三經與大般若第二會同本異譯其光讚般若比於新經三分將一至散華品後文並闕按姚秦僧睿小品序云斯經正文凡有四種是佛異時適化廣略之説也其多者云有十萬偈少者六百偈此之大品即是天竺之中品也準斯中品故知與大經第二會同梵文也龍樹菩薩造智度論釋大品經摩訶般若波羅蜜鈔經五卷一名須菩提品亦名長安品河右與小品道行經等同本異譯故初題云摩訶般若波羅蜜經道行品第一但文不足三分過二準道行經後闕十品道行般若波羅蜜經十卷亦名般若道行品或八卷一帙淡小品般若波羅蜜經十卷或七卷或八卷一帙鱗大明度經四卷潛右四經與大般若第四會同本異譯勝天王般若波羅蜜經七卷右與大般若第六會同本異譯文殊師利所説摩訶般若波羅蜜經二卷羽梁扶南三藏曼陀羅仙譯第一譯右亦名文殊般若波羅蜜經初無十重光後有一行三昧文言文殊師利童真者是又編入寶積在第四十六會與後經名同文殊師利所説般若波羅蜜經一同梁扶南三藏僧伽婆羅譯第二譯右初有十重光後無一行三昧文言文殊師利法王子者是此本稍廣又此二經亦互有廣略與大般若第七會曼殊室利分同本異譯濡首菩薩無上清淨分衛經一卷一名決了諸法如幻化三昧經此與大般若第八會那伽室利分同本異譯新舊相比舊經稍廣右文殊菩薩與龍吉祥菩薩等執應器錫杖入城乞食舍利子須菩提等問答説佛性離垢染故名無上清淨法身無像都無煩勞無了不了如幻化影響無心無念無言無説説是法身清淨功德時有百億菩薩天人等得無生忍者發菩提心者一生補處者共歎菩薩功德無量金剛般若波羅蜜經一卷秦鳩摩羅什譯第一譯金剛般若波羅蜜經一卷魏菩提留支譯第二譯金剛般若波羅蜜經一卷陳真諦譯第三譯能斷金剛般若波羅蜜多經一卷唐玄奘譯第四譯能斷金剛般若波羅蜜多經一卷義淨譯第五譯右五經同本異譯三師造論同釋此經解在第九會實相般若波羅蜜經一卷右與大般若第十會般若理趣分同本異譯西域梵文有廣略二本故實相理趣文意乃同況大小異佛為諸菩薩説實謂真實不虛妄故相謂體相自性凝寂故具真如常寂之義故名實相仁王護國般若波羅蜜經二卷或一卷右佛為十六國王等説法欲滅時一切有情造惡業故國土災難競起日月星變水火雨雹賊盜飢疫兵戈鬼神等種種災異説救護法國王眷屬百官百姓皆當受持般若七難即滅皆得安樂佛説菩薩行位五忍十五地等法廣如本經摩訶般若波羅蜜大明呪一卷鳩摩羅什譯出經題第一譯般若波羅蜜多心經一卷唐玄奘譯第二譯二經同本異譯仁王般若等三經大義雖通大部全本大部中無是支𣲖攝非從彼出右二經於六百卷大般若中此為要略若受持讀誦有殊勝功德菩提不遠一切魔怨外道毒藥蛇獸諸惡鬼神水火軍陳刀箭風災不能為害唐三藏法師到流沙逢無量鬼神醜惡凶猛唯念般若心經聲發即皆散滅出三藏法師傳寶積部總八十二部一百六十九卷一十七帙大寶積經一百二十卷翔字至文字十二帙右此經新舊重單合譯共四十九會合成一部歷代譯者摘會別翻而不終部帙唐南印度菩提流支翻譯二十六會三十九卷並流支新譯二十三會八十一卷舊譯者止勘同編入共成一部列會如左第一三律儀會三卷翔右與舊大方廣三戒經同本異譯從第一卷至第三卷大迦葉問佛若諸衆生求於佛法力無畏者攝受何法而修行增長成熟諸如來道證入菩提得不退轉佛説此經名演説三戒亦名説菩薩禁戒亦名集一切佛法在家出家菩薩修行法門成就退失菩提法詳如本經第二無邊莊嚴會四卷右從第四至第七卷無邊莊嚴菩薩為諸菩薩求一切智善巧地者令得圓滿不思議願及一生補處所有善根等願佛開示如是法門佛説此經是無邊辨才攝一切義善巧法門由此能照了一切法斷一切疑第三密迹金剛力士會七卷龍右從第八卷至第十四卷密迹金剛説如來身口心三祕密目連欲窮佛聲邊際過西方九十九恆河沙佛土終不能得其音常近不遠應持菩薩過上方百億恆河沙佛土欲見佛頂相亦不能見樓至如來於賢劫千佛中最後成佛住壽長遠所度弟子一切聖衆等與九百九十九佛適等無異不可限量賢劫諸佛出世時密迹常持金剛侍衛其金剛杵擲於虛空復立于地帝釋目連盡其神力皆不能動密迹説是不可思議法時菩薩天人無央數發菩提心得法眼淨無生法忍諸佛世界六返震動大光明照十方無量佛土第四淨居天子會二卷右舊譯名菩薩説夢經新改名淨居天子會當第十五及十六卷佛説諸菩薩修行有夢中所見一百八相第五無量壽如來會二卷第十一譯右與舊無量清淨平等覺大阿彌陀無量壽經等同本異譯當第十七十八卷無量壽經四十八願平等覺經彌陀經皆二十四願文異理同與寶積經第五無量壽會同本異譯皆説極樂國勝妙彌陀願力勸人往生第六不動如來會二卷第二譯右與舊阿閦佛國經等同本異譯當第十九卷及二十卷説妙喜世界種種勝妙不動佛行願功德第七被甲莊嚴會五卷師右新譯從第二十一卷至第二十五卷佛為無邊慧菩薩説菩薩被大甲胄乘于大乘行于大道持大法炬放大法光擊大法鼓霔大法雨此大菩提法為諸衆生作大饒益第八法界體性無分別會二卷右與姚秦童壽所譯法界體性經同本異譯當第二十六卷至二十七卷文殊師利説法界體性無汙染淨亦無向得無解脫者是心體性空無有實從妄想起非生住滅無縛無脫無向無得是經如佛光明一切普照第九大乘十法會一卷右與梁衆鎧所譯大乘十法經同本異譯當第二十八卷十法者一信成就二行成就三性成就四樂菩提心五樂法六觀正法行七行法順法八捨憍慢九善解如來祕密之教記聲聞得菩提言我背痛言我老弊問耆婆醫藥逐諸外道捔勝金槍馬麥提婆宿怨乞食空鉢木器合腹謗等皆是善巧方便為後世衆生利益故十者心不希求聲聞乘獨覺乘行是十法名住大乘此經能施一切衆生慧目大乘菩薩所當修學當得菩提第十文殊師利普門會一卷右與舊普門品經等同本異譯當第二十九卷佛説普入不思議法門色聲香味觸法八部三塗貪瞋癡善不善有為無為等二十八三昧平等法門若能受持則為受持八萬四千法門説是經時七十二萬億那由他諸天一百八十萬人等發菩提心九萬二千菩薩得無生忍天魔憂苦涕泣如中毒箭衆生聞是經決定得不退轉空我境界第十一出現光明會五卷火右新譯從第三十卷至第三十四卷月光童子問佛往昔修何等業得此無量無邊種種色光明佛為説如來因地善根資糧圓滿成就相好光明等法門第十二菩薩藏會二十卷帝鳥右從第三十五卷至第五十四卷三藏法師自西域回首譯出此經經初説王舍城五百長者問佛觀何等相棄捨家法悟大菩提佛言我觀世間衆生為十苦所逼十惱害相憎嫉入十種惡見稠林為十種大毒箭所中十不善道染汙纏縛我以是等故捨家趣無上道五百長者皆證阿羅漢次説如來十種不思議法一者如來身二者音聲三者智四者光五者戒定六者神通七者十力八者四無畏九者大悲十者不共佛法四無量心六波羅蜜三十七品法門四諦十二緣四攝等法檀波羅蜜中説過去善攝受如來因地為紡績人日以一縷微線施佛願未來世成等正覺由此福故十五拘胝劫不墮惡道千反為輪王帝釋纍劫奉事諸佛致成菩提第四十一卷精進波羅蜜中説過去熾然精進如來因地修行時於千歲中不於彈指頃起睡眠及念欲樂心不起稱量飲食鹹淡甘苦心不觀授食人面是男是女於樹下坐不一仰觀樹相於千歲中不曾起念論世間無益之語起如是妙行修如是道迹勇猛精進未曾休息四十七釋迦如來因地作天帝釋於贍部洲大疾疫劫化大身令病苦衆生割截身肉食已病愈以願力故隨割隨生食其肉者乃無一人墮於惡道皆住三乘得不退轉有如是力四十八如是等微妙法門不可具舉佛言欲疾證得菩提者當於如是大菩薩藏微妙法門猛利殷重讀誦修習廣為他説此是諸菩薩等聖珍寶藏當勤修學如我所證第十三佛為阿難説處胎會一卷右與舊胞胎經同本異譯當第五十五卷第十四佛説入胎藏會二卷右唐舊譯單本當第五十六卷及五十七卷此入胎藏會本名佛為難陀説出家入胎經在根本説一切有部毗奈耶雜事第十一十二卷三藏義淨析出別行説人受生入胎種種事本同譯別入胎藏會經初説佛種種方便化難陀離欲出家事經末説難陀往昔設浴供佛等緣致金色身具三十相短佛四指今得證果事比舊經增多第十五文殊師利授記會三卷右與文殊師利佛土嚴淨同本異譯從第五十八卷至第六十卷説菩薩嚴淨佛土種種行願及普見如來佛剎種種勝妙功德西方極樂世界莊嚴如一滴水普見佛剎莊嚴如大海水壽量衆會不可思議十方無量無邊佛剎中一切如來皆是文殊之所勸教成就第十六菩薩見實會十六卷官右從第六十一卷至第七十六卷佛成道已還迦毗羅城將化父王時國人迎佛天龍八部圍繞禮敬佛現神通説法授諸天人非人及外道等菩提記佛為淨飯王等説六界差別法門七十三至七十六地水火風空識界十八界一切法皆空諸根如幻境界如夢此法是一切菩薩之所修行一切諸佛之所證得次四轉輪王品説佛往昔為轉輪王七寶具足福力殊勝與帝釋分座以貪欲故從天墮沒以不放逸故於帝釋所亦無貪著説是經時淨飯王等七萬釋種得無生忍佛記皆當往生無量壽佛國後皆成佛第十七富樓那會三卷右舊譯本名菩薩藏經亦名大悲心經同本異譯從第七十七卷至第七十九卷説諸菩薩修行布施精進忍辱多聞修慈修喜等法致不退轉大悲品説佛昔因夜暗然兩臂照道救失路諸賈客為大畜身以血肉施諸衆生乃至一劫為大力王以身分割施婆羅門八萬四千歲中為惡魔罵辱心不瞋恨亦不言我有何罪無量百千萬世割肉刺血施諸衆生如是種種難行苦行第十八護國菩薩會二卷人皇右當第八十卷及八十一卷護國菩薩問佛菩薩修行王等於一切法增長功德到究竟處而得自在入一切智佛為説清淨無畏喜捨調伏退墮障道繫縛等法説佛昔因為國王王子商主女人及為鹿馬師象龜猿雉兔等受種種身捨施身命利益衆生求無上道略説五十餘緣次説無量壽釋迦阿閦佛昔為國王王子天神供養諸佛本緣第十九郁伽長者會一卷右與法鏡經及郁迦羅越問菩薩行經等同本異譯當第八十二卷説在家種種過患功德出家菩薩修行功德之法第二十無盡伏藏會二卷右新譯當第八十三卷及第八十四卷説菩薩五種伏藏成就殊勝功德速證菩提第二十一授幻師跋陀羅記會一卷右與舊幻士仁賢經同本異譯當第八十五卷王舍城中幻士以幻術變化諸佛及僧供養心中念悔欲得滅沒所化莊嚴等以佛神力令不滅沒七日佛言一切諸法如我之身及大千世界皆如幻化為跋陀羅説法授記第二十二大神變會二卷右新譯當第八十六卷及第八十七卷説如來有大神變説法教戒神通等事後説商主天子授記成佛第二十三摩訶迦葉會二卷右當第八十八卷及第八十九卷説破戒妄言得果貪著名利嫉妬瞋害種種罪相教誡切至第二十四優波羅會一卷右與舊決定毗尼經同本異譯當第九十卷説菩薩聲聞戒律持犯開遮輕重盡護不盡護種種差別等法第二十五發勝志樂會二卷右與舊發覺淨心經同本異譯當第九十一卷及九十二卷説初業菩薩業鄣暗鈍好世話睡眠戲論廣營衆務貪著所不應為忘失正念行迷惑捨由昔惡業久墮地獄故福慧微少懺罪發願後當得生彌陀佛國當捨利養當觀察憒閙世話睡眠營務戲論各有二十種過失第二十六善臂菩薩會二卷右舊譯當第九十三卷及第九十四卷佛説菩薩當具足六波羅蜜法第二十七善順菩薩會一卷右當第九十五卷此經與過字函須賴經同本異譯解在彼經第二十八勤授長者會一卷右當第九十六卷佛為五百長者説發菩提心者所應學應住應所修行法門於身命財妻子屋宅飲食車服一切樂具應無所著應觀此身無量過患四十四種可厭惡事長者聞法得無生忍受成佛記第二十九優陀延王會一卷右與舊優填王經同本異譯當第九十七卷新説三經互為廣略佛説耽著女色欲染過患苦切詳悉第三十妙慧童女會兼後一卷右與舊兩譯須摩提經及流志先譯妙慧童女經同本異譯當第九十八卷從初至半王舍城長者女名妙慧年始八歲問佛云何得端正身得富貴身得眷屬不壞得蓮華座化生佛前從一佛土至一佛土處世無怨所言人信離鄣清淨能離諸魔臨終諸佛現前佛為説四十行童女受成佛記即變成男子第三十一恆河上優婆夷會與前同卷右當第九十八卷從半至末説一切法如幻化如虛空心尚不可得何況心所生法一切法皆無所得名真修梵行往昔千佛亦於此處説如是法第三十二無畏德菩薩會一卷右與阿闍世王女阿術達菩薩經等同本異譯當第九十九卷無畏德年始十二見聲聞不起不迎不問不禮王問之云轉輪聖王迎小王不帝釋迎餘天不大海神禮河池神不日月光神禮螢火不如是等廣説二乘與大菩薩人種種差別與舍利目連迦葉須菩提問答妙法見佛即轉女身受成佛記第三十三無垢施菩薩應辨會一卷右與離垢施女經及得無垢女經同本異譯當第一百卷波斯匿王女年始八歲與大聲聞迦葉舍利弗等大菩薩文殊觀音等問答法要見佛問法即轉女身受成佛記音釋安佚佚弋質切安佚不勞也撰雛綰切造也臆於力切胸臆也敻翾正切遠也笈渠立切負書箱也括古活切包括也掬居六切兩手捧也暸力么切明也懲直陵切戒也士革切深也赤脂切醜也楫即涉切舟棹也蹬丁鄧切陛級也道也矛莫侯切勾兵也韲祖稽切碎也覃徒含切及也殫都寒切極盡也捔古嶽切校也槍七羊切矟也
