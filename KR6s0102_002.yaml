body:
  text: 元清源居士王古撰第三十四功德寶華敷菩薩會右當第一百一卷從初至半說持誦十方現在佛名所得殊勝功德第三十五善德天子會與前同卷右與流志先譯文殊師利所說不思議佛境界經同本異譯當第一百一卷從半至末文殊演說諸佛不思議甚深境界第三十六善住意天子會四卷右與如幻三昧經及聖善住意經等同本異譯從第一百二卷至第一百五卷文殊放大光明召集十方諸菩薩眾不可計數諸大弟子入四萬三昧而不能見善住天子已曾供養多佛入深法忍辯才無礙文殊與俱見佛問法是經說甚深法不施不慳不戒不犯不忍不諍不進不怠不禪不亂不智不愚無凡夫無佛不因緣不無緣等法門過去已有七十四億那由他百千諸佛說此法彌勒賢劫未來千佛亦爾又欲度造逆罪菩薩故文殊持劒逼佛佛為說法諸菩薩得無生法忍第三十七阿闍世王子會兼後三卷右與舊太子刷護太子和休二經同本異譯當第一百六卷從初至半刷護和休王太子名也問佛何因緣得端正蓮華化生知宿命相好智慧三昧不生八難生天上得六神通等佛隨問演說王子與俱來五百同友受成佛記第三十八大乗方便會右與慧上菩薩問大善權經等同本異譯從第一百六卷半至一百八卷盡慧上菩薩問佛說諸菩薩以一摶食施給一切眾生一香一華供養十方佛禮敬一佛即禮敬十方佛如是等種種善權方便法門以至八相成道示現金槍馬麥十餘殃事等皆是如來善權方便教化眾生第三十九賢護長者會二卷右舊譯本名移識經新故名賢護長者會從一百九至一百十卷此二經本同譯別賢護童真問佛眾生有識如寶在篋不顯不知身謝識遷如夢遷化捨此受彼獲當來報受種種身遷轉遷滅徃來苦樂等事又大藥王子問佛識捨於身作何形像佛為種種譬喻顯說第四十淨信童女會兼後三會同卷文右當第一百一十一卷初波斯匿王女問佛菩薩正修行法得堅固力安住生死成熟眾生六度四無量五神通化生諸佛前轉女身降魔轉法輪等佛為說此經第四十一彌勒菩薩問八法會右本名彌勒菩薩所問經與大乗方等要慧經同本異譯當第一百一十一卷中此八法會有釋論五卷其要慧經文少略耳說不退轉菩薩降伏魔怨知一切法於諸世間心不疲倦速成菩提等第四十二彌勒菩薩所問會右與舊彌勒菩薩所問本願經等同本異譯當第一百一十二卷末佛說彌勒以善權方便安樂行晝夜六時禮佛懺悔勸請諸佛及願於來世人民無垢穢奉行十善時成佛釋迦佛以身命布施勇猛精進願於五濁惡世成佛度生第四十三普明菩薩會一卷右與摩訶衍寶嚴佛遺日摩尼寶二經同本異譯當第一百一十二卷此舊寶積經有釋論四卷佛說諸菩薩修行求無上菩提增進退失善惡邪正種種行相及有三十二法得稱菩薩及說菩薩二乗差別中道觀心等種種譬喻真實沙門像似沙門諸善惡事相教戒切至種種法義富備微妙學佛者當常誦讀第四十四寶梁聚會二卷右當第一百一十三卷及一百一十四卷佛說沙門善惡垢淨梵非梵行種種事相營事比丘於三寶物中所不應作受諸罪報住阿蘭若乞食受糞掃衣等教戒精切此經名選擇一切法寶亦名安住聖種儀式亦名寶聚亦名寶藏第四十五無盡慧菩薩會兼後二卷右當第一百一十五卷初說十波羅蜜入十地先相等法第四十六文殊說般若會右與大般若曼殊室利分及眾鎧所譯文殊般若同本異譯從第一百一十五卷中至一百一十六卷末解在羽字號文殊所說般若經第四十七寶髻菩薩會二卷右亦名菩薩淨行經與大集寶髻品及康僧會所出菩薩淨行經同本異譯當第一百一十七卷及一百一十八卷此寶髻會有釋論一卷佛說六波羅蜜三十七菩提分法菩薩淨行等第四十八勝鬘夫人會一卷右與舊勝鬘師子吼一乗大方便經等同本異譯當第一百一十九卷勝鬘夫人波斯匿王末利夫人之女禮敬讚歎如來真實功德佛為授記號普光如來佛言此經成就無量無邊功德一切聲聞緣覺不能究竟觀察知見此經歎如來真實第一義功德大受大願攝受正法入一乗如來藏法身空義及自性清淨心等義分十五章斷一切疑決定了義入一乗道第四十九廣博仙人會一卷右與舊毗耶娑經同本異譯當第一百二十卷毗耶娑五通仙人領眷屬五百仙人勤修苦行不食而齋有光明名聞問佛云何布施死已得福福在何處有何形𫨻佛涅槃已供養塔等誰為受者得何福報佛如所問為說有三十三種垢染布施不得果報及說種種上施若佛現在若已滅後供養得福無異復有五種無上施謂佛及僧及說法者及父母復說生死轉識及生諸天欲樂衰相等事大方廣三戒經三卷右與寶積第一三律儀會同本異譯解在寶積第一會無量清淨平等覺經四卷後漢譯阿彌陀三耶三佛薩樓佛檀過度人道經兩卷吳譯無量壽佛經兩卷曹魏譯右三經譯文詳略小異本一經也阿閦佛國經二卷乃右與寶積經第六不動如來會同本異譯解在寶積文殊佛土嚴淨經二卷右與寶積經第十五文殊授記會本同譯別解在寶積法鏡經二卷或一卷第一譯郁迦羅越問菩薩行經一卷或云郁伽長者經或二卷第四譯六譯三闕右二經與寶積第十九郁伽長者會同本異譯解在寶積大乗十法經一卷右與寶積第九大乗十法會同本異譯解在寶積胞胎經一卷右與寶積第五十五五十六五十七卷胎藏會本同譯別解在寶積普門品經一卷右與寶積第十文殊師利普門會同本異譯解在寶積幻士仁賢經一卷或云仁賢幻士經服右與寶積第二十一授幻師記會同本異譯解在寶積決定毗尼經一卷一名破壞一切心識右與寶積第二十四優波離會同本異譯解在寶積發覺淨心經二卷右與寶積第二十五發勝志樂會同本異譯解在寶積優填王經一卷右與寶積第二十九優陀延王會同本異譯解在寶積須摩提經一卷亦直云須摩經須摩提菩薩經一卷右二經與寶積第三十妙慧童女會同本異譯解在寶積阿闍世王女阿術達菩薩經一卷右與寶積第三十二無畏德會同本異譯解在寶積離垢施女經一卷西晉法護譯得無垢女經一卷或云無垢女經一名論義辯才法門第三譯衣右二經與寶積第三十三無垢施會同本異譯解在寶積文殊師利所說不思議佛境界經二卷第一譯右與寶積第三十五善德天子會同本異譯解在寶積佛說如幻三昧經二卷聖善住意天子所問經三卷右二經與寶積第三十六善住意會本同譯別解在寶積太子刷護經太子和休經右二經與寶積第三十七阿闍世王子會本同譯別解在寶積慧上菩薩問大善權經二卷裳右與寶積第三十八大乗方便會同本異譯解在寶積大乗顯識經二卷第二唐譯右與寶積第三十九賢護長者會同本異譯解在寶積大乗方等要慧經一卷右與寶積第四十一彌勒問八法會同本異譯比八法會甚略解在寶積彌勒菩薩所問本願經一卷右與寶積第四十二彌勒所問會同本異譯比後譯文不足解在寶積佛遺日摩尼寶經一卷亦名遺日說般若經摩訶衍寶嚴經一卷一名大迦葉品右二經與寶積第四十三普明菩薩會同本異譯三經互有詳略佛言此經所在是為天下最妙之塔寺若從法師聞當敬法師如佛若敬法師供養奉持必得無上道命終之時要見如來當得身口意各十種清淨恒沙國土滿中七寶供養恒沙諸佛及弟子眾恒沙劫一切施安起七寶塔不如受持讀誦此經餘解在寶積勝鬘師子吼一乗大方便方廣經一卷亦直云勝鬘經第二譯右與寶積第四十八勝鬘夫人會同本異譯解在寶積毗耶娑問經二卷右一經與寶積第四十九廣博仙人會同本異譯解在寶積大集部一百四十二卷一十四帙大方等大集經六十卷推字至虞字右佛成正覺十六年菩薩海眾悉來大集佛於無緣象王眾中欲宣說菩薩法藏令知諸佛深境界故於欲色天二界中間化七寶坊如大千世界諸天龍鬼神等并及十方佛剎諸菩薩眾一時雲集佛說菩薩種種莊嚴種種光明十六大悲壞眾生三十二惡業如來大悲行相因緣及如來三十二業真實慧根慧業等法一至四寶女所問品五至六說實語義語毗尼十力四無畏十八不共法三十七助菩提分三十二相業因三十二障大乗法三十二速成就大乗法如是等無量寶聚不眴菩薩品說一切諸法自在三昧等第七海慧菩薩品說淨印三昧攝取大乗障礙大乗法八至十諸菩薩各各說如是法住法門海慧說諸魔業佛說破壞魔業調伏波旬十一次無言菩薩品解在發字號虛空藏菩薩品說虛空藏功德神通智辯方便行願等事一切法與虛空等微妙法門十二至十九次說十方諸佛會集寶坊調伏眾魔二十他方諸佛會中各有大菩薩眾來集佛為海眾說經四無量品說修慈悲喜捨淨目品說諸菩薩或作天像鬼脩羅八部鳥獸之像教化眾生閻浮提外有十二辰屬蛇馬羊等修聲聞慈各各一日一夜巡行教化眾生二十二至二十四寶髻品二十五至二十六解在寶積四十七會菩薩品二十七至三十解在罪字凾三十一至三十三日密分三十四至四十五日藏分與前日密分同本異譯日密分文中稍略此中稍廣十方恒河沙佛世界諸菩薩皆來集會佛說若住處有五比丘持法畏罪求解脫道供養獲大功德侵奪得大罪報破戒受施及在家人受侵損僧伽藍種種物皆獲大惡報諸佛剎各有大菩薩眾來禮敬佛說陀羅尼種種利益眾生等法星宿品說二十八宿等事濟龍品說諸龍受生受苦受樂業報因緣受三歸依盲龍即得淨眼熱惱餓龍皆得安隱佛付囑天龍大力鬼神等守護國土眾生等四十六至五十七月藏分說月藏菩薩與八十億那由他菩薩從西方禮敬供養如來說吉祥呪利益眾生次波旬品說調伏魔事次說大集十方一切佛土無餘諸菩薩百億三界一切龍天諸部大鬼神等悉集無餘顯說甚深佛法為護世間故以閻浮提諸國土付囑釋梵護世諸天一切龍神修羅夜叉鬼神等各各分布安置護持養育除障護善令法久住五十八至六十說菩薩修行校量失行不失行甚詳大乗大集地藏十輪經十卷陶大方等十輪經八卷唐右二經同本異譯佛說地藏菩薩已於無量無數大劫五濁惡時無佛世界成熟有情具足不可思議殊勝功德於十方諸佛國土利益安樂一切有情除一切病惱憂苦逼切滿一切求願有人於一食頃歸依供養諸所求願速得滿足勝於百劫歸依供養諸大菩薩經說末法惡時人敗根如坯器空見如生盲五欲如石田不苗十惡如臭身垢穢此經滅眾生煩惱令三寶久住佛言我遺法弟子下至非器無戒行雖應罰治無令還俗護持我法國王大臣宰官長壽安樂獲十種功德利益十輪者人王治國選用臣僚撫安民人教兵禦敵修營事業給養功藝賞善罰惡等有十王輪法佛輪十種教化眾生斷十惡修十善安立聖道降伏魔怨令修行人成無上道大集須彌藏經二卷右如來功德天地藏觀音菩薩及諸龍王等各說神呪護持國土利益眾生虛空孕菩薩經二卷弔虛空藏菩薩經此後不開卷數者並是一卷觀虛空藏菩薩經虛空藏菩薩神呪經右四經同本異譯說虛空藏菩薩不可思議功德能滿種種求願救苦懺罪密塗治圊廁等法若見虛空藏天冠如意珠或珠印印文有除罪字或聞空中聲唱言罪滅皆是罪滅相禱疾病者或夢得藥或見像或疾病即除虛空藏或譯云虛空庫又為虛空孕譯文不同其義一也以此而推觸類而長之則凡於佛說可以得意而忘言矣菩薩念佛三昧經五卷右與般舟三昧等經文別十方等大集菩薩念佛三昧經十卷民右二經同本異譯諸天勸請佛說念佛三昧一切天龍夜叉阿脩羅菩薩羅漢人非人等海眾大集不空見菩薩見大神變妙莊嚴事聞佛請法大弟子目連迦葉舍利弗羅睺羅彌勒菩薩等說大神通各師子吼佛說是三昧甚深經典般舟三昧經三卷伐拔陂菩薩經大方等大集賢護經五卷第七譯右三經同本異譯前後七譯四譯本闕梵語拔陂此云賢護說念佛三昧功德佛言此經是諸菩薩眼是菩薩父母受持隨喜獲無量無邊福德速成無上菩提阿差末經七卷晉曰無盡意罪無盡意菩薩經六卷右二經同本異譯東方不眴世界現住普賢如來剎土無盡意菩薩與六十億菩薩俱來先現大光明神變舍利弗問無盡意說初發心六度四無量六通四無礙智四攝四依三十七助道等法門一一皆不可盡說是法時次第有七十那由他又七十六那由他天人又六十七百千眾生發菩提心七萬六千又五百二千菩薩得無生法忍三萬二千菩薩得日燈三昧十方諸佛皆同讚喜此八十無盡法悉能含受一切佛法是諸菩薩不退轉印速能成就無上菩提大集譬喻王經二卷周右舍利弗問佛答聲聞獨覺智慧如一滴水佛智菩薩智如大海水等種種譬喻甚廣大哀經八卷右是大集經初陀羅自在王菩薩品異譯卷初至第五卷半此與大集經互有廣略佛放光明十方佛剎諸大菩薩來集佛說無盡法門戒定光明莊嚴大悲哀愍眾生無量劫來教化度脫無有猒倦如來三十二事業菩薩八大總持等法智積菩薩問何謂智本何謂慧業佛為分別解說十方佛剎六返震動及記魔波旬至佛法滅時生大歡喜墮阿鼻地獄受大苦故念佛教故心得淨信即於地獄命終生三十三天復積善根以至涅槃寶女所問經四卷發右是大集經寶女品異譯出第五卷半後至第七卷解在大集無言童子經二卷右是大集經第十二卷無言菩薩品異譯同本童子生不啼泣乃至八歲無所言說佛言此童子是大菩薩已曾供養無量無邊諸佛得不退轉當成無上道我今說是大集經典此童子於此中當說經法利益無量眾生湧身空中讚佛功德問答法要無量眾生發菩提心數十萬菩薩得無生忍金剛齊菩薩與六萬億諸菩薩從東方佛土來在釋迦佛身內坐蓮華臺聽汝而於佛身無有逼觸而佛身無增無減無礙有如是等不可思議法門自在王菩薩經二卷奮迅王問經二卷右二經同本異譯說菩薩四自在法一戒二神通三智四慧一切聲聞辟支佛之所無有金剛齊菩薩安住於戒八萬四千諸魔千歲隨逐乃至不見一念心散可得怖惱魔言我於千歲求汝心行不能知處菩薩言恒河沙劫求之亦不能得心不在內不在外不在中如幻化人尚無有心況心行處魔等受化皆為弟子往昔金剛齊即自在王菩薩是也四自在中各有如是微妙法門寶星陀羅尼經十卷佛說陀羅尼變五百魔女為丈夫身大集十方佛現大神變降魔眾說諸神呪祐護一切等事華嚴部總二十六部一百八十七卷一十八帙古華嚴經六十卷湯字至道字右第一晉譯唐譯九會晉經七會初闕十定品重會普光故唯八會唐譯三十九品晉經三十四品初會中唯有二品一世間淨眼品即今世主品盧舍那品即今現相已下五品初會闕四兼闕十定故唯三十四品餘諸品會大同文有小異翻梵本三萬六千頌成五十卷或六十卷唐譯益九千頌通舊總四萬五千頌合成唐本八十卷按隋譯經三藏崛多云于闐國東南二千餘里有遮抅迦國王宮有摩訶般若大集華嚴三部大經並十萬偈般若經奘法師已取到全譯出六百卷外大集經若具出可三百卷華嚴十萬偈今八十卷纔僅半珠唯願支那緣熟諸聖加被大經東傳早見全寶使大法明普照無極大方廣佛華嚴經八十卷垂字至首字右唐譯此經七處九會說三十九品八十卷七處者人中三天上四初諸來海會諸菩薩作是思惟云何是諸佛地云何是諸佛境界云何是諸佛神力諸佛所行諸佛神通諸佛無所畏諸佛三昧諸佛無能攝取諸佛眼諸佛耳諸佛鼻諸佛舌諸佛身諸佛意諸佛身光諸佛光明諸佛聲諸佛智願佛世尊開示演說又諸佛皆說世界海眾生海佛海佛波羅蜜海佛解脫海佛變化海佛演說海佛名號海佛壽量海及一切菩薩誓願海發趣海助道海乗海行海出離海神通海波羅蜜海一切菩薩地海一切菩薩智海十住十行十迴向十藏十地十願十定十通十頂為成就一切菩薩故令如來種性不斷故演說一切諸法故永斷一切疑網故願佛亦為我等如是而說九會所說經共答此問詳如大䟽第一會菩提場中說世主妙嚴至毗盧遮那品六品十一卷經名舉果勸樂生信分謂舉揚如來十種法界無盡身雲二十重華藏莊嚴剎海依正二報難思之果勸厲當機聞而樂欲生其淨信發趣修行如佛證故第二會普光明殿說十信等第三會忉利天宮說十住等第四會夜摩天宮說十行等第五會兜率陀天宮說十迴向等第六會他化自在天宮說十地等第七重會普光明殿說十定十通十忍等從如來名號品至如來出現品三十一品四十一卷名修因契果生解分因謂因行竪該六位果謂佛果總攝十身進修契證令生勝解欲使一乗圓機依此所詮發揚妙智進趣修行成六位之圓因契十身之滿果第八普光明殿普賢說離世間一品七卷經二千行法名託法進修成行分謂上差別因果生解既終今乃寄託前法攝解成行故隨舉一行六位頓修古德頌云河傾二百問瓶瀉二千酬一心觀性海萬行炳齊修六位因成滿八相果圓周是也第九會給孤獨園說入法界品二十一卷經名依人證入成德分由前大行既具觸事造微故善財依佛菩薩歷事知識隨所見聞無不契入總斯教理不出信解行證若兼所信所解所行所證即自真心共成五字斯乃本末該羅頓漸融攝皆指一心同歸性海耳此經以入法界緣起普賢行願為宗諸佛祕藏如來圓教不思議解脫頓入佛乗已上清涼䟽華嚴一乗祕教亦名不思議解脫經功用大故感應亦大一四句偈地獄眾生聞之而脫苦盥掌滴水螻蟻微類承之而生天欲學佛心慧了佛境界證佛地位依此一乗法性海而修行者不歷地位初發心時便成正覺悉與三世諸如來等譬如眾流一滴之水纔入海中即名海水若依大乗二乗權教備修萬行綿歷多劫不如聞是經以少方便疾得菩提經云此經不入一切眾生二乗人手唯除菩薩摩訶薩一切聲聞緣覺不聞此經何況受持若菩薩億那由他劫行六波羅蜜不聞此經雖聞不信是等猶為假名菩薩若有此經卷地即是如來塔廟禮拜供養彼眾生等具足善根滅煩惱患得賢聖樂聞此普賢大行海印深定法界體性方知華嚴是佛根本教釋氏宗極故修此感應傳廣示未聞出華嚴感應傳信力入印法門經五卷右上三卷佛說諸菩薩清淨初歡喜地得大無畏安隱處法次二卷普賢說諸佛無障礙智教化眾生力自然智普門現前無邊身一切徧見無差別無依止智等法門末說信毀種種罪福度諸佛境界智光嚴經佛華嚴入如來德智不思議境界經二卷大方廣入如來智德不思議經右三經同本異譯說如來安坐不動而普現一切利益眾生大方廣佛華嚴經不思議入佛境界分大方廣如來不思議境界經右二經同本異譯普賢說佛出現乃至涅槃剎土時劫光明威德等事皆不可思議及諸菩薩修習法門大乗金剛髻珠菩薩修行分右說佛於往昔經無量劫承事諸佛修習法門大方廣佛華嚴經修慈分伏右彌勒問佛云何少用功力安樂無倦而能速證廣大佛法在生死中不受無量眾苦逼迫於諸佛法速得圓滿佛說應修慈心為最上功德速具相好成無上正覺想念身中有十方諸佛國土隨一切眾生所須與種種安樂捨離瞋恨怨結平等利益是修慈人乃至未能離於分別起我我所見亦常得六種梵天之福無始惡業皆得消滅大方廣普賢菩薩所說經莊嚴菩提心經大方廣十地經右三經同本異譯信力入印法門等十一經並與華嚴分有相似是眷屬攝而非正部兜沙經右是華嚴經如來名號品異譯菩薩本業經諸菩薩求佛本業經右二經是華嚴淨行品異譯菩薩十住行道品菩薩十住經右二經是華嚴菩薩十住品譯新經在第十六卷略無偈漸備一切智德經五卷十住經四卷戎右二經是華嚴十地品異譯天親菩薩造釋論二十二卷等目菩薩所問三昧經三卷右是華嚴十定品異譯顯無邊佛土功德經右是華嚴壽量品異譯如來興顯經四卷右是舊華嚴寶王如來性起品及十忍品異譯新經名如來出現品度世品經六卷羌右是華嚴離世間品異譯羅摩伽經三卷右是華嚴入法界品異譯此羅摩伽經比於本品文闕不同於其中間譯出少分爾大方廣佛華嚴經右續華嚴經入法界品或有經本續入大部之中在第五十七卷涅槃部總六部五十八卷六帙大般涅槃經四十卷遐邇壹體右北涼天竺三藏曇無讖第五譯宋文帝元嘉年中達于建業時有沙門慧嚴慧觀謝靈運等以讖前經品數踈簡乃依舊泥洹加之品目文有過質頗亦改治結為三十六卷行於江左比前經時有小異虛字凾有論一卷略釋大經又論一卷釋本有今無一偈佛言吾滅度後汝等四眾當勤護持我大涅槃我於無量萬億阿僧祇劫修此難得大涅槃法今已顯說此是十方三世一切諸佛金剛寶藏常樂我淨周圓無闕最後究竟理極無遺諸佛於此放捨身命故名涅槃汝等欲疾得菩提令一切眾得出世法當勤修習此涅槃經出涅槃後分宣律師問天人韋將軍曰諸佛說教何等偈為般若何等為華嚴何等為法華何等為涅槃答曰但是無相離我我所即入般若但是說諸度萬行悲智攝益即入華嚴但是授聲聞等記作佛即入法華但是決擇邪正說一切眾生皆有佛性即入涅槃如此決擇古今未有味道君子幸願知音出靈感傳大般涅槃經後譯茶毗分二卷率右是前大般涅槃經之餘憍陳如品之末兼說滅度已後茶毗等事佛言若佛滅後一切信心所施佛物應造佛像佛衣七寶旛蓋香油寶華除供養佛餘不得用即犯盜佛物罪若佛現在若涅槃後有人以七寶堂殿衣服飲食一切樂具恭敬供養佛像及舍利如芥子許乃至尊重讚歎是二人所得福德無二無別無量無邊能令眾生離三界苦得涅槃樂佛欲涅槃以手却衣顯出師子胸臆上昇虛空高七多羅樹七返告言汝等大眾應當深心看我紫磨黃金色身汝當修習如是清淨之緣於未來世得此果報自今見已無復再覩佛欲涅槃放大光明現種種大神變大聖金棺力士眾人皆莫能舉佛神力故自然乗空徐行入城西門而出東門左右繞城七帀諸人天等各設廣大殊勝供養栴檀沉水積高如山人天舉火皆不能然待迦葉至金棺自然開見佛相好紫磨金身閉棺已復現雙足光照十方從佛心胸自然火出分布舍利滿八斛金壜天上人間起塔供養大般泥洹經六卷右是大般涅槃經之前分盡大眾問品同本異譯方等般泥洹經二卷賔四童子三昧經三卷右二經同本異譯佛於雙樹間將入涅槃諸弟子眾皆大哀戀有四童子皆大菩薩從四方佛剎來現大神通會集供養與佛阿難問答說法時無量無邊人天菩薩得道得果得無生忍佛放大光明度諸地獄極苦眾生皆即生天乃至成阿羅漢無央數人天菩薩皆得道進果以至立無上正真道魔波旬惱恨悲泣今日所度雖佛壽一劫所度不能過此我界遂空佛言所未度者如大地土所度者如𤓰上土耳及諸佛為羅云說法安慰佛言我所應度者皆已度訖未度者皆已作得度因緣我所應作皆已作竟大悲經五卷右說佛將涅槃諸弟子哀戀佛安慰阿難等說正法不滅迦葉等及佛滅後有諸大神通智慧威德弟子流布佛法汝勿憂愁次說供養佛舍利如芥子及作形像塔廟乃至散一華於空中若生一念敬信果報福德不可思議終當得至涅槃佛執阿難手付囑法藏令廣宣流布令勿隱沒第一卷說大梵天王念言我能勝他他不如我我是智者三千大千世界中大自在王造化眾生世界等佛言非汝所造所化是業所化此大千世界是佛土梵王禮懺悔過方廣大莊嚴經十二卷右二十七品說如來於兜率天宮下生處胎降生示現童子示書現藝遊行出家苦行降魔成佛轉法輪等次敘甚詳第十一說十二緣三十二相業末說人能受持此經有種種勝妙功德普曜經八卷右二經本同譯別文詳略有小異爾音釋鬘莫班切眴輸閏切坏鋪杯切未燒瓦器也盲莫耕切目不明也盥古玩切澡于也讖楚讚切壜徒含切甒屬甒音武
