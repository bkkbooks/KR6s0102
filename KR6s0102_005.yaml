body:
  text: 元清源居士王古撰大方便佛報恩經七卷覆右佛於往昔劫中孝養父母乃至捨身命血肉救濟父母為報重恩及求無上菩提纍劫修積難行苦行種種因緣第六卷優波離品詳説受三歸依及持犯齋戒種種功德罪報經末説三十二相因果法菩薩本行經三卷右説佛因地為求佛法施捨身命利益衆生供養法師等種種苦行因緣及五百羅漢各各自説往昔善行致生天得道因緣但或掃塔或散華或施辟支佛一飯或獻一草蓋或以一偈讚佛等皆致生天得道無量福報佛説法集經六卷器右佛與諸大菩薩大弟子等説廣大勝妙法集法門諸菩薩入何法行知如來生如來身如來成真實常住大般涅槃正遍知法空義法師義不共住法化事法行勝妙果報六通三明八解脫八勝處十一切入十自在十諦九定十力十智六度四念六念等種種勝妙法義觀察諸法行經四卷右佛説五百三十五菩薩法行皆由三摩地心觀察故則能了知何等法應親近應念修應多作不應親近不應念修不應多作等種種法門菩薩處胎經一卷欲右佛自兜率天降神入母胎現處宮殿為諸方來供養菩薩廣説法要化度無量衆現入六道種種化身度諸衆生説無盡寶法藏分別五種非實神通菩薩得六通慧復説佛宿命作日月天子五星二十八宿及作人天神仙外道更無量苦行無過涅槃可謂真道説八關齋是諸佛父母龍受八關齋戒金翅鳥不能害帝釋受之修羅戰不能勝如是等法不可具載佛涅槃後賢聖結集最初出經此為第一弘道廣顯三昧經四卷右無熱惱龍王請佛菩薩大弟子等於阿耨達池宮殿中半月供養諸佛願説菩薩大士應所修行法門得諸佛法相好具足得普智心修習道品文殊迦葉須菩提等問答末授無熱王菩提記施燈功德經右佛説於佛像經法舍利前以一燈至多燈供養照道一階或塔一面或時速滅或風吹滅或油炷盡雖施少燈其福報不可思議無量無邊惟佛能知非聲聞緣覺能了於現在世得三種淨心臨命終時得三種明見四種光明生天得五種清淨得四種可樂之法得三業善友清淨於世世中得八種勝法得八種資糧八種增上之法廣如本經鴦崛魔羅經四卷難右此唐言指鬘受外道教殺一千人取指為鬘以血塗身而少一人佛往化度而現其前説偈問答即調伏受度指鬘説摩訶衍如來藏法説偈阿難釋梵護世魔王諸大弟子菩薩等佛言菩薩成就四十相者即非新學菩薩佛言鴦崛摩羅是南方一切世間樂見上大精進佛文殊是北方歡喜藏摩尼寶積佛指鬘母及指鬘師師婦踴身空中説偈而沒不現佛言三人皆我所幻化不可思議度無量衆生無所有菩薩經四卷右無所有菩薩問佛菩薩若有染有著有繫有犯如何遠離超越成一切智修習圓滿一切功德佛説此經令諸菩薩於一切法中無有障礙有難調伏殺害人者過去瞋恨謗毀菩薩故五百生中生生受毒蛇身害無數衆生死入大地獄最後生刑殺人家殺人飲血廣造惡業見佛光明勝妙發慙愧心自歎惡劣又聞佛與無所有菩薩問答空法心智猛利即得斷漏除瞋恚分別煩惱顛倒受成佛記無所有菩薩説法而不現身以身相勝妙惟除如來在三界中無有勝者諸女人見此菩薩身相聞法皆變身為男子明度五十校計經二卷右六波羅蜜等法能越生死到彼岸故名明度五十種法行校比計度於諸法中相應不相應有罪無罪煩惱盡未盡諸相具未具功德滿未滿等中陰經二卷量右中有身具足五陰在死有後居生有前二有中間故名中陰佛具不思議神變力故教化一切中陰衆生斷惡修善七十八億百千那由他住中陰衆生發菩提心大法鼓經二卷右佛與迦葉問答上乘義種種譬喻化城貧子等喻如法華經後説離車童子降魔護法受記作佛文殊師利問經二卷右文殊問世尊答説種種法義戒品字母品雜問品問答諸法義住家過患出家功德入定見十方佛及呪華療治等法月上女經二卷右維摩居士女也生時有大光明故名月上自説往因後詣世尊供養與舍利弗諸菩薩問答法要轉身為男子佛記後八萬億劫當得作佛號月上如來如來祕密藏經二卷右説菩薩種種行法大乘密嚴經三卷墨右有淨佛土超出三界殊勝淨妙名曰密嚴諸菩薩衆皆是智慧神足意生之身如日月明珠鏡中之像而來住此諸菩薩問金剛藏菩薩答廣説微妙不思議法門占察善惡業報經二卷右地藏菩薩説上卷以木輪占察三世善惡因果業報一百八十九種等事下卷説一切諸法依心為本廣説大乘進趣方便深要法門説是究竟實義時十萬億衆生發菩提心九萬八千菩薩得無生法忍佛深讚喜文殊師利問菩薩署經右佛説諸菩薩所當學諸菩薩所依住法觀行境界藏識等義蓮華面經二卷右如來於入涅槃三月前入跋提河浴告阿難言汝可至心觀如來身三十二相久遠乃現難出難見日月有大威德光明在佛身邊悉蔽不現釋梵諸天王等常讚歎佛光明殊勝如來舍利如芥子恭敬供養者所得功德無量無邊阿僧祇不可數不可説次説佛付囑八部天龍夜叉王等護持佛法佛鉢舍利佛涅槃以後至彌勒佛時放大光明作大利益等事大乘造像功德經二卷右佛在天宮安居三月為母説法優陀延王渴仰思佛故發願造像毗首羯磨天工巧無匹變身為匠者即以是月初八日弗沙宿合毗婆訶底出現之時佛初誕生時起作不日而成佛於三道寶階從天而下兩邊階道皆黃金成中道琉璃足所踐處布以白銀諸天七寶而為間飾諸天翼從威德熾盛光明赫奕如滿月在空衆星共繞如旭日初出彩霞紛映梵王執白蓋在右帝釋持白拂侍左諸天乘空隨佛而下側塞虛空音樂妙香雨華積至于膝半路四天王獻供殊妙劫初已來所未曾有佛告優陀延王汝於我法中初為軓則更無有人與汝等者令諸衆生得大信利已獲無量福德廣大善根天帝告王佛在天上讚王造像功德諸天悉亦隨喜宜自欣慶佛説若有人以雜綵繢飾或金銀銅鐵鉛錫鎔鑄或雕刻織繡或白灰丹土若泥若木乃至極小如一指大獲種種福報功德無量無邊不生邊小國土下劣種性不淨邪見貧窮之家生人天中圓滿超衆無諸病苦不為毒藥兵仗諸橫緣所傷害不受苦報及説女人受男身男子受女身黃門二形不男邊夷受生等因緣若造佛像皆免所滅種種罪所獲種種福詳如本經廣大寶樓閣善住祕密陀羅尼經三卷右説寶樓閣陀羅尼殊勝功德種種印呪求願持誦等法一字佛頂輪王經五卷右説此諸呪王是無礙最勝大明呪法及結界建壇畫像供養澡浴誦持輪結印呪入三摩地證神通除業障降伏魔怨種種求願殊勝成就等法大陀羅尼末法中一字心呪經右説此陀羅尼勝妙功德印畫壇場種種求願降伏呼召等法大佛頂如來密因修證了義諸菩薩萬行首楞嚴經十卷𮈔右阿難為大幻術摩登伽女呪攝將毀戒體世尊頂放百寶光明光中千葉寶蓮有佛化身坐宣神呪阿難歸來佛所佛説此經名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路七處徵心八還辨見飛光擊觸寶手開合顯真性不動自心妙明常光現前性周法界歇即菩提不從人得文殊選擇諸聖二十五圓通以觀音從聞入道為此方真教體五濁十二類衆生受生源因修三漸次方得除滅從乾慧地修行增進十信十住十行十回向四加行十地等妙二覺五十五位十因十類七趣三界生業因緣十種禪那五陰區宇種種魔事次説修三摩地斷殺盜淫妄道場持呪修證功德佛言若人以七寶滿十方虛空奉上微塵諸佛承事供養所得福德不如以一念將此法門開示末學若人身具四重十波羅夷應入阿鼻獄是人罪障應念消滅如教行道直成菩提無復魔業大毗盧遮那成佛經七卷染右説十佛剎微塵數執金剛神祕密主問佛受持真言曼茶羅壇場印像護摩字輪法義鈴杵供養願求修證種種法門蘇婆呼童子經三卷右童子請問執金剛菩薩世間受持真言不得成就為法不具耶為無力耶有罪耶為真言字有加減耶菩薩為説受持真言壇場供養除障分別金剛杵等成就遮難種種法門金剛頂念誦經四卷詩右於百千頌中金剛頂大瑜伽教中略説壇場印呪祕密法門持誦供養得無量功德利益圓滿一切願求盡衆生界救護利樂蘇悉地羯羅供養法經三卷右説嚴淨神室澡浴供具數珠神線草鐶寶座護身結界誦持求願法牟梨曼陀羅呪經右誦持此呪有大功德自一百八遍至百萬遍各有種種應驗消一切災病罪障滿一切祈求志願結印結界建壇場護摩爐等種種法式七佛十一菩薩陀羅尼經四卷讚右諸佛菩薩釋梵龍天星辰各説神呪利益衆生滅罪求福拔苦治病修道證果治種種鬼病受持求願等法大吉義神呪經二卷右佛説結呪界法擁護衆生辟却摧伏一切惡毒鬼神羅剎夜叉等并種種求願法諸天龍王各各説降伏惡毒利益衆生呪法文殊法寶藏陀羅尼經右説諸佛菩薩陀羅尼及印畫持誦種種求願法利益衆生不可思議功德金剛光焰止風雨陀羅尼經右説降伏諸惡毒龍惡風暴雨保護衆生及苗稼華果等種種神呪加持法阿吒婆拘鬼神大將上佛陀羅尼經右説降伏一切惡毒鬼神蟲獸救護諸難阿彌陀鼓音聲王陀羅尼經右説持呪往生淨土十日十夜晝夜六時專念決定見佛此呪六十餘句大普賢陀羅尼經右説種種治鬼病法大七寶陀羅尼經六字大陀羅尼經右二經説持呪能除一切怖畏安穩利樂安宅經右説保安家宅辟除不祥祈福利人法摩尼羅亶經右説除治種種鬼病法玄師陀神呪經右説辟除鬼神蛇蟲賊劫法護諸童子陀羅尼經右説保護小兒并求子息法諸佛心陀羅尼經拔濟苦難陀羅尼經八名普密陀羅尼經右三經並説持誦種種功德持世陀羅尼經右説持誦神呪貧乏者富疾病者安罪障者消除危懼者安樂六門陀羅尼經右説持呪六願利益自他觀音普賢陀羅尼經右説種種求願持誦功德智炬陀羅尼經羔右日月宮中諸佛會集同聲所説後有救拔五逆罪謗正法人破阿鼻地獄衆生令解脫法諸佛集會陀羅尼經右説持呪增長壽命消除災難隨求即得大自在陀羅尼經右共八呪并説種種求願書寫受持畫戴功德能成就一切善事常為諸天龍神之所擁護諸佛菩薩之所憶念一切罪障災病惡夢不祥悉得消滅并説種種靈驗救護事百千印陀羅尼經右説若造一塔寫此經安置塔中所得功德如造百千塔等無有異救面然經右説阿難夜見一面然餓鬼言却後三日汝當命盡來生我趣若能布施百千恆河沙數餓鬼并百千婆羅門及仙人等各令飽足汝得增壽我得離苦佛説此呪令一切餓鬼飽足生天施食人具足成就供養百千俱胝恆河沙數如來功德經末有甘露陀羅尼令一切餓鬼甘露充足莊嚴王陀羅尼呪經右説持呪種種功德命終決定往生極樂國土香王菩薩陀羅尼經一切功德莊嚴王經拔除罪障呪王經善夜經右四經並説陀羅尼持誦求願種種殊勝功德虛空藏菩薩能滿一切願陀羅尼求聞持法經右説持呪結印畫像求願於日月蝕時呪蘇求聞持等法曼殊室利五字陀羅尼品經右説受持此陀羅尼功德及種種印呪修行法要觀自在如意輪菩薩瑜伽法要右説種種印呪求願修行法佛地經右説攝大覺地五種法謂清淨法界如來四智佛垂涅槃教誡經右與虛字函遺教經同本異譯出生菩提心經右迦葉初見佛佛為説三乘差別菩薩行相佛印三昧經右説佛入三昧菩薩聲聞不見佛身説不得般若波羅蜜不得成佛文殊涅槃經右説文殊現生涅槃德相及觀法異出菩薩本起經右説佛因地現生出家學道成佛千佛因緣經右説賢劫千佛同一劫中成佛因緣賢首經右佛為洴沙國王夫人説十方佛菩薩名及女人疾得為男子法月明菩薩經右佛為月明菩薩説施法及説佛昔為智止太子以血肉施病比丘事心明經右梵志婦施佛飯汁一杓獲授記事説佛不以七事笑不以欲不以瞋不以癡不放逸不利欲不榮貴不為富饒笑授菩薩聲聞辟支佛等記乃笑光入項入面入肩入臍入膝入足各各差別滅十方經右説持十方佛名功德魔逆經右文殊説與念字函文殊悔過經本相類鹿母經右佛昔因地為鹿母守信就死德光太子經羊右説菩薩種種行法次説佛昔因地捨國王太子位從佛出家事大意經右説佛往昔為長者子入海求珠作大施惠福報功德事堅固女經右説堅固女對佛發無上道心現大神力受菩提記商主天子所問經右文殊為商主等諸天子説諸菩薩入一切智智達一切法彼岸速滿足六度於一切智當修行法勝妙法門諸法最上王經右説比丘云何受施能為人天福田佛説菩薩及發菩提心人種種布施不足為報與養字函一切法高王經本同譯別師子莊嚴王菩薩請問經右説八曼茶羅最勝法門供養觀音彌勒虛空藏普賢執金剛文殊止諸障地藏八大菩薩有大功德利益獲大福報乃至降魔成佛離垢慧菩薩所問禮佛經右説禮十方佛歸依懺悔隨喜回向發願種種法門受持七佛名號經右説持七佛名號功德福報寂照神變三摩地經右賢護菩薩問種種法佛説是經序品如念佛三昧卷終似文義未畢佛臨涅槃記法住經右佛記涅槃後一千年中法住盛衰次第正法滅後有國王大臣長者居士等供養恭敬讚歎護持建立佛法皆是不可思議菩薩願力與諸有情作大饒益差摩婆帝受記經右頻婆娑羅王夫人問佛相好因緣十力四無畏四無礙十八不共法等佛為説經授成佛記不增不減經右佛為舍利弗説法身本際法義造塔功德經右説造塔乃至小如菴羅果輪如棗葉以盛舍利或四句偈功德如梵天右繞佛塔功德經右説旋繞佛塔種種功德大乘四法經右文殊説大乘種種菩薩修行法門并種種有障無障善惡夢相有德女所問大乘經右有德女供養佛問法發願佛為授記大乘流轉諸有經右説業識如夢迷惑故轉回法印經右佛為海龍王説四句偈師子素馱娑王斷肉經右説佛往昔因地捨身利生事妙色王因緣經右説佛昔因地為國王求無上菩提天帝下試捨妻子自身命求法因緣般泥洹後灌臘經右説四月八七月十五日以香湯浴佛燒香燃燈供養獲大福德八部佛名經右説持八佛功德利益金剛三昧經二卷景右諸菩薩問佛無生實際一味真實法佛説此經後付囑云是經能入如來智海持是經者則於一切經中無所希求攝諸經要無量義宗種種心地法門優婆夷淨行法門經二卷右此經説毗舍佉母問佛修學菩提種種行門修集相好因果功德乃至如來現生因緣法門富備非獨優婆夷所行也修行人宜常讀誦投身餓虎起塔因緣經右説佛因地為太子為餓虎捨身經捨千身超劫成佛樹提伽經右長者名也其家富盛過於國王此經説往昔因事金剛三昧本性清淨不壞不滅經右彌勒問法雲地菩薩云何入金剛三昧得成無上菩提佛説此經師子月佛本生經右佛説婆須蜜多菩薩往昔因緣於然燈佛滅後墮彌猴身見一羅漢坐禪取袈裟披擎香爐繞行供養羅漢為授三歸五戒由受戒故命終生兜率天值遇一生補處菩薩從是以後值佛無數今當次補彌勒號師子月佛并八萬四千金色彌猴亦受佛記種種因緣長者法志妻經右長者妻豪富自恃捶撾奴婢佛説法教化即變為男子佛為授記薩羅國經右佛教化薩羅國王説法授記十吉祥經右説十佛名號受持功德內習六波羅蜜經右説六妙門為六波羅蜜法慈心因緣不食肉經右説釋迦佛因地為白兔王彌勒為仙人入山修梵行暴水七日不得食兔王捨身火中供養故超劫成道長壽王經右説佛因地為國王行慈愛民棄國捨身事法常住經右説有佛無佛法常住故八大人覺經右説諸佛菩薩所覺念八事謂世間無常國土危脆多欲為苦生死疲勞等事三品弟子經四輩經右二經本同皆佛説弟子在家出家男女所當禁戒功德罪業行業勝劣等法長者女菴提遮師子吼了義經右説有明知生不生相而為生所留雖自明現力未充故若不見生性雖有勝辨談説甚深典籍即是生滅心説彼實相如盲辨色因他語故説青黃赤白黑而不能自見當來變經右佛説法滅時種種惡事過去佛分衛經右説佛因地見佛出家事分衛此云乞食十二頭陀經右詳説十二頭陀行十二者一在阿蘭若處二常乞食三次第乞食四受乞食法五節量食六中後不飲漿七著弊納衣八但三衣九塜間住十樹下止十一震地坐十二但坐不臥法滅盡經右説當來佛法滅種種事首楞嚴般舟三昧經先滅甚深大回向經右説回向功德福報天王太子辟羅經右太子自説往修善因果福事菩薩調伏藏經二十六部五十四卷按開元釋教録云菩薩淨戒唯禁於心聲聞律儀則防身語故有託緣興過聚徒訶結菩薩大人都無此事佛直為説令使遵行既無犯制之由故闕訶結之事諸大乘經明學處者托之於此為菩薩調伏藏云菩薩地持經十卷行右説信解行三地亦攝十地此諸地能與諸菩薩為所依止處復能出生一切諸菩薩行故持者能任攝持諸菩薩行願諸波羅蜜故名地持經中説七地六是菩薩地一是菩薩如來共地一者種性地二解行地三淨心地四行迹地五決定地六決定行地七畢竟地從初發心及修六度萬行六神通菩提分法及修相好因果等法門詳妙菩薩善戒經九卷維右佛説諸菩薩修習六度萬行三昧六通供養三寶兼利自他修相好業三十七助道品從初發心至究竟地一切菩薩修學行相法門又名菩薩藏經淨業障經右比丘無垢光犯戒憂悔見佛求哀佛説此經復為授記未來成佛復説往昔勇施比丘犯淫殺戒遇彌勒菩薩説法得無生忍勇施今已成佛號寶月如來是經能破一切惡業結縛除一切暗障優婆塞戒經六卷賢右佛為長者子説是經廣明三歸八戒五戒供養三寶六波羅蜜四無量心三種菩提修三十二相業等法門義豐慧廣非惟為在家菩薩修行龜鏡亦出家菩薩之軌範也趣菩提者所當精勤修學梵網經二卷右此經梵本有一百一十二卷六十一品此是第十菩薩心地一品也羅什法師參定三乘經論五十餘部惟梵網經最後誦出別書出此心地一品什每誦持以為心首當時三百餘人同誦此一品此經佛説十重四十八輕戒三世如來同説三世菩薩之所當學受十善戒經右佛説受八戒是諸佛為在家人制出家法及説十業善惡因果報應等事菩薩瓔珞本業經二卷剋右佛略説四十二位賢聖名字因果行相六入明門謂十住十行十向十地無垢地妙覺地明觀法門亦名六堅六忍六慧六觀瓔珞者謂銅寶銀金琉璃摩尼水精如是六位菩薩以百萬阿僧祇功德瓔珞嚴持二種法身佛藏經四卷右佛説初諸法實相品説諸法無生無滅無相無為次念佛品説念無分別即是念佛見諸法實相名為見佛次念法品次念僧品第二卷淨戒品説破戒比丘有十憂惱箭訶叱種種破戒罪相第三卷淨法品深戒不淨説法得大罪報往古品淨見品説佛昔因纍劫修學以有所得故不蒙諸佛授記是經戒勑切至凡學佛者冝熟觀誦菩薩戒本出地持戒品中慈氏菩薩説菩薩戒本出瑜伽論本地分中彌勒菩薩説右曇無讖譯似唐譯而略菩薩戒羯磨文右奘法師譯菩薩善戒經右説菩薩戒法持犯行相大略與戒本同菩薩內戒經念右文殊問佛初發意菩薩以何功德開化衆生佛説懺罪受戒十二時戒法十住功德優婆塞五戒威儀經右説種種戒法清淨毗尼方廣經寂調音所問經文殊師利淨律經右三經本同譯別寂調音天子問文殊答大乘法義菩薩聲聞不同行相等種種譬喻舍利弗悔過經菩薩藏經大乘三聚懺悔經右三經皆舍利弗問佛懺悔滅罪速得菩提佛為説滅一切業障懺悔勸請隨喜回向等法校量所獲福報菩薩五法懺悔文右説懺悔勸請隨喜回向發願謂之五法菩薩受齋經右説菩薩齋戒法及受齋日數解齋法跋陀羅菩薩經右文殊問跋陀羅菩薩答悔過發願勸請回向等法校量所獲福報文殊悔過經右文殊説菩薩懺悔勸請隨喜回向發願等法法律三昧經右説學菩薩道退轉過失外學仙人禪定等法十善業道經右佛在龍宮説十善業因果功德大智度論一百卷作字至正字右龍樹菩薩造釋大般若經富詞妙辨理精事廣西域學者無不欽崇什法師云余若廣譯千卷有餘為秦人識劣十分存一蓋從略也故至三十八卷才譯初品云十地論十二卷空右天親菩薩造釋華嚴經中十地品大乘寶積經論四卷谷右解釋寶積第四十三會彌勒菩薩所問經論六卷右解寶積經中第四十一會第五卷解十二支因緣義甚詳寶髻菩薩四法經論優波提舍右天親菩薩解釋大集經四十七會寶髻菩薩品優波提舍此名論佛地經論七卷傳右親光菩提造經説五法為佛地一清淨法界二大圓鏡智三平等性智四妙觀察智五成所作智經詮此理論詳解釋金剛般若經論三卷右無著菩薩造論釋經能斷金剛般若波羅蜜多經論頌右無著菩薩造頌釋經金剛般若波羅蜜多經論三卷聲右天親菩薩造論解經金剛般若波羅蜜經破取著不壞假名論二卷右功德施菩薩造論釋經能斷金剛般若經論三卷右無著菩薩造頌釋經世親菩薩釋義文殊師利問菩提經論二卷右天親菩薩造論解經妙法蓮華經優波提舍右天親菩薩造論略釋法華經義法華經論二卷虛右天親菩薩造論釋經遺教經論右天親菩薩造論釋經勝思惟梵天所問經論三卷右天親菩薩造論釋經三具足經論右天親造論三具足者一施二戒三聞具攝衆行解釋三法門事甚詳而經本未譯轉法輪經優波提舍右天親説佛成道已為五比丘等及諸天人初轉法輪優波提舍此云義門涅槃經論涅槃經本有今無偈論右皆天親造論略釋涅槃義無量壽經論右天親作偈復作論釋偈説極樂國功德莊嚴種種勝妙勸求往生詞簡義廣理事圓具音釋繢胡對切與繪同𦘚也鉛與專切黑錫也蒲撥切
