body:
  text: 元清源居士王古撰瑜伽師地論一百卷自堂字至善字右無著菩薩咨問彌勒大乗經義還閻浮提以己所聞為餘人說多不生信無著即自發願請彌勒夜降閻浮放大光明廣集有緣誦出十七地經隨所誦出隨解其義經四月夜方竟雖同在一堂聽法唯無著得近彌勒餘但遙聞此論奘法師譯梵語瑜伽此云相應謂一切乗境行果等所有諸法皆名相應境謂一切所緣境此境與心相應故名相應行謂一切行此行與理相應故名行相應果謂三聖果此果位中諸功德法更相符順故名果相應師謂三乗行者由聞思等次第習行如是瑜伽隨分滿足展轉教人故名瑜伽師地謂十七地境界謂五識相應地意識相應地有尋有伺地無尋有伺地無尋無伺地尋謂尋求伺謂伺察或思或慧於境推求麤外名尋即以二種於境審細位名伺舊名覺觀出諸經音義三摩呬多地非三摩呬多地有心地無心地聞所成地思所成地修所成地聲聞地獨覺地菩薩地有餘依地無餘依地顯揚聖教論二十卷慶尺右無著菩薩造宣說瑜伽師地論中要義顯揚聖教文約義周使人易曉區別義類為十一品錯綜該羅法義深廣大乗阿毗達磨集論七卷璧右無著菩薩造解釋五蘊十八界六度四攝四無量行四諦三十七菩提分等法義令後學披覽略文知深廣妙義王法正理論右彌勒菩薩造說出受王問佛言有訶諫我不真實過失心不悔惱有讚我不真實功德心亦不喜唯佛能知諸王過失功德真實願為我說佛言王有九種過失一不自在二性暴惡三猛憤發四恩惠薄五受邪六所作不思七不顧善法八不知差別九縱任放逸無此過失為九功德又有五種衰門五方便門又有五可愛樂法王能遠離過失修習功德當獲一切利益安樂瑜伽師地論釋右最勝子等諸菩薩造略釋瑜伽師地法義顯揚聖教論頌右無著等造頌十一品釋諸法要大乗雜集阿毗達磨論十六卷非寶右安慧菩薩翻釋上集論中論四卷右龍樹菩薩造佛入滅已論宗紛諍大士依大般若義造論以折中此論無言不窮無法不盡會通真俗有無斷常之邊見故名曰中論亦名中觀以觀辯於心論定於口耳叡法師序云百論治外以閑邪中論袪內以流滯大智釋論之淵博十二門觀之精詣尋斯四者真若日月無不朗然鑑徹矣予翫之味之不能釋手云般若燈論十五卷寸右龍樹菩薩本分別明菩薩釋顯深妙法明佛道因破迷滅闇息諸惡見分別照明列為二十七品與中論本同譯異百論二卷右提婆菩薩造天親釋肇法師序云此論以百為名理致淵玄統群籍之要文義婉約窮製作之美什法師常所詠味以為心要十二門論右龍樹造叡法師序云十二門者總眾枝之大數門者開通無滯之稱窮理盡性實相之折中道場之要軌也十八空論右十八空者一內空二外空三內外空四大空五空空六真實空七有為空八無為空九畢竟空十無前後空十一不捨離空十二佛性空十三自相空十四一切法空十五無法空十六有法空十七無法有法空十八不可得空廣百論右聖天菩薩造釋百論法義廣百論十卷陰是右聖天菩薩造論護法菩薩釋論破一切執有滯空之見妙開中道使學者了悟真空故唐奘三藏於西域法師隨聽隨譯成此十卷十住婆沙論十六卷競資右龍樹造大不思議論十萬頌釋華嚴經備傳西域此論十六卷即是彼論釋十地中初之二也菩提資粮論六卷右龍樹菩薩造說諸菩薩求無上菩提皆以般若波羅蜜多為母諸佛皆由此出生故六度萬行三十二相出生之業及種種菩薩之行微妙法門詞約義廣理圓事備求一切智者之妙門大路大乗莊嚴經論十三卷父右無著菩薩造解釋大乗菩薩從初發心至成一切智修習證入種種功德法門天竺三藏云西域大小乗學皆以此論為本於此不通未可弘法論初說造此論者以五義譬一如金成器令信向轉彼心故一如華敷開示彼故三如食美饍得法味故四如解文字為令修習更不思故五如開寶篋實證得故大乗莊嚴經論一十五卷君右馬鳴菩薩造說菩薩修習大乗功德種種法門順中論二卷右龍樹造無著菩薩釋破空有二邊之執是般若波羅蜜多初品空義攝大乗論三卷右無著菩薩造真諦三藏第一譯收攝一切大乗聖教法門要義總集于此而辯明之攝大乗論釋一十五卷曰嚴右論本三卷無著造釋論十二卷世親菩薩造解兄論本義攝大乗論三卷攝大乗論二卷右與前論本同譯別攝大乗論釋一十卷與右晉西竺三藏達摩笈多譯攝大乗論釋十卷敬右唐玄奘譯第三出已上三論釋本同譯別攝大乗論釋十卷孝右無性菩薩釋唐玄奘譯與前三論本同譯別佛性論四卷當右天親菩薩造解釋佛說一切眾生皆有佛性論十品說自性十相為顯二義一顯本有不可思議境界二顯依道理修修行可得三顯已能令無量功德圓滿究竟故造斯論決定藏論三卷右顯了大乗全量八識心境分量善惡因果論述此理決定無移辯中邊頌論右彌勒說執空執有為二邊虛妄分別有於此一都無此中惟有空等頌辯中邊二義故中邊分別論二卷辯中邊論三卷竭唐譯第二右世親菩薩造釋彌勒中邊論頌此論說七義一相二障三真實四修諸對治五即此修分位六得果七無上乗究竟一乗寶性論四卷右不顯造者顯示第一義諦佛性體相德用等大乗成業論業成就論右本同譯別天親菩薩造業謂身口意三業以一切造善造惡生聖處墮惡道皆不離三業而得成就因明正理論本因明正理門論力右陳那菩薩造本同譯別詳略有異唐譯後序云此論抗辯標宗摧邪顯正因談照實明彰顯理入言趣本正以離邪西方時彥鑽仰罙深因明正理門論右大龍菩薩造釋因明論唯識論右天親菩薩造本論序云此是諸佛甚深境界非是凡夫二乗所知此論本末明三種空一者人無我空二者因緣法體空三者真歸佛性空我空者凡夫妄想於五陰因緣法中見我為有實不可得猶如兔角五陰無常我亦無常如是知者名人無我空因緣法空者如薪火相待無實離薪無火離火無薪見火說假名薪見薪說假名火能成所成相待不離能所亦實無是名因緣法體空真如法空者佛性名第一義空無世間色相有為法故非是同於無性法故以具真如法體故名不空空是名真如法空實無前境界但眾生妄見有外境界故名唯識又名破色心論但破虛妄煩惱結使心不破佛性清淨心也唯識二十論唯識三十論大乗唯識論右天親菩薩造轉識論顯識論右已上並說三界唯識法義成唯識寶生論五卷右天親造三十本頌說唯識義護法菩薩造論五卷解釋成前三十頌義亦名二十唯識論釋成唯識論十卷忠右護法安慧菩薩等十師造此論能成就天親三十頌論令義理圓成故名成唯識論盡邃理之微闡法王之奧為令學者破空有迷謬執生正解斷重障證真解脫故大丈夫論二卷則右提婆菩薩造論云能成種智果施因為最大一切眾事具無不由施成施是生大道出世之胞胎救一危難人勝餘一切施一切善法行悲心施為首二十九品廣說施法入大乗論二卷右堅意菩薩造欲為眾生遮苦因故為救偏執邪見顛倒思惟不解實義不順佛智謗正法得大罪報者如是得生聞思修乃至具足一切智故大乗掌珍論二卷右清辯菩薩造序云為悲憫世間種種邪見生死籠樊無量憂苦故欲令學人易證真空速入法性故略製此如掌珍論大乗起信論右梁真諦第一譯馬鳴菩薩撮略百本大乗經宗旨造此論為欲令眾生除疑捨邪執起大乗正信佛種不斷故寶行王正論右說一切國王御國治民善惡功罪違理順理苦樂因果修集相好敬愛正法等種種法門大乗五蘊論世親菩薩造大乗廣五蘊論安慧菩薩造右說色蘊十五種受蘊八種想蘊亦八種行蘊有七十三法識蘊亦八種造善造惡生樂趣苦趣有無量功能積聚故名蘊發菩提心經論二卷盡右說發菩提心因緣功德天親造論廣明經義大乗起信論二卷右唐實叉難陀譯與前真諦所譯本同譯別文或有異序述其詳云大乗明鏡莫過於此三無性論二卷右三無性者一分別相無自性二依他生無自性三真實勝義無自性性如實論右如無乖異實非妄倒義理真實方便心論右如鍊金須藉爐火人工為其方便乃可成金菩薩修行須明達佛理以為方便乃得成道觀所緣緣論右陳那菩薩造心為能觀緣境為所觀心境非一故言所緣緣如眼觀色境色是所緣眼識為能緣等觀所緣論釋右護法菩薩造解釋前論無相思塵論右陳那菩薩造意識細境非緣外境故名無相識心分別至鄰虛位極微細故名思塵迴諍論命右佛入滅後異見偏執遂多諍論龍樹造論迴邪歸正一切論義皆能解釋提婆菩薩釋楞伽經中外道小乗涅槃論右解釋佛說涅槃因果正義破二十種諸外道邪見異論提婆菩薩破外道小乗四宗論右破外道論師一切法一異俱不俱四宗義緣生論右解在此字函緣生經掌中論右陳那菩薩造說三界但有假名實無外境由妄執故謂繩為蛇善觀察時繩亦無實體妄識分別知相假借無實可得知一切法但是假法壹輸盧迦論右龍樹造說一切法自體性空故無有常一切佛緣覺聲聞於空法中而得出離非於諸行斷常法中而得解脫大乗百法明門論右天親造一切法略有五種一心法略有八種二心所有法略有六種徧行有五別境有五善有十一煩惱有六隨煩惱有二十不定有四三色法略有十一種四心不相應法略有二十四種無為法略有二種百字論右提婆造破我見等一切諸法各有自相義手杖論右論言世間一類有情為無慧解便生邪執由此沉淪為憐憫此等愚蒙作手杖論取因假設論右陳那菩薩造取者執也因者對果假者虛妄設者施設佛化眾生不壞世間依假施設事而宣法要使之開悟永斷煩惱六門教授習定論右無著本天親釋為欲利益一切有情令習世出世定速離煩惱得解脫故說此修習靜定法門佛言先當依定能盡有漏求出生死海者離於正定無別方便大乗法界無差別論右說眾生界不異法身法身不異眾生界平等解脫一味無別如日輪為雲所覆而性常清淨十二因緣論右解十二支法義止觀門論頌右世親菩薩造七十頌論修習定慧是入聖妙門觀總相論頌右陳那菩薩造諸法有總相別相差別此略頌總相義解捲論右論云三界唯以言名為體由強分別非實有法為生不顛倒智故造此論長阿含經二十二卷臨深右阿含者秦言法歸蓋萬行之淵府總持之林苑道無不由法無不在譬彼巨海百川所歸故以法歸為名也開斥修途所記長遠故以長為目此經四分合三十經以為一部辯邪正如晝夜昭報應若影響見遠劫如朝夕視六合猶目前朗大明於幽室慧五目於眾瞽不窺戶牖而智無不周矣出肇法師序第一卷說七佛本緣壽量眷屬法會弟子降生入胎出家成道乃至涅槃等緣第二至第四說佛將涅槃遊行化度乃至入滅分布舍利事第五說佛過去世為大臣捨家學道次說廣化人天事第六說劫初已來有五種姓種種轉變因緣次說往昔轉輪王福德修行事第七外道說死後斷滅無善惡報迦葉意女說法破其蔽惑第八至十佛說法教化外道次舍利弗說一增至十等種種法相義次大緣經解十二緣法甚詳次天帝釋問佛佛為說法義第十一卷阿㝹夷品佛為外道梵志說法次善生經為長者子六向拜佛為說賢聖法中禮六方法第十二卷清淨經世尊說佛制法教授弟子清淨微妙離苦得道次自歡喜經舍利弗讚說佛法無上智慧神通一切世間無與等者次大會經十方諸神天人等皆來集會禮敬如來佛為諸眾種種結呪第十三阿摩晝經外道使弟子觀佛佛為調伏說外道邪偽佛法真正佛弟子明行具足第十四梵動經佛說甚深微妙大法光明說諸六十二邪見第十五種德經佛說法調伏婆羅門眾次究羅檀頭經亦爾第十六佛不許弟子現神足次說比丘問諸天四大從何而滅義天不能答還復問佛佛為說法次說調伏婆羅門等第十七沙門果經阿闍世王問佛佛為說此經次布咤婆樓經次露吒經皆佛說法調伏婆羅門外道等第十八記說大千中千世界四洲轉輪王等事題云世記經第十九說地獄及諸龍金翅等事第二十說脩羅諸天及日月宮事日月天子生日月宮因緣第二十一說三災天脩羅戰𨷖事二十二說三中劫及世本緣劫初等事中阿含經六十卷履至清右此經凡四分一十八品第一七法品十經第二業相應品十一經第三舍利子相應品十一經第四未曾有法品十經第五習相應品十六經第六王相應品十四經如是一十八品中總二百二十二經別法門浩博詞義廣妙不可具舉內有五十三經本同譯別皆出中阿含經具解於後增一阿含經五十一卷似至如右此部經凡有五十品總四百七十二經別佛涅槃已迦葉阿難等結集如來法寶一代時教分為三分經律論藏復以契經分為四叚一名增一二名中三名長阿含名瓔珞四雜經在後增一謂佛告比丘當修一法謂念佛乃至念死等二從二法三從三法乃至九十從一增一義豐慧廣契經義深故名含明定前多說四諦十二緣五陰六入十八界後出世界成敗佛成道度人又七佛得道制戒等出寶唱錄云雜阿含經五十卷松至流右迦葉阿難與諸大阿羅漢結集三藏集一切長經為長阿含從一事至十事從十事至十一事為增一雜比丘比丘尼優婆塞優婆夷諸天雜帝釋雜魔雜梵王集為雜阿含出四分律第五十四此部經說事既雜故無品次誦等差別自餘雜說集為一部名修多羅出五分律第三十別譯雜阿含經二十卷不息右此部經與前經文雖先後不次細尋不出前經此但撮要故為別部契經開四增一明人天因果長阿含破邪見中阿含明深義雜阿含明禪定出天台智者法華文句第一佛般泥洹經二卷佛般泥洹下諸經並是四含中別經異譯淵大般涅槃經三卷般泥洹經二卷右三經本同譯別說佛欲捨壽入滅人天聞法受度純陀末後獻供人天禮送分布舍利乃至略說結集等種種因緣出長阿含經第二至第四卷同本異譯人本欲生經右佛為阿難演十二因緣五陰八解脫等法出長阿含經第十卷與大方便經同本異譯尸迦羅越六向拜經右長者子日拜四方上下而不知法義佛為說種種在家善惡諸法出長阿含第十一卷梵志阿經右梵志自矜種姓豪貴聰辯智慧佛為說法化度此經演戒定慧種種法義出長阿含經第十三卷與阿摩晝經同本異譯梵網六十二見經右說外道起種種見唯佛法真正出長阿含經第十四卷與梵動經同本異譯寂志果經右阿闍世王問外道六師不契王意王來問佛佛為說沙門受學證果等法出長阿含經第十七卷與沙門果經同本異譯起世經十卷澄起世因本經十卷取右隋譯二經同本異譯因本經十二品說四大洲種種事次轉輪王品說輪王出世種種事地獄品詳說種種地獄受一切苦種種事諸龍金翅鳥品阿脩羅品四天王品三十三天品各說諸趣中種種事𨷖戰品說天修羅戰𨷖事劫住品住世品說劫成壞事最勝品說劫住已來日月寒暑立主治民種種事大樓炭經六卷映右佛說四洲轉輪王地獄脩羅諸龍金翅鳥諸天阿脩羅戰𨷖大小三災劫天地初成時種種事已上三經出長阿含經第十八至二十二卷與記世經同本異譯長阿含十報法經上下二卷右舍利說種種善不善法從一法增至十法聚成無為出苦滅惱出長阿含經第九卷同本異譯中本起經上下二卷右說佛初成道度五拘隣次化迦葉目連舍利弗瓶沙王波斯匿王等及給孤獨園𭡠女受化及食馬麥等事從佛般泥洹下十三經並出長阿含中別經異譯七知經容右說比丘七法道謂知法知義知時知節自知知眾知人勝出中阿含經第一卷與初善法經同本異譯鹹水喻經右說眾生沒溺生死河四果人得出到彼岸出中阿含經第一卷與水喻經同本異譯一切流攝守因經右說斷諸有流得度世種種調伏法出中阿含經第三卷與漏盡經同本異譯四諦經右佛為諸弟子演苦集滅道法出中阿含經第七卷與分別聖諦經同本異譯瞻婆比丘經恒水經右佛欲說戒目連𢷤黜不淨比丘因說此經出中阿含經第九卷與瞻婆經同本異譯本相倚致經緣本致經右二經本同譯別說善惡法皆有依本出中阿含經第十卷與本際經同本頂生王故事經文陀竭王經右二經本同譯別說昔轉輪聖王受大福樂升忉利天以貪欲墮而死出中阿含經第十一卷與四洲經同本閻羅王五天使者經鐵城泥犁經右二經同本異譯說地獄罪報出中阿含經第十二卷與天使經同本古來世時經右說佛因地供養一辟支佛十四返人天中尊及說當來彌勒時世快樂出中阿含經第十三卷與說本經同本異譯阿那律八念經右八謂少欲知足隱處精進制心定意智慧捨家出中阿含經第十八卷與八念經同本異譯離睡經右佛為目連說種種離睡眠蓋法出中阿含經第二十卷與長老上尊睡眠經同本異譯是法非法經右說賢者法及不賢者法教戒當行不當行事出中阿含經第二十一卷與真人經同本異譯求欲經右四種人有無求欲知不知真如差別出中阿含經第二十二卷與穢經同本異譯受歲經右說比丘善惡法出中阿含經第二十三卷初與比丘請經同本異譯梵志計水淨經右說斷結生善處出中阿含經第二十三卷與水淨梵志經同本異譯苦陰經右出中阿含經第二十五卷與苦陰經同本異譯苦陰因事經右說念著三毒苦陰等事二經同本異譯出中阿含經第二十五卷與苦陰經同本釋摩男本經右說世間苦多樂少教勸出家學道樂想經右說計想種種已知未知法出中阿含經第二十六卷與想經同本異譯漏分布經右說受想行等本起分布受殃滅盡等皆以八正道得畢苦出中阿含經第二十七卷與達梵行經同本異譯阿耨經晉言依次右說善惡報差別出中阿含經第二十七卷與阿奴波經同本異譯諸法本經右說斷受棄欲入正慧得苦際法出中阿含經第二十八卷初與諸法本經同本異譯瞿曇彌記果經右彌與阿難請佛令比丘尼出家戒律事出中阿含經第二十八卷與瞿曇彌經同本異譯瞻婆比丘經右出中阿含經第三十九卷與瞻波經同本異譯伏婬經右說十伏婬法出中阿含經第三十卷與行欲經同本異譯魔嬈亂經弊魔試目連經右魔嬈試目連目連為說往昔魔嬈佛弟子墮大地獄事二經本同譯別出中阿含經第三十卷與降魔經同本賴吒和羅經右賴吒和羅長者子也見佛聞法捨家證果還為其家及國王說法王亦得道果出中阿含經第三十卷與賴吒和羅經同本異譯善生子經右與淵字函六向拜經本同譯別出中阿含經第三十三卷與善生經同本異譯數經右婆羅門學數問佛佛為說法出中阿含經第三十五卷與筭數目揵連經同本異譯梵志頞羅延問種尊經右婆羅門種自謂尊大佛為說此經出中阿含經第三十七卷與阿攝和經同本異譯三歸五戒慈心猒離功德經右校量種種布施及三歸依行慈等福須達經右二經同本異譯出中阿含經第三十九卷與須達哆經同本佛為黃竹園老婆羅門說學經右佛為婆羅門說佛坐道場得四禪三明婆羅門歸信與中阿含經第四十卷黃蘆園經同本異譯梵摩喻經右說梵志見佛相好威神功德歸依三寶遂證道果出中阿含經第四十一卷與梵摩經同本異譯尊上經右天問比丘偈義比丘請佛佛為說經出中阿含經第四十三卷與釋中禪室尊經同本異譯鸚鵡經兜調經右婆羅門名也死為狗還在其家佛為說宿命并種種因果事二經本同譯別出中阿含經第四十四卷與鸚鵡經同本意經右說比丘問佛佛為說此經遂得道果出中阿含經第四十五卷與心經同本異譯應法經右說世間四法現在與後受報苦樂事出中阿含經第四十五卷與後受法經同本異譯泥犂經右說惡道苦惱因果報應事出中阿含經第五十三卷與癡慧地經同本異譯優陀夷墮舍迦經齋經右說六齋八戒五念功德二經同本異譯出中阿含經第五十五卷與持齋經同本佛言如是奉持八戒五念為佛法齋與天參德滅惡興善後生天上終得泥洹是以智者自力行出心作福今十六大國滿中眾寶不可稱數不如一日受佛法齋如比其福者則十六國為一豆耳天上廣遠不可稱說當今人間五十歲為第一天上一日一夜第一四天上壽五百歲彼當人間九百萬歲佛法齋者得生此天上人間百歲為忉利天上一日一夜忉利天壽千歲當人間三千六百萬歲人間二百歲為鹽天上一日一夜鹽天壽二千歲當人間一億五千二百萬歲人間四百歲為兜術天上一日一夜兜術天壽四千歲當人間六億八百萬歲人間八百歲為不驕樂天上一日一夜不驕樂天壽八千歲當人間二十三億四千萬歲人間千六百歲為化應天上一日一夜化應天壽萬六千歲當人間九十二億一千六百萬歲若人有信有戒有聞有施有智奉佛法齋當命盡時其人精神皆生此六天上安隱快樂猗善眾多我少說耳凡人行善魂神上天受福無量佛言一日一夜持八戒齋勝以十六大國中珍寶布施齋戒使人得度世道以財寶施不能使人得道我得佛道本是八戒若欲速得阿羅漢道疾得佛道欲生天上端心一意一月六齋一日一夜齋戒福不可計譬如海水不可斗量一月十五日齋亦善二十日齋亦善人多憂家事故與一月六齋鞞摩肅經右異學謂色妙欲念佛為說此經出中阿含經第五十七卷與鞞摩那修經同本異譯婆羅門子命終愛念不離經右說愛生則有苦憂戚不樂等法出中阿含經第六十卷與愛生經同本異譯十支居士八城人經右阿難為八城人等說此經出中阿含經第六十卷與八城經同本異譯邪見經右邪命問世間有邊無邊等義阿難為說此經出中阿含經第六十卷與見經同本異譯箭喻經右摩羅鳩摩羅問佛世間有邊無邊等義佛不答為說此喻出中阿含經第六十卷與箭喻經同本異譯普法義經廣義法門經右舍利弗說顯示梵行種種離障證果方便廣義法門出中阿含經一品二經同本異譯七知經下五十三經並出中阿含中別經異譯戒德香經右說戒香功德普熏無礙出增壹阿含經第十三卷地主品異譯四人出現世間經右說四人先醜後妙謂生處卑陋而積善生天先妙後醜謂生處尊榮而死墮惡道先醜後醜謂生處無福又復作惡死入惡道先妙後妙謂生處有福而復積善生天出增壹阿含經第十八卷四意斷品異譯波斯匿王太后崩塵土坌身經右王苦惱佛為說法此名除憂患經出增壹阿含經第十八卷四意斷品異譯須摩提女經右與辭字函三摩竭經本同譯別出增壹阿含經第二十二卷須陀品婆羅門避死經右說四婆羅門仙得五神通入空入海入山入地避死不得皆各命終出增壹阿含經第二十三卷增上品異譯食施獲五福報經右五福謂富壽顏色光澤端正多力身安出增壹阿含經第二十四卷善聚品異譯頻毗娑羅王詣佛供養經右說王供養佛聞法歡喜婇女等皆得法眼淨出增壹阿含經第二十六卷等見品異譯長者子六過出家經右說僧伽羅摩棄家事佛修道證果出增壹阿含經第二十七卷聚品異譯音釋錯綜錯七各切綜子宋切憤房吻切懣也祛去魚切開散也咤陟駕切𢷤必刃切斥也
